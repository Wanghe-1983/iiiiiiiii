<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>后台管理 - 导入导出增强版</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 40px; }
        .container { max-width: 1000px; margin: auto; background: #1e293b; padding: 30px; border-radius: 20px; }
        .box { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        textarea { width: 100%; height: 120px; background: #000; color: #10b981; border: 1px solid #334155; padding: 10px; font-family: monospace; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
        input { background: transparent; border: 1px solid #475569; color: white; padding: 8px; border-radius: 4px; width: 90%; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 700; transition: 0.2s; }
        .btn-green { background: #10b981; color: white; }
        .btn-blue { background: #3b82f6; color: white; margin-top: 10px; }
        .btn-red { background: #ef4444; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h2>👥 白名单名单库管理</h2>

        <div class="box">
            <p style="margin-bottom:10px; color:#94a3b8; font-size:14px;">📦 批量导入 (从 whitelist.json 复制内容粘贴至此):</p>
            <textarea id="import-json" placeholder='[{"id":"A01", "name":"张三", "psha":"123", "status":"active"}]'></textarea>
            <button class="btn btn-blue" onclick="doImport()">解析并载入表格</button>
        </div>

        <button class="btn btn-green" onclick="addRow()">+ 新增人员</button>
        <table id="main-table">
            <thead><tr><th>工号(ID)</th><th>姓名</th><th>密码</th><th>状态</th><th>操作</th></tr></thead>
            <tbody id="tbody"></tbody>
        </table>

        <div style="margin-top:30px; border-top:1px solid #334155; padding-top:20px; text-align:right;">
            <button class="btn btn-green" style="font-size:1.2rem; padding:15px 40px;" onclick="exportJson()">生成并复制新 JSON</button>
            <button class="btn" onclick="location.href='index.html'">返回主页</button>
        </div>
    </div>

    <script>
        let users = [];

        function doImport() {
            try {
                const val = document.getElementById('import-json').value;
                if(!val) return;
                users = JSON.parse(val);
                render();
                alert("加载成功！共有 " + users.length + " 个账号。");
            } catch(e) { alert("JSON 格式有误，请检查。"); }
        }

        function addRow() {
            users.push({ id: "", name: "", psha: "", status: "active" });
            render();
        }

        function render() {
            const html = users.map((u, i) => `
                <tr>
                    <td><input value="${u.id}" onchange="users[${i}].id=this.value"></td>
                    <td><input value="${u.name}" onchange="users[${i}].name=this.value"></td>
                    <td><input value="${u.psha}" onchange="users[${i}].psha=this.value"></td>
                    <td>
                        <select onchange="users[${i}].status=this.value" style="background:#0f172a; color:white;">
                            <option value="active" ${u.status=='active'?'selected':''}>启用</option>
                            <option value="disabled" ${u.status=='disabled'?'selected':''}>停用</option>
                        </select>
                    </td>
                    <td><button class="btn-red" onclick="users.splice(${i},1);render()">删除</button></td>
                </tr>
            `).join('');
            document.getElementById('tbody').innerHTML = html;
        }

        function exportJson() {
            const json = JSON.stringify(users, null, 2);
            navigator.clipboard.writeText(json).then(() => {
                alert("新白名单已复制！请前往 GitHub 覆盖 whitelist.json。");
            });
        }
    </script>
</body>
</html>
