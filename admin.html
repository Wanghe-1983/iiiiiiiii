<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FMI 系统后台管理</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #6366f1;
            --danger: #f87171;
            --text: #f8fafc;
        }
        body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; padding: 40px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .card { background: var(--card); border-radius: 20px; padding: 25px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05); }
        h2 { font-size: 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: #94a3b8; font-size: 13px; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-danger { background: rgba(248, 113, 113, 0.1); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 8px; flex: 1; outline: none; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 15px; text-align: center; }
        .stat-val { font-size: 24px; font-weight: 800; color: var(--accent); display: block; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>控制面板 <span style="font-size: 14px; font-weight: 400; opacity: 0.5;">FMI System Admin</span></h1>
            <button class="btn btn-primary" onclick="location.href='index.html'"><i class="fas fa-arrow-left"></i> 返回学习端</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><span class="stat-val" id="stat-users">0</span><span style="font-size:12px; opacity:0.6;">激活用户</span></div>
            <div class="stat-card"><span class="stat-val" id="stat-favs">0</span><span style="font-size:12px; opacity:0.6;">全站收藏数</span></div>
            <div class="stat-card"><span class="stat-val" id="stat-words">0</span><span style="font-size:12px; opacity:0.6;">库内单词量总计</span></div>
        </div>

        <div class="card">
            <h2><i class="fas fa-users-cog"></i> 白名单管理</h2>
            <div class="input-group">
                <input type="text" id="new-id" placeholder="工号 (ID)">
                <input type="text" id="new-name" placeholder="姓名">
                <input type="password" id="new-pw" placeholder="初始密码">
                <button class="btn btn-primary" onclick="addUser()">添加成员</button>
            </div>
            <table id="user-table">
                <thead>
                    <tr>
                        <th>工号</th>
                        <th>姓名</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>

        <div class="card">
            <h2><i class="fas fa-database"></i> 核心数据维护</h2>
            <div style="display: flex; gap: 15px;">
                <button class="btn btn-primary" onclick="exportData()"><i class="fas fa-download"></i> 导出用户名单 (JSON)</button>
                <button class="btn btn-danger" onclick="resetSystem()"><i class="fas fa-trash-alt"></i> 重置全站缓存</button>
            </div>
            <p style="margin-top:15px; font-size:12px; color:#64748b;">*重置功能将清空本地浏览器存储的所有学习进度和收藏记录。</p>
        </div>
    </div>

    <script>
        // 模拟白名单数据（实际应用中应由后端或独立JSON文件管理）
        let whitelist = JSON.parse(localStorage.getItem('fmi_whitelist_db')) || [
            { id: "admin", name: "超级管理员", psha: "admin123", status: "active" }
        ];

        function initAdmin() {
            renderUsers();
            updateStats();
        }

        function renderUsers() {
            const tbody = document.querySelector('#user-table tbody');
            tbody.innerHTML = whitelist.map((u, index) => `
                <tr>
                    <td>${u.id}</td>
                    <td>${u.name}</td>
                    <td><span style="color:#10b981">● 已激活</span></td>
                    <td>
                        ${u.id !== 'admin' ? `<button class="btn btn-danger" style="padding:5px 10px; font-size:12px" onclick="deleteUser(${index})">删除</button>` : '--'}
                    </td>
                </tr>
            `).join('');
            localStorage.setItem('fmi_whitelist_db', JSON.stringify(whitelist));
        }

        function addUser() {
            const id = document.getElementById('new-id').value.trim();
            const name = document.getElementById('new-name').value.trim();
            const pw = document.getElementById('new-pw').value;

            if(!id || !name || !pw) return alert("请填写完整信息");
            if(whitelist.some(u => u.id === id)) return alert("工号已存在");

            whitelist.push({ id, name, psha: pw, status: "active" });
            renderUsers();
            updateStats();
            // 清空输入
            document.getElementById('new-id').value = '';
            document.getElementById('new-name').value = '';
            document.getElementById('new-pw').value = '';
        }

        function deleteUser(index) {
            if(confirm("确定移除该用户吗？")) {
                whitelist.splice(index, 1);
                renderUsers();
                updateStats();
            }
        }

        function updateStats() {
            document.getElementById('stat-users').innerText = whitelist.length;
            const favs = JSON.parse(localStorage.getItem('fmi_favs') || '[]');
            document.getElementById('stat-favs').innerText = favs.length;
            
            // 尝试获取词库总量
            fetch('./indonesian_learning_data.json')
                .then(r => r.json())
                .then(db => {
                    let total = 0;
                    for(let cat in db) {
                        total += db[cat].lessons["1"]?.words.length || 0;
                    }
                    document.getElementById('stat-words').innerText = total;
                }).catch(() => {});
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(whitelist, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "fmi_whitelist.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function resetSystem() {
            if(confirm("警告：这将清空您的收藏、记录和白名单数据并注销登录！确定吗？")) {
                localStorage.clear();
                alert("清理完成，系统将重新载入");
                location.href = 'index.html';
            }
        }

        initAdmin();
    </script>
</body>
</html>
