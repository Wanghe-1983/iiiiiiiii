<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印尼语学习助手</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #030712;
            --glass: rgba(17, 24, 39, 0.85);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.5);
            --text-main: #f9fafb;
            --text-muted: #94a3b8;
            --sidebar-w: 300px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.12) 0px, transparent 50%), 
                              radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            font-family: 'SF Pro Display', 'PingFang SC', system-ui, sans-serif;
            height: 100vh; display: flex; overflow: hidden;
        }

        /* --- 侧边栏及展开逻辑修复 --- */
        .sidebar {
            width: var(--sidebar-w); height: 100%; background: var(--glass); backdrop-filter: blur(25px);
            border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); position: relative; z-index: 1000;
        }
        .sidebar.collapsed { width: 0; transform: translateX(calc(var(--sidebar-w) * -1)); }
        
        .sidebar-inner { width: var(--sidebar-w); height: 100%; overflow-y: auto; padding: 25px 15px; transition: 0.3s; opacity: 1; }
        .sidebar.collapsed .sidebar-inner { opacity: 0; pointer-events: none; }

        /* 侧边栏标签按钮：展开/收起 */
        .toggle-tab {
            position: absolute; right: -32px; top: 30px; width: 32px; height: 60px;
            background: var(--accent); color: white; cursor: pointer;
            border-radius: 0 12px 12px 0; display: flex; align-items: center; justify-content: center;
            box-shadow: 5px 0 15px var(--accent-glow); transition: 0.3s;
        }
        .sidebar.collapsed .toggle-tab { transform: translateX(var(--sidebar-w)); }
        .toggle-tab i { transition: 0.4s; }
        .sidebar.collapsed .toggle-tab i { transform: rotate(180deg); }

        /* 目录美化 */
        .cat-item { margin-bottom: 12px; border-radius: 14px; background: rgba(255,255,255,0.03); overflow: hidden; }
        .cat-head { padding: 12px 15px; cursor: pointer; font-weight: 600; font-size: 0.95rem; display: flex; justify-content: space-between; transition: 0.2s; }
        .cat-head:hover { background: rgba(255,255,255,0.06); }
        .sub-menu { display: none; padding: 5px 10px 10px; }
        .sub-menu.active { display: block; animation: slideDown 0.3s ease; }
        
        /* 标题美化 */
        .main-title {
            text-align: center; font-size: 3rem; font-weight: 900; margin-bottom: 30px;
            background: linear-gradient(135deg, #ffffff 30%, #6366f1 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 15px rgba(99, 102, 241, 0.3));
            letter-spacing: -1px;
        }

        /* 主学习卡片 */
        .main-container { flex: 1; display: flex; flex-direction: column; padding: 40px; position: relative; overflow: hidden; }
        .study-card {
            background: rgba(30, 41, 59, 0.3); border-radius: 60px; border: 1px solid rgba(255,255,255,0.08);
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; padding: 40px; box-shadow: 0 50px 100px rgba(0,0,0,0.5); backdrop-filter: blur(15px);
            transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .card-anim { transform: scale(0.96); opacity: 0.4; filter: blur(4px); }

        .top-meta { position: absolute; top: 40px; left: 50px; right: 50px; display: flex; justify-content: space-between; align-items: center; }
        .word-badge { 
            background: var(--accent); color: white; padding: 6px 22px; border-radius: 14px; 
            font-weight: 800; font-family: 'JetBrains Mono', monospace; 
            box-shadow: 0 4px 15px var(--accent-glow);
        }
        .star-btn { font-size: 2.5rem; cursor: pointer; color: rgba(255,255,255,0.05); transition: 0.3s; }
        .star-btn.active { color: #fbbf24; filter: drop-shadow(0 0 10px rgba(251, 191, 36, 0.5)); }

        /* 单词字体美化 */
        .indo-box { 
            font-size: 5.5rem; font-weight: 900; margin-bottom: 15px; text-align: center;
            background: linear-gradient(to bottom, #fff, #cbd5e1);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .zh-box { font-size: 2.5rem; color: var(--text-muted); font-weight: 300; letter-spacing: 4px; }

        /* 控制区面板 */
        .control-panel {
            width: 100%; max-width: 800px; margin: 35px auto 0; background: var(--glass);
            padding: 30px 45px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.08);
            display: flex; flex-direction: column; gap: 25px;
        }
        .ctrl-row { display: flex; align-items: center; justify-content: space-between; }
        .ctrl-label { font-size: 1rem; color: var(--text-muted); font-weight: 600; min-width: 100px; }
        
        /* 数值字体美化 */
        .ctrl-value { 
            min-width: 70px; text-align: right; 
            font-family: 'JetBrains Mono', 'Consolas', monospace; 
            color: var(--accent); font-weight: 800; font-size: 1.2rem;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .switch { position: relative; width: 52px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #1e293b; transition: .4s; border-radius: 34px; border: 1px solid rgba(255,255,255,0.1); }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(24px); }

        /* 版权与脚部 */
        .copyright { font-size: 0.9rem; text-align: center; color: #475569; margin-top: 35px; font-weight: 500; }
        .clickable { color: var(--accent); cursor: pointer; font-weight: 700; transition: 0.2s; }
        .clickable:hover { text-shadow: 0 0 8px var(--accent-glow); }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .modal-content { background: #1e293b; padding: 35px; border-radius: 30px; text-align: center; border: 1px solid var(--accent); }

        .nav-row { display: flex; gap: 40px; margin-top: 50px; }
        .circle-btn { width: 80px; height: 80px; border-radius: 50%; border: none; background: rgba(255,255,255,0.05); color: white; font-size: 2rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .circle-btn:hover { background: var(--accent); transform: translateY(-5px); box-shadow: 0 10px 20px var(--accent-glow); }
        .play-btn { width: 100px; height: 100px; background: var(--accent); box-shadow: 0 0 30px var(--accent-glow); }
        
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="toggle-tab" onclick="document.getElementById('sidebar').classList.toggle('collapsed')">
            <i class="fas fa-chevron-left"></i>
        </div>
        <div class="sidebar-inner" id="menu-box"></div>
    </aside>

    <main class="main-container">
        <header><h1 class="main-title">印尼语学习助手</h1></header>

        <section class="study-card" id="main-card">
            <div class="top-meta">
                <div class="word-badge" id="word-idx">01</div>
                <div class="star-btn" id="fav-trigger" onclick="handleFav()"><i class="fas fa-star"></i></div>
            </div>
            <div class="indo-box" id="disp-indo">Loading</div>
            <div class="zh-box" id="disp-zh">请稍等</div>
            <div class="nav-row">
                <button class="circle-btn" onclick="navWord(-1)"><i class="fas fa-arrow-left"></i></button>
                <button id="main-play" class="circle-btn play-btn" onclick="toggleSpeech()"><i class="fas fa-play" id="play-ico"></i></button>
                <button class="circle-btn" onclick="navWord(1)"><i class="fas fa-arrow-right"></i></button>
            </div>
        </section>

        <footer class="control-panel">
            <div class="ctrl-row">
                <span class="ctrl-label">语音语速</span>
                <div style="flex:1; display:flex; align-items:center; gap:20px;">
                    <input type="range" style="flex:1" id="inp-rate" min="0.1" max="1.5" step="0.1" value="0.8" oninput="updateSetting('rate', this.value)">
                    <span class="ctrl-value"><span id="val-rate">0.8</span>X</span>
                </div>
            </div>
            <div class="ctrl-row">
                <span class="ctrl-label">循环播放</span>
                <div style="flex:1; display:flex; align-items:center; gap:20px;">
                    <input type="range" style="flex:1" id="inp-loop" min="1" max="10" step="1" value="1" oninput="updateSetting('loop', this.value)">
                    <span class="ctrl-value"><span id="val-loop">1</span>次</span>
                </div>
            </div>
            <div class="ctrl-row">
                <span class="ctrl-label">隐藏答案</span>
                <label class="switch">
                    <input type="checkbox" id="hide-toggle" onchange="renderCurrent()">
                    <span class="slider"></span>
                </label>
            </div>
        </footer>

        <div class="copyright">
            仅供学习・禁止商用 © 2026｜如有疑问可联系：FMI <span class="clickable" onclick="showQR()">王鹤</span> 
            Ver <span class="clickable" onclick="goAdmin()">1.0</span>
        </div>
    </main>

    <div id="qr-modal" class="modal-overlay" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <img src="Wang_he.jpg" style="width:280px; height:280px; border-radius:20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <p style="color:white; margin-top:20px; font-weight:bold; font-size:1.2rem;">微信扫码联系 王鹤</p>
        </div>
    </div>

    <div id="admin-modal" class="modal-overlay">
        <div class="modal-content" style="width:600px;">
            <h3 style="color:white; margin-bottom:15px;">Hot-Code 管理后台</h3>
            <textarea id="hotcode-input" style="width:100%; height:300px; background:#0f172a; color:#10b981; padding:15px; border-radius:15px; font-family:monospace; border:1px solid #334155; outline:none;"></textarea>
            <div style="margin-top:20px; display:flex; gap:15px; justify-content:flex-end;">
                <button onclick="document.getElementById('admin-modal').style.display='none'" style="background:#475569; color:white; border:none; padding:10px 25px; border-radius:10px; cursor:pointer;">取消</button>
                <button onclick="applyHotCode()" style="background:var(--accent); color:white; border:none; padding:10px 25px; border-radius:10px; cursor:pointer; font-weight:bold;">应用更新</button>
            </div>
        </div>
    </div>

    <script>
        let db = {};
        let favs = JSON.parse(localStorage.getItem('fmi_v1_favs') || '[]');
        let curCat = "1", curIdx = 0, isLive = false;

        async function init() {
            try {
                const r = await fetch('./indonesian_learning_data.json?t=' + Date.now());
                db = await r.json();
                buildMenu();
                showWord("1", 0);
            } catch(e) { console.error("Data error"); }
        }

        function buildMenu() {
            const box = document.getElementById('menu-box');
            let favHtml = `<div class="cat-item">
                <div class="cat-head" style="color:#fbbf24" onclick="this.nextElementSibling.classList.toggle('active')">
                    <span>⭐ 我的收藏 (${favs.length})</span><i class="fas fa-chevron-down"></i>
                </div>
                <div class="sub-menu" id="fav-list">
                    ${favs.map((w, i) => `<div style="display:flex; justify-content:space-between; padding:8px; font-size:13px; color:#94a3b8; cursor:pointer;" onclick="showFav(${i})">
                        <span>${i+1}. ${w.indonesian}</span>
                        <i class="fas fa-trash-alt" style="color:#ef4444" onclick="delFav(event, ${i})"></i>
                    </div>`).join('')}
                    ${favs.length > 0 ? `<button onclick="clearAllFav(event)" style="width:100%; margin-top:10px; background:none; border:1px solid #ef4444; color:#ef4444; padding:5px; border-radius:8px; font-size:11px; cursor:pointer;">清空收藏夹</button>` : ''}
                </div>
            </div>`;
            
            let dbHtml = "";
            for(let id in db) {
                const words = db[id].lessons["1"].words;
                dbHtml += `<div class="cat-item">
                    <div class="cat-head" onclick="this.nextElementSibling.classList.toggle('active')"><span>${db[id].name}</span><i class="fas fa-chevron-down"></i></div>
                    <div class="sub-menu ${id==curCat?'active':''}">
                        ${words.map((w,i)=>`<div style="padding:8px 10px; font-size:13px; color:#94a3b8; cursor:pointer;" onclick="showWord('${id}',${i})">${i+1}. ${w.indonesian}</div>`).join('')}
                    </div>
                </div>`;
            }
            box.innerHTML = favHtml + dbHtml;
        }

        function renderCurrent() {
            const card = document.getElementById('main-card');
            card.classList.add('card-anim');
            setTimeout(() => {
                const list = curCat === 'fav' ? favs : db[curCat]?.lessons["1"]?.words;
                if(!list || list.length === 0) return;
                const word = list[curIdx];
                const isHidden = document.getElementById('hide-toggle').checked;
                
                document.getElementById('disp-indo').innerText = word.indonesian;
                document.getElementById('disp-zh').innerText = isHidden ? '••••••' : word.chinese;
                document.getElementById('word-idx').innerText = (curIdx + 1).toString().padStart(2, '0');
                
                const isF = favs.some(f => f.indonesian === word.indonesian);
                document.getElementById('fav-trigger').className = 'star-btn' + (isF ? ' active' : '');
                card.classList.remove('card-anim');
            }, 180);
        }

        function handleFav() {
            const list = curCat === 'fav' ? favs : db[curCat].lessons["1"].words;
            const word = list[curIdx];
            const i = favs.findIndex(f => f.indonesian === word.indonesian);
            if(i > -1) favs.splice(i, 1); else favs.push(word);
            localStorage.setItem('fmi_v1_favs', JSON.stringify(favs));
            buildMenu(); renderCurrent();
        }

        function delFav(e, i) { e.stopPropagation(); favs.splice(i, 1); localStorage.setItem('fmi_v1_favs', JSON.stringify(favs)); buildMenu(); renderCurrent(); }
        function clearAllFav(e) { e.stopPropagation(); if(confirm("确定清空收藏夹？")) { favs=[]; localStorage.setItem('fmi_v1_favs', '[]'); buildMenu(); renderCurrent(); }}
        
        function showWord(cat, idx) { stopVoice(); curCat = cat; curIdx = idx; renderCurrent(); buildMenu(); }
        function showFav(idx) { stopVoice(); curCat = 'fav'; curIdx = idx; renderCurrent(); }
        function navWord(dir) { stopVoice(); const list = curCat === 'fav' ? favs : db[curCat].lessons["1"].words; curIdx = (curIdx + dir + list.length) % list.length; renderCurrent(); }

        function toggleSpeech() { isLive ? stopVoice() : startVoice(); }
        function startVoice() {
            const list = curCat === 'fav' ? favs : db[curCat].lessons["1"].words;
            const word = list[curIdx];
            const rate = parseFloat(document.getElementById('inp-rate').value);
            const loops = parseInt(document.getElementById('inp-loop').value);
            isLive = true;
            document.getElementById('play-ico').className = 'fas fa-stop';
            document.getElementById('main-play').classList.add('playing');
            
            let c = 0;
            const run = () => {
                if(!isLive || c >= loops) { stopVoice(); return; }
                const u = new SpeechSynthesisUtterance(word.indonesian);
                u.lang = 'id-ID'; 
                u.rate = rate;
                // 补偿：低速时略微调低音调，使其发音更沉稳不破碎
                u.pitch = rate < 0.5 ? 0.9 : 1.0; 
                u.onend = () => { c++; if(isLive) setTimeout(run, 500); };
                window.speechSynthesis.speak(u);
            };
            run();
        }
        function stopVoice() { isLive = false; window.speechSynthesis.cancel(); document.getElementById('play-ico').className = 'fas fa-play'; document.getElementById('main-play').classList.remove('playing'); }

        function updateSetting(t, v) { document.getElementById('val-'+t).innerText = v; }
        function showQR() { document.getElementById('qr-modal').style.display = 'flex'; }
        function goAdmin() { if(prompt("Pass:")==="admin123") document.getElementById('admin-modal').style.display='flex'; }
        function applyHotCode() {
            const code = document.getElementById('hotcode-input').value;
            if(code) { document.open(); document.write(code); document.close(); }
        }

        init();
    </script>
</body>
</html>
