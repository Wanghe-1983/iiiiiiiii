<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印尼语学习小助手</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #030712;
            --glass: rgba(17, 24, 39, 0.85);
            --glass-light: rgba(255, 255, 255, 0.05);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --text-main: #f9fafb;
            --text-muted: #94a3b8;
            --sidebar-w: 300px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.18) 0px, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            font-family: 'Inter', 'PingFang SC', sans-serif;
            height: 100vh; display: flex; overflow: hidden;
        }

        /* --- 侧边栏 --- */
        .sidebar {
            width: var(--sidebar-w); height: 100%; background: var(--glass); backdrop-filter: blur(30px);
            border-right: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column;
            transition: all 0.45s cubic-bezier(0.4, 0, 0.2, 1); position: relative; z-index: 1000;
        }
        .sidebar.collapsed { width: 0; transform: translateX(calc(var(--sidebar-w) * -1)); }
        .sidebar-inner { width: var(--sidebar-w); height: 100%; overflow-y: auto; padding: 30px 20px; transition: opacity 0.3s; }
        .sidebar.collapsed .sidebar-inner { opacity: 0; }
        
        .toggle-sidebar {
            position: absolute; right: -36px; top: 40px; width: 36px; height: 44px;
            background: var(--accent); border: none; color: white; cursor: pointer;
            border-radius: 0 10px 10px 0; display: flex; align-items: center; justify-content: center;
            box-shadow: 4px 0 15px var(--accent-glow);
        }

        /* 目录美化 */
        .cat-item { margin-bottom: 14px; border-radius: 14px; background: var(--glass-light); overflow: hidden; border: 1px solid rgba(255,255,255,0.03); }
        .cat-head { padding: 14px 18px; cursor: pointer; font-weight: 600; font-size: 0.95rem; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .cat-head:hover { background: rgba(255,255,255,0.05); }
        .sub-menu { display: none; padding: 5px 12px 12px; }
        .sub-menu.active { display: block; animation: slideIn 0.3s ease; }
        .menu-link { padding: 10px 14px; font-size: 0.88rem; color: var(--text-muted); cursor: pointer; border-radius: 10px; margin: 4px 0; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .menu-link:hover { background: rgba(99,102,241,0.12); color: white; }
        .menu-link.active { background: var(--accent); color: white; box-shadow: 0 4px 15px var(--accent-glow); }

        /* 主学习区 */
        .main-container { flex: 1; display: flex; flex-direction: column; padding: 40px; position: relative; overflow: hidden; }
        .study-card {
            background: rgba(30, 41, 59, 0.3); border-radius: 60px; border: 1px solid rgba(255,255,255,0.08);
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; padding: 40px; box-shadow: 0 50px 100px -20px rgba(0,0,0,0.6);
            backdrop-filter: blur(15px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card-anim { transform: scale(0.96); opacity: 0; }

        .top-meta { position: absolute; top: 45px; left: 60px; right: 60px; display: flex; justify-content: space-between; align-items: center; }
        .word-badge { background: var(--accent); color: white; padding: 6px 20px; border-radius: 14px; font-style: italic; font-weight: 800; font-size: 1.2rem; }
        .star-btn { font-size: 2.4rem; cursor: pointer; color: rgba(255,255,255,0.08); transition: 0.3s; }
        .star-btn.active { color: #fbbf24; text-shadow: 0 0 20px rgba(251, 191, 36, 0.3); }

        .indo-box { font-size: 5.5rem; font-weight: 900; margin-bottom: 10px; text-align: center; letter-spacing: -2px; }
        .zh-box { font-size: 2.4rem; color: var(--text-muted); font-weight: 300; letter-spacing: 2px; }

        /* --- 功能控制面板 --- */
        .control-panel {
            width: 100%; max-width: 800px; margin: 40px auto 0; background: var(--glass);
            padding: 30px 50px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; gap: 25px;
        }
        .ctrl-row { display: flex; align-items: center; justify-content: space-between; }
        .ctrl-label { font-size: 1rem; color: var(--text-muted); font-weight: 500; letter-spacing: 1px; }
        .ctrl-widget { display: flex; align-items: center; gap: 20px; flex: 0.7; }
        .ctrl-slider { flex: 1; height: 5px; -webkit-appearance: none; background: #1e293b; border-radius: 10px; outline: none; }
        .ctrl-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--accent); border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px var(--accent-glow); }
        .ctrl-value { min-width: 60px; font-family: 'JetBrains Mono', monospace; color: var(--accent); font-weight: bold; font-size: 1.1rem; text-align: right; }

        .switch { position: relative; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #1e293b; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(24px); }

        /* 按钮组 */
        .nav-row { display: flex; gap: 40px; margin-top: 50px; }
        .circle-btn { width: 80px; height: 80px; border-radius: 50%; border: none; background: var(--glass-light); color: white; font-size: 1.8rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .circle-btn:hover { background: var(--accent); transform: translateY(-5px); box-shadow: 0 10px 25px var(--accent-glow); }
        .play-btn { width: 100px; height: 100px; background: var(--accent); font-size: 2.5rem; }
        .playing { background: #ef4444 !important; animation: pulse 1.5s infinite; }

        /* 后台管理面板弹窗 */
        .admin-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .admin-content { background: #1e293b; width: 90%; max-width: 600px; padding: 30px; border-radius: 24px; border: 1px solid var(--accent); }
        .admin-textarea { width: 100%; height: 300px; background: #0f172a; color: #10b981; border: 1px solid #334155; padding: 15px; border-radius: 12px; font-family: monospace; margin: 15px 0; resize: none; outline: none; }
        .btn-group { display: flex; gap: 15px; justify-content: flex-end; }
        .admin-btn { padding: 10px 25px; border-radius: 10px; cursor: pointer; border: none; font-weight: bold; }

        .copyright { font-size: 0.85rem; text-align: center; color: #475569; margin-top: 30px; }
        .clickable { color: var(--accent); cursor: pointer; font-weight: bold; text-decoration: underline; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 100% { box-shadow: 0 0 0 25px rgba(239, 68, 68, 0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <button class="toggle-sidebar" onclick="document.getElementById('sidebar').classList.toggle('collapsed')">
            <i class="fas fa-bars"></i>
        </button>
        <div class="sidebar-inner" id="menu-box"></div>
    </aside>

    <main class="main-container">
        <header><h1 style="text-align: center; font-size: 2.8rem; font-weight: 900; margin-bottom: 25px; background: linear-gradient(to right, #fff, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">印尼语学习小助手</h1></header>

        <section class="study-card" id="main-card">
            <div class="top-meta">
                <div class="word-badge" id="word-idx">01</div>
                <div class="star-btn" id="fav-trigger" onclick="handleFav()"><i class="fas fa-star"></i></div>
            </div>
            <div class="indo-box" id="disp-indo">Loading</div>
            <div class="zh-box" id="disp-zh">请稍等</div>
            <div class="nav-row">
                <button class="circle-btn" onclick="navWord(-1)"><i class="fas fa-chevron-left"></i></button>
                <button id="main-play" class="circle-btn play-btn" onclick="toggleSpeech()"><i class="fas fa-play" id="play-ico"></i></button>
                <button class="circle-btn" onclick="navWord(1)"><i class="fas fa-chevron-right"></i></button>
            </div>
        </section>

        <footer class="control-panel">
            <div class="ctrl-row">
                <span class="ctrl-label">语音语速</span>
                <div class="ctrl-widget">
                    <input type="range" class="ctrl-slider" id="inp-rate" min="0.1" max="1.5" step="0.1" value="0.8" oninput="updateSetting('rate', this.value)">
                    <span class="ctrl-value"><span id="val-rate">0.8</span>x</span>
                </div>
            </div>
            <div class="ctrl-row">
                <span class="ctrl-label">循环播放</span>
                <div class="ctrl-widget">
                    <input type="range" class="ctrl-slider" id="inp-loop" min="1" max="10" step="1" value="1" oninput="updateSetting('loop', this.value)">
                    <span class="ctrl-value"><span id="val-loop">1</span>次</span>
                </div>
            </div>
            <div class="ctrl-row">
                <span class="ctrl-label">隐藏答案</span>
                <div class="switch">
                    <input type="checkbox" id="hide-toggle" onchange="renderCurrent()">
                    <span class="slider"></span>
                </div>
            </div>
        </footer>

        <div class="copyright">
            仅供学习，禁止商用。 如有问题请 FMI <span class="clickable" onclick="showQR()">王鹤</span> 联系 
            当前版本：<span class="clickable" onclick="openAdmin()">V1.02</span>
        </div>
    </main>

    <div id="admin-modal" class="admin-modal">
        <div class="admin-content">
            <h3 style="color:white; margin-bottom: 10px;">热代码管理模式</h3>
            <p style="color:#94a3b8; font-size:0.8rem;">在此处粘贴新的 HTML/JS 代码，点击“即时更新”应用更改。</p>
            <textarea id="admin-code" class="admin-textarea" placeholder="在此输入代码..."></textarea>
            <div class="btn-group">
                <button class="admin-btn" onclick="closeAdmin()" style="background:#334155; color:white;">取消</button>
                <button class="admin-btn" onclick="applyHotCode()" style="background:var(--accent); color:white;">即时更新</button>
            </div>
        </div>
    </div>

    <div id="qr-modal" class="admin-modal" onclick="this.style.display='none'">
        <div class="admin-content" style="max-width:320px; text-align:center;" onclick="event.stopPropagation()">
            <img src="Wang_he.jpg" style="width:260px; height:260px; border-radius:15px; display:block; margin:0 auto;">
            <p style="color:white; margin-top:15px; font-weight:bold;">微信扫码联系 王鹤</p>
        </div>
    </div>

    <script>
        let db = {};
        let favs = JSON.parse(localStorage.getItem('fmi_v1_favs') || '[]');
        let curCat = "1", curIdx = 0, isLive = false;

        async function init() {
            try {
                const r = await fetch('./indonesian_learning_data.json?t=' + Date.now());
                db = await r.json();
                buildMenu();
                showWord("1", 0);
            } catch(e) { console.error("Data error"); }
        }

        function buildMenu() {
            const box = document.getElementById('menu-box');
            let favHtml = `<div class="cat-item">
                <div class="cat-head" style="color:#fbbf24" onclick="this.nextElementSibling.classList.toggle('active')">
                    <span>⭐ 我的收藏 (${favs.length})</span><i class="fas fa-chevron-down"></i>
                </div>
                <div class="sub-menu">
                    ${favs.map((w, i) => `<div class="menu-link" onclick="showFav(${i})">
                        <span>${i+1}. ${w.indonesian}</span>
                        <i class="fas fa-times-circle" onclick="delFav(event, ${i})" style="color:#ef4444; opacity:0.6"></i>
                    </div>`).join('')}
                    ${favs.length > 0 ? `<div style="text-align:center; padding-top:10px;"><button onclick="clearAllFav(event)" style="color:#f87171; background:none; border:1px solid rgba(248,113,113,0.3); padding:5px 15px; border-radius:20px; cursor:pointer; font-size:12px;">一键清空收藏</button></div>` : ''}
                </div>
            </div>`;
            
            let dbHtml = "";
            for(let id in db) {
                const words = db[id].lessons["1"].words;
                dbHtml += `<div class="cat-item">
                    <div class="cat-head" onclick="this.nextElementSibling.classList.toggle('active')"><span>${db[id].name}</span><i class="fas fa-chevron-down"></i></div>
                    <div class="sub-menu ${id==curCat?'active':''}">
                        ${words.map((w,i)=>`<div class="menu-link ${id==curCat && i==curIdx?'active':''}" onclick="showWord('${id}',${i})">${i+1}. ${w.indonesian}</div>`).join('')}
                    </div>
                </div>`;
            }
            box.innerHTML = favHtml + dbHtml;
        }

        function renderCurrent() {
            const card = document.getElementById('main-card');
            card.classList.add('card-anim');
            setTimeout(() => {
                const list = curCat === 'fav' ? favs : db[curCat]?.lessons["1"]?.words;
                if(!list || list.length === 0) return;
                const word = list[curIdx];
                const hide = document.getElementById('hide-toggle').checked;
                
                document.getElementById('disp-indo').innerText = word.indonesian;
                document.getElementById('disp-zh').innerText = hide ? '••••••' : word.chinese;
                document.getElementById('word-idx').innerText = (curIdx + 1).toString().padStart(2, '0');
                
                const isF = favs.some(f => f.indonesian === word.indonesian);
                document.getElementById('fav-trigger').className = 'star-btn' + (isF ? ' active' : '');
                card.classList.remove('card-anim');
            }, 150);
        }

        function handleFav() {
            const list = curCat === 'fav' ? favs : db[curCat].lessons["1"].words;
            const word = list[curIdx];
            const i = favs.findIndex(f => f.indonesian === word.indonesian);
            if(i > -1) favs.splice(i, 1); else favs.push(word);
            localStorage.setItem('fmi_v1_favs', JSON.stringify(favs));
            buildMenu(); renderCurrent();
        }

        function delFav(e, i) { e.stopPropagation(); favs.splice(i, 1); localStorage.setItem('fmi_v1_favs', JSON.stringify(favs)); buildMenu(); renderCurrent(); if(curCat==='fav' && favs.length===0) showWord("1",0); }
        function clearAllFav(e) { e.stopPropagation(); if(confirm("确定清空？")) { favs=[]; localStorage.setItem('fmi_v1_favs', '[]'); buildMenu(); renderCurrent(); if(curCat==='fav') showWord("1",0); } }
        
        function showWord(cat, idx) { stopVoice(); curCat = cat; curIdx = idx; renderCurrent(); buildMenu(); }
        function showFav(idx) { stopVoice(); curCat = 'fav'; curIdx = idx; renderCurrent(); }
        function navWord(dir) { stopVoice(); const list = curCat === 'fav' ? favs : db[curCat].lessons["1"].words; curIdx = (curIdx + dir + list.length) % list.length; renderCurrent(); }

        function toggleSpeech() { isLive ? stopVoice() : startVoice(); }
        function startVoice() {
            const list = curCat === 'fav' ? favs : db[curCat].lessons["1"].words;
            const word = list[curIdx];
            const rate = parseFloat(document.getElementById('inp-rate').value);
            const loops = parseInt(document.getElementById('inp-loop').value);
            isLive = true;
            document.getElementById('play-ico').className = 'fas fa-stop';
            document.getElementById('main-play').classList.add('playing');
            let c = 0;
            const run = () => {
                if(!isLive || c >= loops) { stopVoice(); return; }
                const u = new SpeechSynthesisUtterance(word.indonesian);
                u.lang = 'id-ID'; u.rate = rate;
                u.onend = () => { c++; if(isLive) setTimeout(run, 400); };
                window.speechSynthesis.speak(u);
            };
            run();
        }
        function stopVoice() { isLive = false; window.speechSynthesis.cancel(); document.getElementById('play-ico').className = 'fas fa-play'; document.getElementById('main-play').classList.remove('playing'); }

        function updateSetting(t, v) { document.getElementById('val-'+t).innerText = v; }
        function showQR() { document.getElementById('qr-modal').style.display = 'flex'; }
        
        // 管理员功能
        function openAdmin() {
            if(prompt("请输入管理员密码：") === "admin123") {
                document.getElementById('admin-modal').style.display = 'flex';
            }
        }
        function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }
        function applyHotCode() {
            const code = document.getElementById('admin-code').value;
            if(code) {
                document.open();
                document.write(code);
                document.close();
            }
        }

        init();
    </script>
</body>
</html>
