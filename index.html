<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>印尼语自学小程序 - 听力口语记忆版</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    /* ========== 全局样式与CSS变量 ========== */
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      font-family: "PingFang SC", "Microsoft Yahei", sans-serif; 
    }
    :root {
      --primary: #3668F6;
      --primary-light: #5A86FF;
      --success: #34C759;
      --warning: #FF9500;
      --danger: #FF3B30;
      --gray-50: #F9FAFB;
      --gray-100: #F2F3F5;
      --gray-200: #E5E6EB;
      --gray-300: #C9CDD4;
      --gray-600: #86909C;
      --gray-800: #1D2129;
      --white: #FFFFFF;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
    }
    body {
      background: #F0F2F7;
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 页面切换动画 */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .slide-animate { animation: slideIn 0.3s ease-in-out; }

    /* 通用容器 */
    .page-container {
      max-width: 500px;
      width: 100%;
      background: var(--white);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    /* 头部样式 */
    .header {
      padding: 20px 24px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: var(--white);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
    }
    .header h2 {
      font-size: 18px;
      font-weight: 600;
      margin: 0;
      cursor: pointer;
    }
    .header-subtitle {
      font-size: 12px;
      opacity: 0.9;
      margin-top: 4px;
    }
    .header-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    /* 内容区域 */
    .content { 
      padding: 24px;
      overflow-y: auto;
      max-height: calc(90vh - 100px);
    }

    /* 通用组件 */
    .input-control {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-md);
      margin: 8px 0 16px;
      font-size: 14px;
      transition: all 0.2s;
    }
    .input-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(54, 104, 246, 0.1);
    }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-weight: 500;
      font-size: 14px;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-primary {
      background: var(--primary);
      color: var(--white);
      width: 100%;
      margin: 8px 0;
    }
    .btn-primary:hover {
      background: var(--primary-light);
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--primary);
      color: var(--primary);
    }
    .btn-outline:hover {
      background: var(--primary);
      color: var(--white);
    }
    .btn-success { background: var(--success); color: white; }
    .btn-warning { background: var(--warning); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-sm {
      padding: 8px 16px;
      font-size: 13px;
    }

    .hidden { display: none !important; }

    /* 版权声明 */
    .copyright {
      text-align: center;
      font-size: 11px;
      color: var(--gray-600);
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--gray-100);
      line-height: 1.6;
    }
    .copyright .red-text {
      color: var(--danger);
      font-weight: bold;
    }

    /* 弹窗样式 */
    .modal-mask {
      position: fixed; 
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); 
      z-index: 1000; 
      display: flex; 
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
    }
    .modal-box {
      background: var(--white); 
      padding: 24px; 
      border-radius: var(--radius-lg); 
      width: 90%;
      max-width: 450px;
      box-shadow: var(--shadow-lg);
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-box h3 {
      margin: 0 0 16px;
      font-size: 18px;
      text-align: center;
    }
    .modal-footer {
      text-align: center;
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    /* 目录弹窗 */
    .catalog-modal {
      max-width: 380px;
    }
    .catalog-item {
      padding: 14px 16px;
      border-bottom: 1px solid var(--gray-100);
      cursor: pointer;
      transition: all 0.2s;
      border-radius: var(--radius-sm);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .catalog-item:hover {
      background: var(--gray-50);
      color: var(--primary);
    }
    .catalog-item.active {
      background: rgba(54, 104, 246, 0.1);
      color: var(--primary);
      font-weight: 500;
    }
    .catalog-item .index {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--gray-100);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      margin-right: 12px;
    }
    .catalog-item.active .index {
      background: var(--primary);
      color: white;
    }

    /* 功能按钮区 */
    .func-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .func-btn {
      padding: 32px 12px;
      border-radius: var(--radius-md);
      background: var(--gray-100);
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .func-btn:hover {
      background: var(--primary);
      color: var(--white);
      transform: translateY(-2px);
    }
    .func-btn i {
      font-size: 20px;
    }

    /* 学习/练习卡片 */
    .study-card {
      background: var(--gray-100);
      border-radius: var(--radius-lg);
      padding: 32px 24px;
      margin: 0 0 20px;
      border: 1px solid var(--gray-200);
      text-align: center;
    }
    .study-card .word-indo {
      font-size: 28px;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 12px;
    }
    .study-card .word-cn {
      font-size: 18px;
      color: var(--gray-800);
      margin-bottom: 8px;
    }
    .study-card .word-pron {
      font-size: 14px;
      color: var(--gray-600);
      font-style: italic;
    }
    .study-card .answer-input {
      margin-top: 20px;
    }

    /* 集成式朗读按钮 */
    .play-control-btn {
      width: 100%;
      padding: 14px;
      border-radius: var(--radius-md);
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .play-control-btn.play {
      background: var(--primary);
      color: white;
    }
    .play-control-btn.play:hover {
      background: var(--primary-light);
    }
    .play-control-btn.stop {
      background: var(--danger);
      color: white;
    }
    .play-control-btn.stop:hover {
      background: #E6352B;
    }

    /* 自动朗读开关 */
    .auto-play-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-md);
      margin-bottom: 16px;
    }
    .auto-play-toggle label {
      font-size: 14px;
      color: var(--gray-800);
      margin: 0;
    }
    .form-check-input:checked {
      background-color: var(--primary);
      border-color: var(--primary);
    }

    /* 学习进度条 */
    .progress-bar-container {
      height: 6px;
      background: var(--gray-200);
      border-radius: 3px;
      margin: 20px 0;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary) 0%, var(--primary-light) 100%);
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    /* 管理员后台样式 */
    .admin-page {
      max-width: 700px !important;
    }
    .admin-sidebar {
      background: #1F2329;
      color: var(--white);
      padding: 16px 24px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .admin-menu-item {
      padding: 8px 16px;
      background: rgba(255,255,255,0.1);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
    }
    .admin-menu-item.active {
      background: var(--primary);
      color: var(--white);
    }
    .admin-content {
      padding: 24px;
    }

    /* 课程管理专属样式 */
    .vocab-item {
      padding: 12px 16px;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-md);
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--white);
    }
    .vocab-item .vocab-info {
      flex: 1;
    }
    .vocab-item .vocab-actions {
      display: flex;
      gap: 8px;
    }
    .file-upload-area {
      border: 2px dashed var(--gray-300);
      border-radius: var(--radius-md);
      padding: 24px;
      text-align: center;
      margin-bottom: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .file-upload-area:hover {
      border-color: var(--primary);
      background: rgba(54, 104, 246, 0.05);
    }
    .file-upload-area i {
      font-size: 32px;
      color: var(--gray-600);
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="page-container" id="mainPage">
    <!-- 头部 -->
    <div class="header">
      <div>
        <h2 id="headerTitle">印尼语自学小程序</h2>
        <div class="header-subtitle">听力 · 口语 · 记忆</div>
      </div>
      <div class="d-flex align-items-center gap-2">
        <button class="header-btn" id="catalogBtn">
          <i class="bi bi-list"></i> 目录
        </button>
      </div>
    </div>

    <!-- 首页内容区 -->
    <div class="content slide-animate" id="mainContent">
      <div class="func-buttons">
        <button class="func-btn" id="learnBtn">
          <i class="bi bi-ear"></i>
          <span>听力学习</span>
        </button>
        <button class="func-btn" id="practiceBtn">
          <i class="bi bi-pencil"></i>
          <span>记忆练习</span>
        </button>
      </div>

      <div class="copyright">
        © 2025 印尼语自学小程序
        <div class="red-text">禁止商用，仅供学习使用</div>
      </div>
    </div>

    <!-- 听力学习页面 (默认隐藏) -->
    <div class="content hidden" id="learnPage">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <button class="btn btn-outline btn-sm" id="learnBackBtn">
          <i class="bi bi-arrow-left"></i> 返回
        </button>
        <span class="text-sm text-gray-600" id="learnProgressText">1 / 10</span>
      </div>

      <div class="progress-bar-container">
        <div class="progress-bar-fill" id="learnProgressBar" style="width: 10%;"></div>
      </div>

      <div class="study-card">
        <div class="word-indo" id="learnWordIndo">Halo</div>
        <div class="word-cn" id="learnWordCn">你好</div>
        <div class="word-pron" id="learnWordPron">哈罗</div>
      </div>

      <div class="auto-play-toggle">
        <label for="autoPlayLearn">自动朗读下一词</label>
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="autoPlayLearn">
        </div>
      </div>

      <button class="play-control-btn play" id="learnPlayBtn">
        <i class="bi bi-play-fill"></i>
        <span id="learnPlayText">开始朗读</span>
      </button>

      <div class="d-flex justify-content-between mt-4">
        <button class="btn btn-outline" id="learnPrevBtn">
          <i class="bi bi-arrow-left"></i> 上一词
        </button>
        <button class="btn btn-primary" id="learnNextBtn">
          下一词 <i class="bi bi-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- 记忆练习页面 (默认隐藏) -->
    <div class="content hidden" id="practicePage">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <button class="btn btn-outline btn-sm" id="practiceBackBtn">
          <i class="bi bi-arrow-left"></i> 返回
        </button>
        <span class="text-sm text-gray-600" id="practiceProgressText">1 / 10</span>
      </div>

      <div class="progress-bar-container">
        <div class="progress-bar-fill" id="practiceProgressBar" style="width: 10%;"></div>
      </div>

      <div class="study-card">
        <div class="word-indo" id="practiceWordIndo">Halo</div>
        <div class="word-pron mb-3" id="practiceWordPron">哈罗</div>
        
        <input type="text" class="input-control answer-input" placeholder="请输入中文释义" id="practiceAnswerInput">
        
        <div class="word-cn hidden" id="practiceWordCn">你好</div>
        <div class="answer-feedback hidden mt-3" id="practiceFeedback"></div>
      </div>

      <div class="auto-play-toggle">
        <label for="autoPlayPractice">自动朗读题目</label>
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="autoPlayPractice" checked>
        </div>
      </div>

      <div class="d-flex gap-2">
        <button class="play-control-btn play flex-1" id="practicePlayBtn">
          <i class="bi bi-play-fill"></i>
          <span id="practicePlayText">朗读题目</span>
        </button>
        <button class="btn btn-primary flex-1" id="practiceSubmitBtn">
          <i class="bi bi-check"></i> 提交答案
        </button>
      </div>

      <div class="d-flex justify-content-between mt-4">
        <button class="btn btn-outline" id="practicePrevBtn">
          <i class="bi bi-arrow-left"></i> 上一题
        </button>
        <button class="btn btn-primary" id="practiceNextBtn">
          下一题 <i class="bi bi-arrow-right"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- 目录弹窗 (默认隐藏) -->
  <div class="modal-mask hidden" id="catalogModal">
    <div class="modal-box catalog-modal">
      <h3>课程目录</h3>
      <div id="catalogList" class="mt-3">
        <!-- 动态加载目录列表 -->
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="closeCatalogBtn">关闭</button>
      </div>
    </div>
  </div>

  <!-- 管理员密码弹窗 (默认隐藏) -->
  <div class="modal-mask hidden" id="adminPasswordModal">
    <div class="modal-box">
      <h3>管理员验证</h3>
      <input type="password" class="input-control" placeholder="请输入管理员密码" id="adminPasswordInput">
      <div class="modal-footer">
        <button class="btn btn-outline" id="cancelAdminBtn">取消</button>
        <button class="btn btn-primary" id="verifyAdminBtn">验证</button>
      </div>
    </div>
  </div>

  <!-- 编辑词汇弹窗 (默认隐藏) -->
  <div class="modal-mask hidden" id="editVocabModal">
    <div class="modal-box">
      <h3>编辑词汇</h3>
      <div class="mb-3">
        <label class="form-label">印尼语词汇</label>
        <input type="text" class="input-control" id="editVocabIndo">
      </div>
      <div class="mb-3">
        <label class="form-label">中文释义</label>
        <input type="text" class="input-control" id="editVocabCn">
      </div>
      <div class="mb-3">
        <label class="form-label">发音提示</label>
        <input type="text" class="input-control" id="editVocabPron">
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="cancelEditVocabBtn">取消</button>
        <button class="btn btn-primary" id="saveEditVocabBtn">保存</button>
      </div>
    </div>
  </div>

  <!-- 管理员后台 (默认隐藏) -->
  <div class="page-container admin-page hidden" id="adminPage">
    <div class="header">
      <div>
        <h2>管理员后台</h2>
        <div class="header-subtitle">课程管理</div>
      </div>
      <button class="header-btn" id="exitAdminBtn">
        <i class="bi bi-x"></i> 退出
      </button>
    </div>
    <div class="admin-sidebar">
      <div class="admin-menu-item active" data-admin-target="vocabManage">词汇管理</div>
    </div>
    <div class="admin-content" id="adminContent">
      <!-- 词汇管理 -->
      <div id="vocabManage" class="admin-panel">
        <h4>词汇管理</h4>
        
        <!-- 文件上传区域 -->
        <div class="file-upload-area" id="vocabUploadArea">
          <i class="bi bi-cloud-upload"></i>
          <div class="mb-2">点击或拖拽上传课程文件 (JSON格式)</div>
          <div class="form-text text-muted">格式示例：[{"indo":"Halo","cn":"你好","pron":"哈罗"}]</div>
          <input type="file" id="vocabFileInput" accept=".json" class="hidden">
        </div>

        <!-- 单个添加 -->
        <div class="row g-2 mb-4">
          <div class="col-md-4">
            <input type="text" class="input-control" placeholder="印尼语词汇" id="newVocabIndo">
          </div>
          <div class="col-md-4">
            <input type="text" class="input-control" placeholder="中文释义" id="newVocabCn">
          </div>
          <div class="col-md-4">
            <input type="text" class="input-control" placeholder="发音提示" id="newVocabPron">
          </div>
        </div>
        <button class="btn btn-primary" id="addVocabBtn">
          <i class="bi bi-plus"></i> 添加词汇
        </button>

        <!-- 词汇列表 -->
        <div id="vocabManageList" class="mt-4">
          <!-- 动态加载词汇列表 -->
        </div>
      </div>
    </div>
  </div>

  <script>
    // ========== 全局变量 ==========
    let vocabList = JSON.parse(localStorage.getItem('indonesian_vocab') || '[]');
    let currentLearnIndex = 0;
    let currentPracticeIndex = 0;
    let isPlaying = false;
    let autoPlayTimer = null;
    let editingVocabIndex = -1;

    // 默认示例数据
    if (vocabList.length === 0) {
      vocabList = [
        { indo: 'Halo', cn: '你好', pron: '哈罗' },
        { indo: 'Terima kasih', cn: '谢谢', pron: '泰里马 卡希' },
        { indo: 'Selamat pagi', cn: '早上好', pron: '斯拉马 帕吉' },
        { indo: 'Selamat siang', cn: '下午好', pron: '斯拉马 相' },
        { indo: 'Selamat malam', cn: '晚上好', pron: '斯拉马 马兰' },
        { indo: 'Selamat tinggal', cn: '再见', pron: '斯拉马 停加尔' },
        { indo: 'Apa kabar?', cn: '你好吗？', pron: '阿帕 卡巴尔' },
        { indo: 'Baik-baik saja', cn: '我很好', pron: '巴伊克-巴伊克 萨扎' },
        { indo: 'Nama saya', cn: '我的名字是', pron: '纳马 萨亚' },
        { indo: 'Senang bertemu denganmu', cn: '很高兴认识你', pron: '斯南 贝尔特穆 德甘穆' }
      ];
      saveVocabData();
    }

    // ========== 页面初始化 ==========
    window.onload = function() {
      bindEvents();
      renderCatalog();
      renderVocabList();
      updateLearnDisplay();
      updatePracticeDisplay();
    };

    // ========== 数据持久化 ==========
    function saveVocabData() {
      localStorage.setItem('indonesian_vocab', JSON.stringify(vocabList));
    }

    // ========== 事件绑定 ==========
    function bindEvents() {
      // 首页功能按钮
      document.getElementById('learnBtn').addEventListener('click', () => showPage('learnPage'));
      document.getElementById('practiceBtn').addEventListener('click', () => showPage('practicePage'));

      // 目录
      document.getElementById('catalogBtn').addEventListener('click', () => showModal('catalogModal'));
      document.getElementById('closeCatalogBtn').addEventListener('click', () => hideModal('catalogModal'));

      // 学习页面
      document.getElementById('learnBackBtn').addEventListener('click', () => showPage('mainContent'));
      document.getElementById('learnPrevBtn').addEventListener('click', learnPrev);
      document.getElementById('learnNextBtn').addEventListener('click', learnNext);
      document.getElementById('learnPlayBtn').addEventListener('click', toggleLearnPlay);
      document.getElementById('autoPlayLearn').addEventListener('change', handleAutoPlayChange);

      // 练习页面
      document.getElementById('practiceBackBtn').addEventListener('click', () => showPage('mainContent'));
      document.getElementById('practicePrevBtn').addEventListener('click', practicePrev);
      document.getElementById('practiceNextBtn').addEventListener('click', practiceNext);
      document.getElementById('practicePlayBtn').addEventListener('click', togglePracticePlay);
      document.getElementById('practiceSubmitBtn').addEventListener('click', submitPracticeAnswer);
      document.getElementById('autoPlayPractice').addEventListener('change', handleAutoPlayPracticeChange);
      document.getElementById('practiceAnswerInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') submitPracticeAnswer();
      });

      // 管理员后台 - 隐藏入口
      let clickCount = 0;
      document.getElementById('headerTitle').addEventListener('click', () => {
        clickCount++;
        if (clickCount >= 5) {
          clickCount = 0;
          showModal('adminPasswordModal');
        }
      });

      // 管理员密码验证
      document.getElementById('cancelAdminBtn').addEventListener('click', () => hideModal('adminPasswordModal'));
      document.getElementById('verifyAdminBtn').addEventListener('click', verifyAdminPassword);
      document.getElementById('adminPasswordInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') verifyAdminPassword();
      });

      // 管理员后台
      document.getElementById('exitAdminBtn').addEventListener('click', () => {
        document.getElementById('adminPage').classList.add('hidden');
        document.getElementById('mainPage').classList.remove('hidden');
      });

      // 词汇管理
      document.getElementById('addVocabBtn').addEventListener('click', addVocab);
      const vocabUploadArea = document.getElementById('vocabUploadArea');
      const vocabFileInput = document.getElementById('vocabFileInput');
      vocabUploadArea.addEventListener('click', () => vocabFileInput.click());
      vocabFileInput.addEventListener('change', handleVocabFileUpload);
      vocabUploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        vocabUploadArea.style.borderColor = 'var(--primary)';
      });
      vocabUploadArea.addEventListener('dragleave', () => {
        vocabUploadArea.style.borderColor = 'var(--gray-300)';
      });
      vocabUploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        vocabUploadArea.style.borderColor = 'var(--gray-300)';
        if (e.dataTransfer.files.length) {
          vocabFileInput.files = e.dataTransfer.files;
          handleVocabFileUpload();
        }
      });

      // 编辑词汇
      document.getElementById('cancelEditVocabBtn').addEventListener('click', () => hideModal('editVocabModal'));
      document.getElementById('saveEditVocabBtn').addEventListener('click', saveEditVocab);
    }

    // ========== 页面切换 ==========
    function showPage(pageId) {
      document.querySelectorAll('.content').forEach(page => page.classList.add('hidden'));
      document.getElementById(pageId).classList.remove('hidden');
      document.getElementById(pageId).classList.add('slide-animate');
      
      // 停止之前的播放
      stopAllPlay();
      
      // 如果是练习页面且开启了自动朗读，自动播放
      if (pageId === 'practicePage' && document.getElementById('autoPlayPractice').checked) {
        setTimeout(() => playWord(vocabList[currentPracticeIndex].indo), 300);
      }
    }

    function showModal(modalId) {
      document.getElementById(modalId).classList.remove('hidden');
      if (modalId === 'adminPasswordModal') {
        document.getElementById('adminPasswordInput').focus();
      }
    }

    function hideModal(modalId) {
      document.getElementById(modalId).classList.add('hidden');
    }

    // ========== 目录功能 ==========
    function renderCatalog() {
      const catalogList = document.getElementById('catalogList');
      catalogList.innerHTML = '';
      
      vocabList.forEach((vocab, index) => {
        const item = document.createElement('div');
        item.className = 'catalog-item';
        item.innerHTML = `
          <div class="d-flex align-items-center">
            <div class="index">${index + 1}</div>
            <div>
              <div class="fw-bold">${vocab.indo}</div>
              <div class="text-sm text-gray-600">${vocab.cn}</div>
            </div>
          </div>
          <i class="bi bi-chevron-right text-gray-400"></i>
        `;
        item.addEventListener('click', () => {
          // 判断当前在哪个页面，跳转到对应位置
          const isInLearnPage = !document.getElementById('learnPage').classList.contains('hidden');
          if (isInLearnPage) {
            currentLearnIndex = index;
            updateLearnDisplay();
          } else {
            currentPracticeIndex = index;
            updatePracticeDisplay();
          }
          hideModal('catalogModal');
        });
        catalogList.appendChild(item);
      });
    }

    // ========== 听力学习功能 ==========
    function updateLearnDisplay() {
      if (vocabList.length === 0) return;
      const vocab = vocabList[currentLearnIndex];
      document.getElementById('learnWordIndo').textContent = vocab.indo;
      document.getElementById('learnWordCn').textContent = vocab.cn;
      document.getElementById('learnWordPron').textContent = vocab.pron || '无发音提示';
      
      const progress = ((currentLearnIndex + 1) / vocabList.length) * 100;
      document.getElementById('learnProgressBar').style.width = `${progress}%`;
      document.getElementById('learnProgressText').textContent = `${currentLearnIndex + 1} / ${vocabList.length}`;
    }

    function learnPrev() {
      if (currentLearnIndex > 0) {
        currentLearnIndex--;
        updateLearnDisplay();
        if (document.getElementById('autoPlayLearn').checked) {
          playWord(vocabList[currentLearnIndex].indo);
        }
      }
    }

    function learnNext() {
      if (currentLearnIndex < vocabList.length - 1) {
        currentLearnIndex++;
        updateLearnDisplay();
        if (document.getElementById('autoPlayLearn').checked) {
          playWord(vocabList[currentLearnIndex].indo);
        }
      }
    }

    function toggleLearnPlay() {
      if (isPlaying) {
        stopAllPlay();
      } else {
        playWord(vocabList[currentLearnIndex].indo);
      }
    }

    function handleAutoPlayChange(e) {
      if (e.target.checked) {
        // 开启自动朗读，先播放当前词
        playWord(vocabList[currentLearnIndex].indo);
      } else {
        // 关闭自动朗读，清除定时器
        if (autoPlayTimer) {
          clearTimeout(autoPlayTimer);
          autoPlayTimer = null;
        }
      }
    }

    // ========== 记忆练习功能 ==========
    function updatePracticeDisplay() {
      if (vocabList.length === 0) return;
      const vocab = vocabList[currentPracticeIndex];
      document.getElementById('practiceWordIndo').textContent = vocab.indo;
      document.getElementById('practiceWordPron').textContent = vocab.pron || '无发音提示';
      document.getElementById('practiceWordCn').textContent = vocab.cn;
      document.getElementById('practiceWordCn').classList.add('hidden');
      document.getElementById('practiceFeedback').classList.add('hidden');
      document.getElementById('practiceAnswerInput').value = '';
      document.getElementById('practiceAnswerInput').disabled = false;
      
      const progress = ((currentPracticeIndex + 1) / vocabList.length) * 100;
      document.getElementById('practiceProgressBar').style.width = `${progress}%`;
      document.getElementById('practiceProgressText').textContent = `${currentPracticeIndex + 1} / ${vocabList.length}`;
    }

    function practicePrev() {
      if (currentPracticeIndex > 0) {
        currentPracticeIndex--;
        updatePracticeDisplay();
        if (document.getElementById('autoPlayPractice').checked) {
          playWord(vocabList[currentPracticeIndex].indo);
        }
      }
    }

    function practiceNext() {
      if (currentPracticeIndex < vocabList.length - 1) {
        currentPracticeIndex++;
        updatePracticeDisplay();
        if (document.getElementById('autoPlayPractice').checked) {
          playWord(vocabList[currentPracticeIndex].indo);
        }
      }
    }

    function togglePracticePlay() {
      if (isPlaying) {
        stopAllPlay();
      } else {
        playWord(vocabList[currentPracticeIndex].indo);
      }
    }

    function handleAutoPlayPracticeChange(e) {
      if (e.target.checked) {
        playWord(vocabList[currentPracticeIndex].indo);
      }
    }

    function submitPracticeAnswer() {
      const input = document.getElementById('practiceAnswerInput');
      const userAnswer = input.value.trim();
      const correctAnswer = vocabList[currentPracticeIndex].cn;
      const feedback = document.getElementById('practiceFeedback');
      const answerDisplay = document.getElementById('practiceWordCn');
      
      if (!userAnswer) {
        alert('请输入答案！');
        return;
      }

      const isCorrect = userAnswer === correctAnswer;
      feedback.classList.remove('hidden');
      answerDisplay.classList.remove('hidden');
      
      if (isCorrect) {
        feedback.textContent = '✅ 回答正确！';
        feedback.style.color = 'var(--success)';
      } else {
        feedback.textContent = '❌ 回答错误';
        feedback.style.color = 'var(--danger)';
      }

      input.disabled = true;
    }

    // ========== 音频播放核心功能 ==========
    function playWord(text) {
      if (!('speechSynthesis' in window)) {
        alert('你的浏览器不支持语音朗读功能');
        return;
      }

      stopAllPlay();
      isPlaying = true;
      updatePlayButtons(true);

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'id-ID';
      utterance.rate = 0.9;
      
      utterance.onend = () => {
        isPlaying = false;
        updatePlayButtons(false);
        
        // 如果开启了自动朗读，延迟2秒后自动下一个
        const autoPlayLearn = document.getElementById('autoPlayLearn');
        const autoPlayPractice = document.getElementById('autoPlayPractice');
        
        if (autoPlayLearn && autoPlayLearn.checked && !document.getElementById('learnPage').classList.contains('hidden')) {
          autoPlayTimer = setTimeout(() => {
            if (currentLearnIndex < vocabList.length - 1) {
              learnNext();
            }
          }, 2000);
        }
      };

      utterance.onerror = () => {
        isPlaying = false;
        updatePlayButtons(false);
      };

      window.speechSynthesis.speak(utterance);
    }

    function stopAllPlay() {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
      }
      isPlaying = false;
      updatePlayButtons(false);
      if (autoPlayTimer) {
        clearTimeout(autoPlayTimer);
        autoPlayTimer = null;
      }
    }

    function updatePlayButtons(playing) {
      // 更新学习页面按钮
      const learnBtn = document.getElementById('learnPlayBtn');
      const learnText = document.getElementById('learnPlayText');
      if (playing) {
        learnBtn.className = 'play-control-btn stop';
        learnBtn.innerHTML = '<i class="bi bi-stop-fill"></i><span>停止朗读</span>';
      } else {
        learnBtn.className = 'play-control-btn play';
        learnBtn.innerHTML = '<i class="bi bi-play-fill"></i><span>开始朗读</span>';
      }

      // 更新练习页面按钮
      const practiceBtn = document.getElementById('practicePlayBtn');
      const practiceText = document.getElementById('practicePlayText');
      if (playing) {
        practiceBtn.className = 'play-control-btn stop flex-1';
        practiceBtn.innerHTML = '<i class="bi bi-stop-fill"></i><span>停止朗读</span>';
      } else {
        practiceBtn.className = 'play-control-btn play flex-1';
        practiceBtn.innerHTML = '<i class="bi bi-play-fill"></i><span>朗读题目</span>';
      }
    }

    // ========== 管理员功能 ==========
    function verifyAdminPassword() {
      const password = document.getElementById('adminPasswordInput').value;
      if (password === 'admin123') {
        hideModal('adminPasswordModal');
        document.getElementById('adminPasswordInput').value = '';
        document.getElementById('mainPage').classList.add('hidden');
        document.getElementById('adminPage').classList.remove('hidden');
      } else {
        alert('密码错误！');
        document.getElementById('adminPasswordInput').focus();
        document.getElementById('adminPasswordInput').select();
      }
    }

    function renderVocabList() {
      const adminListEl = document.getElementById('vocabManageList');
      adminListEl.innerHTML = '';
      vocabList.forEach((vocab, index) => {
        const item = document.createElement('div');
        item.className = 'vocab-item';
        item.innerHTML = `
          <div class="vocab-info">
            <div class="fw-bold">${vocab.indo}</div>
            <div class="text-sm text-gray-600">${vocab.cn} (${vocab.pron || '无发音提示'})</div>
          </div>
          <div class="vocab-actions">
            <button class="btn btn-sm btn-outline" onclick="editVocab(${index})">
              <i class="bi bi-pencil"></i> 编辑
            </button>
            <button class="btn btn-sm btn-danger" onclick="deleteVocab(${index})">
              <i class="bi bi-trash"></i> 删除
            </button>
          </div>
        `;
        adminListEl.appendChild(item);
      });
      renderCatalog();
    }

    function addVocab() {
      const indo = document.getElementById('newVocabIndo').value.trim();
      const cn = document.getElementById('newVocabCn').value.trim();
      const pron = document.getElementById('newVocabPron').value.trim();
      
      if (!indo || !cn) {
        alert('请填写完整词汇和释义！');
        return;
      }

      vocabList.push({ indo, cn, pron });
      saveVocabData();
      renderVocabList();
      updateLearnDisplay();
      updatePracticeDisplay();

      document.getElementById('newVocabIndo').value = '';
      document.getElementById('newVocabCn').value = '';
      document.getElementById('newVocabPron').value = '';
      alert('词汇添加成功！');
    }

    function editVocab(index) {
      editingVocabIndex = index;
      const vocab = vocabList[index];
      document.getElementById('editVocabIndo').value = vocab.indo;
      document.getElementById('editVocabCn').value = vocab.cn;
      document.getElementById('editVocabPron').value = vocab.pron || '';
      showModal('editVocabModal');
    }

    function saveEditVocab() {
      if (editingVocabIndex === -1) return;
      
      const indo = document.getElementById('editVocabIndo').value.trim();
      const cn = document.getElementById('editVocabCn').value.trim();
      const pron = document.getElementById('editVocabPron').value.trim();

      if (!indo || !cn) {
        alert('请填写完整词汇和释义！');
        return;
      }

      vocabList[editingVocabIndex] = { indo, cn, pron };
      saveVocabData();
      renderVocabList();
      updateLearnDisplay();
      updatePracticeDisplay();
      editingVocabIndex = -1;
      hideModal('editVocabModal');
      alert('词汇修改成功！');
    }

    function deleteVocab(index) {
      if (confirm('确定要删除这个词汇吗？')) {
        vocabList.splice(index, 1);
        saveVocabData();
        renderVocabList();
        if (currentLearnIndex >= vocabList.length) currentLearnIndex = Math.max(0, vocabList.length - 1);
        if (currentPracticeIndex >= vocabList.length) currentPracticeIndex = Math.max(0, vocabList.length - 1);
        updateLearnDisplay();
        updatePracticeDisplay();
      }
    }

    function handleVocabFileUpload() {
      const fileInput = document.getElementById('vocabFileInput');
      if (!fileInput.files || !fileInput.files[0]) return;

      const file = fileInput.files[0];
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          if (!Array.isArray(data)) {
            throw new Error('文件格式错误：必须是 JSON 数组');
          }
          const validData = data.filter(item => item.indo && item.cn);
          if (validData.length !== data.length) {
            alert(`部分数据格式不正确，已自动过滤，成功导入 ${validData.length} 条`);
          } else {
            alert(`成功导入 ${validData.length} 条词汇`);
          }
          vocabList = vocabList.concat(validData);
          saveVocabData();
          renderVocabList();
          updateLearnDisplay();
          updatePracticeDisplay();
        } catch (err) {
          alert('文件解析失败：' + err.message);
        }
      };
      reader.readAsText(file);
      fileInput.value = '';
    }
  </script>
</body>
</html>
