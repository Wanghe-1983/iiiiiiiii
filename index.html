<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印尼语学习助手</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #030712;
            --glass: rgba(17, 24, 39, 0.9);
            --accent: #6366f1;
            --text-main: #f9fafb;
            --text-muted: #94a3b8;
            --sidebar-w: 300px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            height: 100vh; display: flex; overflow: hidden;
        }

        /* 登录屏 */
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-card { background: var(--glass); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); width: 360px; text-align: center; }
        .login-input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; outline: none; }
        .login-btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }

        /* 侧边栏 */
        .sidebar { width: var(--sidebar-w); height: 100%; background: var(--glass); border-right: 1px solid rgba(255,255,255,0.05); transition: 0.3s; position: relative; z-index: 1000; }
        .sidebar.collapsed { margin-left: calc(var(--sidebar-w) * -1); }
        .toggle-tab { position: absolute; right: -30px; top: 20px; width: 30px; height: 50px; background: var(--accent); color: white; cursor: pointer; border-radius: 0 8px 8px 0; display: flex; align-items: center; justify-content: center; }

        /* 主内容 */
        .main-container { flex: 1; display: flex; flex-direction: column; padding: 30px; align-items: center; position: relative; }
        .main-title { font-size: 2.5rem; font-weight: 800; margin-bottom: 20px; color: #fff; }
        
        .study-card { 
            background: rgba(30, 41, 59, 0.5); border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); 
            width: 100%; max-width: 800px; flex: 1; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; position: relative; padding: 40px;
        }
        .fav-btn { position: absolute; top: 30px; right: 40px; font-size: 2rem; cursor: pointer; color: #334155; }
        .fav-btn.active { color: #fbbf24; }
        
        .indo-box { font-size: 5rem; font-weight: bold; text-align: center; color: #fff; margin-bottom: 10px; }
        .zh-box { font-size: 2.2rem; color: var(--text-muted); }

        /* 导航 */
        .nav-group { display: flex; gap: 30px; margin-top: 40px; align-items: center; }
        .nav-btn { width: 60px; height: 60px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); background: none; color: white; cursor: pointer; font-size: 1.2rem; }
        .play-btn { width: 80px; height: 80px; border-radius: 50%; border: none; background: var(--accent); color: white; cursor: pointer; font-size: 2rem; }

        /* 控制面板 */
        .control-panel { width: 100%; max-width: 800px; margin-top: 20px; background: var(--glass); padding: 20px; border-radius: 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; font-size: 14px; }
        .ctrl-row { display: flex; flex-direction: column; gap: 5px; }

        .footer { font-size: 12px; color: #4b5563; margin-top: 20px; text-align: center; line-height: 1.6; }
        .clickable { color: var(--accent); cursor: pointer; }

        /* 目录样式 */
        .menu-group { margin-bottom: 10px; padding: 0 10px; }
        .menu-head { padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; }
        .menu-list { overflow: hidden; transition: 0.2s; }
        .menu-list.hidden { height: 0; }
        .clear-area { padding: 5px 10px; text-align: right; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2 style="color:white; margin-bottom:20px;">身份验证</h2>
            <input type="text" id="login-id" class="login-input" placeholder="请输入工号">
            <input type="password" id="login-pw" class="login-input" placeholder="请输入密码">
            <button class="login-btn" onclick="handleLogin()">登录</button>
            <p id="login-tips" style="color:#ef4444; margin-top:10px; display:none;"></p>
        </div>
    </div>

    <aside class="sidebar" id="sidebar">
        <div class="toggle-tab" onclick="document.getElementById('sidebar').classList.toggle('collapsed')"><i class="fas fa-bars"></i></div>
        <div id="menu-box" style="padding: 20px 10px; overflow-y:auto; height: 100%;"></div>
    </aside>

    <main class="main-container">
        <h1 class="main-title">印尼语学习助手</h1>
        <section class="study-card">
            <div style="position:absolute; top:30px; left:40px; font-weight:bold; color:var(--accent);" id="word-idx">01</div>
            <i class="fas fa-star fav-btn" id="fav-star" onclick="toggleFav()"></i>
            <div class="indo-box" id="disp-indo">加载中...</div>
            <div class="zh-box" id="disp-zh">...</div>
            <div class="nav-group">
                <button class="nav-btn" onclick="navWord(-1)"><i class="fas fa-chevron-left"></i></button>
                <button class="play-btn" onclick="toggleSpeech()"><i class="fas fa-play" id="play-ico"></i></button>
                <button class="nav-btn" onclick="navWord(1)"><i class="fas fa-chevron-right"></i></button>
            </div>
        </section>

        <footer class="control-panel">
            <div class="ctrl-row">
                <span>语速: <span id="val-rate">0.8</span>x</span>
                <input type="range" id="inp-rate" min="0.1" max="1.5" step="0.1" value="0.8" oninput="document.getElementById('val-rate').innerText=this.value">
            </div>
            <div class="ctrl-row">
                <span>循环: <span id="val-loop">1</span>次</span>
                <input type="range" id="inp-loop" min="1" max="10" step="1" value="1" oninput="document.getElementById('val-loop').innerText=this.value">
            </div>
            <div class="ctrl-row" style="align-items: center; justify-content: center;">
                <label><input type="checkbox" id="hide-toggle" onchange="renderCurrent()"> 隐藏中文答案</label>
            </div>
        </footer>

        <div class="footer">
            仅供内部学习｜禁止商用 © 2026｜联系作者：<span class="clickable" onclick="showQR()">王鹤</span><br>
            Ver <span class="clickable" onclick="checkAdminAccess()">1.0</span> | <span class="clickable" style="color:#ef4444;" onclick="logout()">退出登录</span>
        </div>
    </main>

    <div id="qr-modal" class="modal-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:2000; justify-content:center; align-items:center;" onclick="this.style.display='none'"><img src="Wang_he.jpg" style="width:250px; border-radius:15px;"></div>

    <script>
        let db = {}, favs = JSON.parse(localStorage.getItem('fmi_favs') || '[]');
        let curCat = "1", curIdx = 0, isLive = false;
        let menuState = { fav: true };

        // 核心逻辑：管理员账号硬编码
        async function handleLogin() {
            const id = document.getElementById('login-id').value.trim();
            const pw = document.getElementById('login-pw').value;
            // 管理员判定
            if (id === "admin" && pw === "fmi2026") {
                localStorage.setItem('fmi_session', JSON.stringify({ role: "admin", id: "admin" }));
                location.reload(); return;
            }
            try {
                const r = await fetch('./whitelist.json?t=' + Date.now());
                const list = await r.json();
                const user = list.find(u => u.id === id && u.psha === pw);
                if (user && user.status === 'active') {
                    localStorage.setItem('fmi_session', JSON.stringify(user));
                    location.reload();
                } else {
                    document.getElementById('login-tips').innerText = "工号或密码错误";
                    document.getElementById('login-tips').style.display = 'block';
                }
            } catch(e) { alert("白名单验证失败"); }
        }

        async function initApp() {
            if (!localStorage.getItem('fmi_session')) { document.getElementById('login-screen').style.display='flex'; return; }
            document.getElementById('login-screen').style.display='none';
            try {
                const r = await fetch('./indonesian_learning_data.json');
                db = await r.json();
                buildMenu(); renderCurrent();
            } catch(e) { console.log("Data error"); }
        }

        function buildMenu() {
            const box = document.getElementById('menu-box');
            let html = `<div class="menu-group">
                <div class="menu-head" onclick="toggleMenu('fav')"><span>我的收藏 (${favs.length})</span></div>
                <div class="menu-list ${menuState.fav?'':'hidden'}">
                    ${favs.map((w,i)=>`<div style="padding:5px 15px; font-size:13px; display:flex; justify-content:space-between;">
                        <span onclick="switchCat('fav',${i})" style="cursor:pointer; color:${curCat=='fav'&&curIdx==i?'#6366f1':''}">${w.indonesian}</span>
                        <i class="fas fa-times" onclick="removeFav(${i},event)" style="cursor:pointer; opacity:0.5;"></i>
                    </div>`).join('')}
                    ${favs.length>0?`<div class="clear-area"><span class="clickable" style="color:#ef4444; font-size:12px;" onclick="clearAllFavs()">清空全部</span></div>`:''}
                </div>
            </div>`;
            for(let id in db) {
                html += `<div class="menu-group">
                    <div class="menu-head" onclick="toggleMenu('${id}')"><span>${db[id].name}</span></div>
                    <div class="menu-list ${menuState[id]?'':'hidden'}">
                        ${db[id].lessons["1"].words.map((w,i)=>`<div onclick="switchCat('${id}',${i})" style="padding:5px 15px; cursor:pointer; font-size:13px; color:${curCat==id&&curIdx==i?'#6366f1':''}">${w.indonesian}</div>`).join('')}
                    </div>
                </div>`;
            }
            box.innerHTML = html;
        }

        function renderCurrent() {
            const list = curCat === 'fav' ? favs : db[curCat]?.lessons["1"]?.words;
            if(!list || list.length === 0) return;
            const word = list[curIdx];
            document.getElementById('disp-indo').innerText = word.indonesian;
            document.getElementById('disp-zh').innerText = document.getElementById('hide-toggle').checked ? '••••' : word.chinese;
            document.getElementById('word-idx').innerText = (curIdx + 1).toString().padStart(2, '0');
            document.getElementById('fav-star').className = favs.some(f=>f.indonesian===word.indonesian) ? 'fas fa-star fav-btn active' : 'fas fa-star fav-btn';
        }

        function toggleSpeech() {
            if(isLive) { stopVoice(); return; }
            const list = curCat==='fav'?favs:db[curCat].lessons["1"].words;
            const word = list[curIdx];
            const rate = parseFloat(document.getElementById('inp-rate').value);
            const loops = parseInt(document.getElementById('inp-loop').value);
            isLive = true; document.getElementById('play-ico').className='fas fa-stop';
            let count = 0;
            const speak = () => {
                if(!isLive || count >= loops) { stopVoice(); return; }
                const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(word.indonesian)}&tl=id&client=tw-ob&ttsspeed=${rate < 0.5 ? 0.2 : 1}`;
                const audio = new Audio(url);
                audio.onended = () => { count++; if(isLive) setTimeout(speak, 600); };
                audio.play().catch(() => { // 备选方案
                    const u = new SpeechSynthesisUtterance(word.indonesian);
                    u.lang='id-ID'; u.rate=rate; u.onend=()=>{ count++; speak(); };
                    window.speechSynthesis.speak(u);
                });
            };
            speak();
        }

        function stopVoice() { isLive=false; window.speechSynthesis.cancel(); document.getElementById('play-ico').className='fas fa-play'; }
        function navWord(dir) { stopVoice(); const list=curCat==='fav'?favs:db[curCat].lessons["1"].words; if(!list) return; curIdx=(curIdx+dir+list.length)%list.length; renderCurrent(); }
        function toggleMenu(id) { menuState[id] = !menuState[id]; buildMenu(); }
        function switchCat(cat, idx) { curCat=cat; curIdx=idx; stopVoice(); renderCurrent(); buildMenu(); }
        function toggleFav() {
            const list = curCat==='fav'?favs:db[curCat].lessons["1"].words;
            const word = list[curIdx];
            const fIdx = favs.findIndex(f=>f.indonesian===word.indonesian);
            fIdx > -1 ? favs.splice(fIdx, 1) : favs.push({...word});
            localStorage.setItem('fmi_favs', JSON.stringify(favs));
            buildMenu(); renderCurrent();
        }
        function removeFav(i,e){ e.stopPropagation(); favs.splice(i,1); localStorage.setItem('fmi_favs', JSON.stringify(favs)); buildMenu(); renderCurrent(); }
        function clearAllFavs() { if(confirm("确定清空收藏吗？")) { favs=[]; localStorage.setItem('fmi_favs','[]'); buildMenu(); renderCurrent(); } }
        function showQR() { document.getElementById('qr-modal').style.display='flex'; }
        function logout() { localStorage.removeItem('fmi_session'); location.reload(); }
        function checkAdminAccess() { 
            const s = JSON.parse(localStorage.getItem('fmi_session'));
            if(s?.id === 'admin') location.href='admin.html';
            else alert("无管理权限");
        }
        initApp();
    </script>
</body>
</html>
