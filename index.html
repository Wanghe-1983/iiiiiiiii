<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印尼语学习系统 | TMI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
        }

        :root {
            --primary-blue: #3b82f6;
            --accent-cyan: #38bdf8;
            --success-green: #22c55e;
            --danger-red: #ef4444;
            --bg-main: linear-gradient(135deg, #0f172a 0%, #131c31 50%, #0f172a 100%);
            --card-bg: rgba(30, 41, 59, 0.6);
            --card-border: rgba(148, 163, 184, 0.15);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --input-bg: rgba(15, 23, 42, 0.7);
            --input-border: rgba(148, 163, 184, 0.2);
            --shadow-soft: 0 4px 24px rgba(0, 0, 0, 0.25);
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        body {
            background: var(--bg-main);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            padding: 24px 20px 80px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.3);
            border-radius: 10px;
            transition: background 0.3s ease;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(148, 163, 184, 0.5);
        }

        .container {
            max-width: 1080px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            -webkit-backdrop-filter: blur(20px) saturate(120%);
            backdrop-filter: blur(20px) saturate(120%);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-soft);
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: rgba(148, 163, 184, 0.25);
        }

        .card h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-primary);
            border-left: 4px solid var(--primary-blue);
            padding-left: 14px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 8px;
            align-items: center;
        }

        .btn {
            background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
            color: var(--text-secondary);
            border: 1px solid var(--input-border);
            padding: 12px 22px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            background: linear-gradient(135deg, #475569 0%, #334155 100%);
            border-color: var(--primary-blue);
            transform: translateY(-2px);
            color: var(--text-primary);
        }

        .btn.active {
            background: linear-gradient(135deg, var(--primary-blue) 0%, #2563eb 100%);
            color: white;
            border-color: var(--primary-blue);
        }

        .btn-action {
            background: linear-gradient(135deg, var(--accent-cyan) 0%, #2563eb 100%);
            color: white;
            border: none;
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger-red) 0%, #dc2626 100%);
            color: white;
            border: none;
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success-green) 0%, #16a34a 100%);
            color: white;
            border: none;
        }

        .content-box {
            background: var(--input-bg);
            border-radius: var(--radius-md);
            padding: 24px;
            margin-top: 12px;
            line-height: 2.2;
            border: 1px solid var(--card-border);
        }

        .content-item {
            font-size: 17px;
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            transition: background 0.2s ease;
        }

        .content-item:hover {
            background: rgba(59, 130, 246, 0.08);
        }

        .indonesian {
            color: var(--accent-cyan);
            font-weight: 600;
            font-size: 18px;
        }

        .chinese {
            color: var(--text-muted);
            margin-left: 10px;
        }

        .status-tip {
            margin-top: 16px;
            font-size: 14px;
            color: var(--text-muted);
            min-height: 20px;
        }

        .status-tip.success {
            color: var(--success-green);
            font-weight: 500;
        }

        .status-tip.error {
            color: var(--danger-red);
            font-weight: 500;
        }

        .admin-section {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 2px solid var(--card-border);
            display: none;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 15px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 15px;
            transition: all 0.3s ease;
            -webkit-appearance: none;
            appearance: none;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .form-group textarea {
            min-height: 140px;
            resize: vertical;
        }

        .data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 16px;
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid var(--card-border);
        }

        .data-table th,
        .data-table td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--card-border);
        }

        .data-table th {
            background: var(--input-bg);
            color: var(--accent-cyan);
            font-weight: 600;
            font-size: 14px;
        }

        .data-table tr:nth-child(even) {
            background: rgba(15, 23, 42, 0.3);
        }

        .data-table tr:hover {
            background: rgba(59, 130, 246, 0.08);
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 12px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 12px 24px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .tab:hover {
            color: var(--text-primary);
            background: rgba(30, 41, 59, 0.5);
        }

        .tab.active {
            color: var(--accent-cyan);
            background: rgba(59, 130, 246, 0.1);
            font-weight: 600;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            background: var(--input-bg);
            border-radius: var(--radius-md);
            margin-top: 16px;
            border: 1px solid var(--card-border);
        }

        .speed-control label {
            color: var(--text-secondary);
            font-weight: 500;
            white-space: nowrap;
        }

        .speed-slider {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            background: rgba(148, 163, 184, 0.2);
            border-radius: 10px;
            outline: none;
        }

        .speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--primary-blue) 100%);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .speed-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .speed-value {
            color: var(--accent-cyan);
            font-weight: 700;
            font-size: 16px;
            min-width: 55px;
            text-align: center;
        }

        .admin-toggle {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
        }

        .version-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.9);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            padding: 10px 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            border-top: 1px solid var(--card-border);
            z-index: 999;
        }

        .version-footer span {
            color: var(--accent-cyan);
            font-weight: 600;
        }

        hr {
            border: none;
            border-top: 1px solid var(--card-border);
            margin: 28px 0;
        }

        @media (max-width: 768px) {
            body {
                padding: 16px 12px 80px;
            }
            .card {
                padding: 20px;
            }
            .btn {
                padding: 10px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 前台学习区域 -->
        <div id="learningSection">
            <div class="card">
                <h2>选择单元</h2>
                <div class="btn-group" id="unitBtns"></div>
                <button class="btn btn-action" id="refreshDataBtn" style="margin-top: 12px;">🔄 强制刷新数据</button>
            </div>

            <div class="card">
                <h2>选择课程</h2>
                <div class="btn-group" id="lessonBtns"></div>
            </div>

            <div class="card">
                <h2>学习内容</h2>
                <div class="content-box" id="contentBox">
                    <p style="color: var(--text-muted);">请先选择单元和课程</p>
                </div>
            </div>

            <div class="card">
                <h2>快捷操作</h2>
                <div class="btn-group">
                    <button class="btn btn-action" id="showBtn">显示内容</button>
                    <button class="btn btn-action" id="readBtn">朗读发音</button>
                    <button class="btn btn-action" id="clearBtn">清空内容</button>
                </div>
                
                <div class="speed-control">
                    <label for="speedSlider">语速调节：</label>
                    <input type="range" id="speedSlider" class="speed-slider" min="0.5" max="2" step="0.1" value="0.75">
                    <span class="speed-value" id="speedValue">0.75x</span>
                </div>
                
                <p class="status-tip" id="statusTip"></p>
            </div>
        </div>

        <!-- 后台管理区域 -->
        <div id="adminSection" class="admin-section">
            <div class="card">
                <h2>后台管理系统 <span style="font-size:14px; color:var(--text-muted); font-weight:normal;">版本 <span id="adminVersion">1.5.0</span></span></h2>
                
                <!-- 版本管理 -->
                <div class="form-group">
                    <label>版本号管理</label>
                    <input type="text" id="versionInput" placeholder="例如：1.5.0" value="1.5.0">
                    <button class="btn btn-success" id="saveVersionBtn" style="margin-top:8px;">保存版本号</button>
                </div>
                
                <!-- 标签页 -->
                <div class="tabs">
                    <button class="tab active" data-tab="units">单元管理</button>
                    <button class="tab" data-tab="lessons">课程管理</button>
                    <button class="tab" data-tab="import-export">导入/导出</button>
                </div>

                <!-- 单元管理（新增批量删除） -->
                <div id="unitsTab" class="tab-content" style="display: block;">
                    <div class="form-group">
                        <label>单元名称</label>
                        <input type="text" id="unitName" placeholder="例如：单元 1 - 基础问候">
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-success" id="addUnitBtn">添加单元</button>
                        <button class="btn btn-danger" id="batchDeleteUnitBtn">批量删除选中单元</button>
                    </div>
                    <table class="data-table" id="unitsTable">
                        <thead>
                            <tr>
                                <th><input type="checkbox" id="selectAllUnits"> 全选</th>
                                <th>单元ID</th>
                                <th>单元名称</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>

                <!-- 课程管理 -->
                <div id="lessonsTab" class="tab-content">
                    <div class="form-group">
                        <label>选择单元</label>
                        <select id="lessonUnitSelect"></select>
                    </div>
                    <div class="form-group">
                        <label>课程ID</label>
                        <input type="number" id="lessonId" placeholder="例如：1">
                    </div>
                    <div class="form-group">
                        <label>课程内容 (JSON格式)</label>
                        <textarea id="lessonContent" placeholder='[{"id": "Selamat pagi", "cn": "早上好"}, {"id": "Terima kasih", "cn": "谢谢"}]'></textarea>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-success" id="addLessonBtn">添加/更新课程</button>
                        <button class="btn btn-danger" id="deleteLessonBtn">删除课程</button>
                        <button class="btn btn-danger" id="clearAllLessonsBtn">清空选中单元所有课程</button>
                    </div>
                    <table class="data-table" id="lessonsTable">
                        <thead>
                            <tr>
                                <th>课程ID</th>
                                <th>内容预览</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>

                <!-- 导入/导出（重写导入逻辑） -->
                <div id="import-exportTab" class="tab-content">
                    <div class="form-group">
                        <label>1. 选择JSON课程文件（必须符合系统格式）</label>
                        <input type="file" id="importFile" accept=".json">
                    </div>
                    <div class="form-group">
                        <label>2. 执行导入</label>
                        <button class="btn btn-action" id="importBtn">确认导入课程数据</button>
                        <p class="status-tip" id="importStatusTip"></p>
                    </div>
                    <hr>
                    <div class="form-group">
                        <label>导出当前课程数据</label>
                        <button class="btn btn-success" id="exportBtn">导出为 JSON 文件</button>
                    </div>
                    <hr>
                    <div class="form-group">
                        <label>重置为默认数据</label>
                        <button class="btn btn-danger" id="resetBtn">重置所有数据</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="admin-toggle">
        <button class="btn btn-action" id="adminToggleBtn">后台管理</button>
    </div>

    <div class="version-footer">
        印尼语学习系统 | 版本 <span id="footerVersion">V1.5.0</span> © 2024 TMI
    </div>

    <script>
        // ==================== 全局配置 ====================
        let VERSION = "1.5.0";
        const ADMIN_PASSWORD = "admin123";
        const DEFAULT_SPEECH_RATE = 0.75;
        const STORAGE_KEY_DATA = "indonesianLearningData";
        const STORAGE_KEY_VERSION = "indonesianLearningVersion";

        // ==================== 默认学习数据（固定结构） ====================
        const defaultData = {
            "1": {
                "name": "单元 1 - 基础问候",
                "lessons": {
                    "1": [
                        { "id": "Selamat pagi", "cn": "早上好" },
                        { "id": "Selamat siang", "cn": "下午好" },
                        { "id": "Selamat malam", "cn": "晚上好" },
                        { "id": "Terima kasih", "cn": "谢谢" },
                        { "id": "Maaf", "cn": "对不起" }
                    ]
                }
            },
            "2": {
                "name": "单元 2 - 数字",
                "lessons": {
                    "1": [
                        { "id": "Satu", "cn": "一" },
                        { "id": "Dua", "cn": "二" },
                        { "id": "Tiga", "cn": "三" },
                        { "id": "Empat", "cn": "四" },
                        { "id": "Lima", "cn": "五" }
                    ]
                }
            }
        };

        // ==================== 全局状态 ====================
        let learningData = {};
        let currentUnit = null;
        let currentLesson = null;
        let currentTextToRead = "";
        let isAdminOpen = false;
        let speechRate = DEFAULT_SPEECH_RATE;

        // ==================== 核心工具函数 ====================
        // 校验数据结构是否合法
        function validateDataStructure(data) {
            if (typeof data !== "object" || data === null || Array.isArray(data)) {
                return false;
            }
            const unitIds = Object.keys(data);
            for (let unitId of unitIds) {
                const unit = data[unitId];
                if (typeof unit.name !== "string" || typeof unit.lessons !== "object" || unit.lessons === null) {
                    return false;
                }
                const lessonIds = Object.keys(unit.lessons);
                for (let lessonId of lessonIds) {
                    const lesson = unit.lessons[lessonId];
                    if (!Array.isArray(lesson)) {
                        return false;
                    }
                    for (let item of lesson) {
                        if (typeof item.id !== "string" || typeof item.cn !== "string") {
                            return false;
                        }
                    }
                }
            }
            return true;
        }

        // 保存数据到本地存储（强制写入，带校验）
        function saveData() {
            try {
                const dataStr = JSON.stringify(learningData);
                localStorage.setItem(STORAGE_KEY_DATA, dataStr);
                console.log("✅ 数据已成功写入本地存储", learningData);
                refreshAllUI();
                return true;
            } catch (err) {
                console.error("❌ 数据保存失败", err);
                alert("数据保存失败：" + err.message);
                return false;
            }
        }

        // 从本地存储加载数据
        function loadDataFromStorage() {
            try {
                const savedData = localStorage.getItem(STORAGE_KEY_DATA);
                if (!savedData) {
                    console.log("ℹ️ 无本地数据，使用默认数据");
                    learningData = JSON.parse(JSON.stringify(defaultData));
                    return;
                }
                const parsedData = JSON.parse(savedData);
                if (validateDataStructure(parsedData)) {
                    learningData = parsedData;
                    console.log("✅ 本地数据加载成功", learningData);
                } else {
                    console.error("❌ 本地数据结构非法，使用默认数据");
                    learningData = JSON.parse(JSON.stringify(defaultData));
                    alert("本地数据格式异常，已恢复为默认数据");
                }
            } catch (err) {
                console.error("❌ 本地数据解析失败，使用默认数据", err);
                learningData = JSON.parse(JSON.stringify(defaultData));
                alert("本地数据解析失败，已恢复为默认数据");
            }
        }

        // 全局UI刷新
        function refreshAllUI() {
            renderUnitButtons();
            renderAdminUnitsTable();
            updateLessonUnitSelect();
            renderAdminLessonsTable();
            // 清空选中状态
            currentUnit = null;
            currentLesson = null;
            document.querySelectorAll('#unitBtns .btn, #lessonBtns .btn').forEach(b => b.classList.remove('active'));
            document.getElementById('contentBox').innerHTML = '<p style="color: var(--text-muted);">请先选择单元和课程</p>';
        }

        // 版本号UI更新
        function updateVersionDisplay() {
            document.getElementById('adminVersion').textContent = VERSION;
            document.getElementById('footerVersion').textContent = 'V' + VERSION;
            document.getElementById('versionInput').value = VERSION;
        }

        // ==================== 页面初始化 ====================
        window.onload = function() {
            console.log("印尼语学习系统 版本" + VERSION + " 加载完成");
            // 加载版本号
            const savedVersion = localStorage.getItem(STORAGE_KEY_VERSION);
            if (savedVersion) {
                VERSION = savedVersion;
            }
            updateVersionDisplay();
            
            // 加载数据
            loadDataFromStorage();
            // 初始化语速
            initSpeedControl();
            // 绑定所有事件
            setupAllEvents();
            console.log("✅ 系统初始化完成");
        };

        // ==================== 渲染函数 ====================
        function renderUnitButtons() {
            const unitBtns = document.getElementById('unitBtns');
            unitBtns.innerHTML = '';
            const unitIds = Object.keys(learningData).sort((a,b) => Number(a) - Number(b));

            unitIds.forEach(unitId => {
                const unitData = learningData[unitId];
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.dataset.unit = unitId;
                btn.innerText = unitData.name;
                
                btn.onclick = () => {
                    document.querySelectorAll('#unitBtns .btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentUnit = parseInt(unitId);
                    renderLessonButtons();
                    updateContent();
                };
                unitBtns.appendChild(btn);
            });
        }

        function renderLessonButtons() {
            const lessonBtns = document.getElementById('lessonBtns');
            lessonBtns.innerHTML = '';
            if (!currentUnit || !learningData[currentUnit]) return;

            const lessonIds = Object.keys(learningData[currentUnit].lessons).sort((a,b) => Number(a) - Number(b));
            lessonIds.forEach(lessonId => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.dataset.lesson = lessonId;
                btn.innerText = '课程 ' + lessonId;
                
                btn.onclick = () => {
                    document.querySelectorAll('#lessonBtns .btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentLesson = parseInt(lessonId);
                    updateContent();
                };
                lessonBtns.appendChild(btn);
            });
        }

        function updateContent() {
            const contentBox = document.getElementById('contentBox');
            const statusTip = document.getElementById('statusTip');
            
            if (!currentUnit || !currentLesson) {
                contentBox.innerHTML = '<p style="color: var(--text-muted);">请先选择单元和课程</p>';
                currentTextToRead = "";
                return;
            }

            const data = learningData[currentUnit]?.lessons?.[currentLesson];
            if (!data) {
                contentBox.innerHTML = '<p style="color: var(--text-muted);">暂无内容</p>';
                currentTextToRead = "";
                return;
            }

            let html = '<p style="color: var(--accent-cyan); font-weight: 600; margin-bottom: 16px;">📘 ' + learningData[currentUnit].name + ' - 课程 ' + currentLesson + '</p>';
            let textToRead = "";
            
            data.forEach(item => {
                html += `<div class="content-item"><span class="indonesian">${item.id}</span><span class="chinese"> → ${item.cn}</span></div>`;
                textToRead += item.id + ". ";
            });

            contentBox.innerHTML = html;
            currentTextToRead = textToRead.trim();
            setStatus("内容已加载", "success");
        }

        function setStatus(text, type) {
            const statusTip = document.getElementById('statusTip');
            statusTip.textContent = text;
            statusTip.className = "status-tip";
            if (type) statusTip.classList.add(type);
        }

        function initSpeedControl() {
            const speedSlider = document.getElementById('speedSlider');
            const speedValue = document.getElementById('speedValue');
            speedSlider.value = speechRate;
            speedValue.textContent = speechRate + 'x';

            speedSlider.oninput = (e) => {
                speechRate = parseFloat(e.target.value);
                speedValue.textContent = speechRate.toFixed(2) + 'x';
            };
        }

        // ==================== 事件绑定 ====================
        function setupAllEvents() {
            // 前台按钮
            document.getElementById('showBtn').onclick = updateContent;
            document.getElementById('refreshDataBtn').onclick = () => {
                loadDataFromStorage();
                refreshAllUI();
                alert("数据已强制刷新");
            };
            
            // 朗读功能
            document.getElementById('readBtn').onclick = () => {
                if (!currentTextToRead) {
                    setStatus("请先选择单元和课程", "error");
                    return;
                }
                window.speechSynthesis.cancel();
                setStatus("正在播放发音...", "");

                const utterance = new SpeechSynthesisUtterance(currentTextToRead);
                utterance.lang = "id-ID";
                utterance.rate = speechRate;
                utterance.onend = () => setStatus("播放完成", "success");
                utterance.onerror = (e) => {
                    console.error("播放报错", e);
                    setStatus("播放失败，请刷新重试", "error");
                };
                window.speechSynthesis.speak(utterance);
            };

            // 清空内容
            document.getElementById('clearBtn').onclick = () => {
                window.speechSynthesis.cancel();
                document.getElementById('contentBox').innerHTML = '<p style="color: var(--text-muted);">请先选择单元和课程</p>';
                currentTextToRead = "";
                setStatus("", "");
                document.querySelectorAll('#unitBtns .btn, #lessonBtns .btn').forEach(b => b.classList.remove('active'));
                currentUnit = null;
                currentLesson = null;
            };

            // 后台开关
            document.getElementById('adminToggleBtn').onclick = () => {
                if (!isAdminOpen) {
                    const password = prompt("请输入后台管理密码：");
                    if (password === ADMIN_PASSWORD) {
                        isAdminOpen = true;
                        document.getElementById('adminSection').style.display = 'block';
                        this.textContent = "关闭后台";
                        refreshAllUI();
                    } else if (password !== null) {
                        alert("密码错误！");
                    }
                } else {
                    isAdminOpen = false;
                    document.getElementById('adminSection').style.display = 'none';
                    this.textContent = "后台管理";
                }
            };

            // 版本号保存
            document.getElementById('saveVersionBtn').onclick = () => {
                const newVersion = document.getElementById('versionInput').value.trim();
                if (!newVersion) {
                    alert("请输入版本号");
                    return;
                }
                VERSION = newVersion;
                localStorage.setItem(STORAGE_KEY_VERSION, VERSION);
                updateVersionDisplay();
                alert("版本号已保存：" + VERSION);
            };

            // 标签页切换
            document.querySelectorAll('.tab').forEach(tab => {
                tab.onclick = () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    const tabName = tab.dataset.tab;
                    const targetElement = document.getElementById(tabName + 'Tab');
                    if (!targetElement) return;
                    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
                    targetElement.style.display = 'block';
                };
            });

            // 单元管理 - 添加单元
            document.getElementById('addUnitBtn').onclick = () => {
                const name = document.getElementById('unitName').value.trim();
                if (!name) {
                    alert('请输入单元名称');
                    return;
                }
                const unitIds = Object.keys(learningData).map(Number);
                const newId = unitIds.length > 0 ? Math.max(...unitIds) + 1 : 1;
                learningData[newId] = { name: name, lessons: {} };
                const saveSuccess = saveData();
                if (saveSuccess) {
                    document.getElementById('unitName').value = '';
                    alert('单元添加成功');
                }
            };

            // 单元管理 - 全选
            document.getElementById('selectAllUnits').onchange = (e) => {
                const checked = e.target.checked;
                document.querySelectorAll('#unitsTable tbody input[type="checkbox"]').forEach(cb => {
                    cb.checked = checked;
                });
            };

            // 单元管理 - 批量删除
            document.getElementById('batchDeleteUnitBtn').onclick = () => {
                const selected = document.querySelectorAll('#unitsTable tbody input[type="checkbox"]:checked');
                if (selected.length === 0) {
                    alert('请选择要删除的单元');
                    return;
                }
                if (!confirm(`确定要删除选中的${selected.length}个单元吗？此操作不可恢复！`)) return;
                
                selected.forEach(cb => {
                    delete learningData[cb.value];
                });
                const saveSuccess = saveData();
                if (saveSuccess) {
                    document.getElementById('selectAllUnits').checked = false;
                    alert(`已成功删除${selected.length}个单元`);
                }
            };

            // 课程管理 - 单元切换
            document.getElementById('lessonUnitSelect').onchange = renderAdminLessonsTable;

            // 课程管理 - 添加/更新
            document.getElementById('addLessonBtn').onclick = () => {
                const unitId = document.getElementById('lessonUnitSelect').value;
                const lessonId = document.getElementById('lessonId').value;
                const contentStr = document.getElementById('lessonContent').value.trim();
                
                if (!unitId || !lessonId || !contentStr) {
                    alert('请填写完整信息');
                    return;
                }
                
                try {
                    const content = JSON.parse(contentStr);
                    if (!Array.isArray(content)) {
                        alert('课程内容必须是数组格式');
                        return;
                    }
                    if (!learningData[unitId].lessons) {
                        learningData[unitId].lessons = {};
                    }
                    learningData[unitId].lessons[lessonId] = content;
                    const saveSuccess = saveData();
                    if (saveSuccess) {
                        document.getElementById('lessonId').value = '';
                        document.getElementById('lessonContent').value = '';
                        alert('课程添加/更新成功');
                    }
                } catch (e) {
                    console.error("JSON解析错误", e);
                    alert('JSON格式错误，请检查');
                }
            };

            // 课程管理 - 删除单课程
            document.getElementById('deleteLessonBtn').onclick = () => {
                const unitId = document.getElementById('lessonUnitSelect').value;
                const lessonId = document.getElementById('lessonId').value;
                if (!unitId || !lessonId) {
                    alert('请选择要删除的课程');
                    return;
                }
                if (!confirm('确定要删除这个课程吗？')) return;
                
                delete learningData[unitId].lessons[lessonId];
                const saveSuccess = saveData();
                if (saveSuccess) {
                    alert('课程删除成功');
                }
            };

            // 课程管理 - 一键清空单元所有课程
            document.getElementById('clearAllLessonsBtn').onclick = () => {
                const unitId = document.getElementById('lessonUnitSelect').value;
                if (!unitId) {
                    alert('请先选择要清空课程的单元');
                    return;
                }
                if (!confirm(`确定要清空【${learningData[unitId].name}】的所有课程吗？此操作不可恢复！`)) return;
                
                learningData[unitId].lessons = {};
                const saveSuccess = saveData();
                if (saveSuccess) {
                    alert('已清空该单元的所有课程');
                }
            };

            // 重写导入功能（带严格结构校验）
            const importFile = document.getElementById('importFile');
            const importBtn = document.getElementById('importBtn');
            const importStatusTip = document.getElementById('importStatusTip');

            importBtn.onclick = () => {
                const file = importFile.files[0];
                if (!file) {
                    importStatusTip.textContent = "❌ 请先选择一个JSON文件";
                    importStatusTip.className = "status-tip error";
                    return;
                }
                
                importStatusTip.textContent = "正在读取文件...";
                importStatusTip.className = "status-tip";

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const newData = JSON.parse(event.target.result);
                        console.log("导入的文件内容", newData);
                        
                        // 严格校验结构
                        if (!validateDataStructure(newData)) {
                            importStatusTip.textContent = "❌ 导入失败：JSON结构不符合系统要求，请检查文件格式";
                            importStatusTip.className = "status-tip error";
                            importFile.value = '';
                            return;
                        }

                        // 校验通过，写入数据
                        learningData = newData;
                        const saveSuccess = saveData();
                        if (saveSuccess) {
                            importStatusTip.textContent = "✅ 导入成功！数据已永久保存，刷新页面不会丢失";
                            importStatusTip.className = "status-tip success";
                            importFile.value = '';
                            // 强制刷新前台UI
                            refreshAllUI();
                        } else {
                            importStatusTip.textContent = "❌ 导入失败：数据保存异常";
                            importStatusTip.className = "status-tip error";
                        }
                    } catch (err) {
                        console.error("导入错误:", err);
                        importStatusTip.textContent = "❌ 导入失败：JSON格式错误，请检查文件内容";
                        importStatusTip.className = "status-tip error";
                        importFile.value = '';
                    }
                };

                reader.onerror = () => {
                    importStatusTip.textContent = "❌ 文件读取失败，请重试";
                    importStatusTip.className = "status-tip error";
                    importFile.value = '';
                };

                reader.readAsText(file);
            };

            // 导出功能
            document.getElementById('exportBtn').onclick = () => {
                const dataStr = JSON.stringify(learningData, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'indonesian_learning_data_v' + VERSION + '.json';
                a.click();
                URL.revokeObjectURL(url);
            };

            // 重置功能
            document.getElementById('resetBtn').onclick = () => {
                if (!confirm('确定要重置为默认数据吗？这将删除所有自定义内容！')) return;
                learningData = JSON.parse(JSON.stringify(defaultData));
                const saveSuccess = saveData();
                if (saveSuccess) {
                    alert('数据已重置为默认值');
                    refreshAllUI();
                }
            };

            console.log("✅ 所有事件绑定完成");
        }

        // ==================== 后台渲染函数 ====================
        function renderAdminUnitsTable() {
            const tbody = document.querySelector('#unitsTable tbody');
            tbody.innerHTML = '';
            const unitIds = Object.keys(learningData).sort((a,b) => Number(a) - Number(b));
            
            unitIds.forEach(unitId => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><input type="checkbox" value="${unitId}"></td>
                    <td>${unitId}</td>
                    <td>${learningData[unitId].name}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateLessonUnitSelect() {
            const select = document.getElementById('lessonUnitSelect');
            select.innerHTML = '';
            const unitIds = Object.keys(learningData).sort((a,b) => Number(a) - Number(b));
            
            unitIds.forEach(unitId => {
                const option = document.createElement('option');
                option.value = unitId;
                option.textContent = learningData[unitId].name;
                select.appendChild(option);
            });
        }

        function renderAdminLessonsTable() {
            const unitId = document.getElementById('lessonUnitSelect')?.value;
            const tbody = document.querySelector('#lessonsTable tbody');
            if (!unitId || !learningData[unitId]) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:var(--text-muted);">请先选择单元</td></tr>';
                return;
            }

            tbody.innerHTML = '';
            const lessons = learningData[unitId].lessons || {};
            const lessonIds = Object.keys(lessons).sort((a,b) => Number(a) - Number(b));
            
            lessonIds.forEach(lessonId => {
                const tr = document.createElement('tr');
                const preview = lessons[lessonId].slice(0, 2).map(i => `${i.id} → ${i.cn}`).join('; ');
                tr.innerHTML = `
                    <td>${lessonId}</td>
                    <td>${preview + (lessons[lessonId].length > 2 ? '...' : '')}</td>
                    <td><button class="btn btn-action" style="padding:6px 12px;font-size:13px;" onclick="editLesson('${unitId}', '${lessonId}')">编辑</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 编辑课程函数
        window.editLesson = function(unitId, lessonId) {
            document.getElementById('lessonUnitSelect').value = unitId;
            document.getElementById('lessonId').value = lessonId;
            document.getElementById('lessonContent').value = JSON.stringify(learningData[unitId].lessons[lessonId], null, 2);
        };
    </script>
</body>
</html>
