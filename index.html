<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印尼语学习系统 | TMI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0f1a;
            --bg-secondary: #0f172a;
            --bg-card: rgba(15, 23, 42, 0.8);
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
            --accent-gradient-soft: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(139, 92, 246, 0.1) 100%);
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-color: rgba(148, 163, 184, 0.15);
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --shadow-soft: 0 4px 24px rgba(0, 0, 0, 0.3);
            --shadow-accent: 0 4px 24px rgba(99, 102, 241, 0.3);
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, "Inter", sans-serif;
            background: var(--bg-primary);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.08) 0px, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px 16px 100px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-primary);
            border-radius: 10px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(24px) saturate(140%);
            -webkit-backdrop-filter: blur(24px) saturate(140%);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-soft);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover {
            border-color: rgba(99, 102, 241, 0.3);
            transform: translateY(-2px);
            box-shadow: var(--shadow-accent);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title-icon {
            width: 28px;
            height: 28px;
            background: var(--accent-gradient-soft);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-primary);
            font-weight: 700;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }

        .btn {
            background: rgba(30, 41, 59, 0.8);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            padding: 10px 16px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn:hover {
            background: rgba(51, 65, 85, 0.9);
            border-color: var(--accent-primary);
            transform: translateY(-1px);
            color: var(--text-primary);
        }

        .btn.active {
            background: var(--accent-gradient);
            color: white;
            border-color: transparent;
            box-shadow: var(--shadow-accent);
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            border-color: transparent;
        }

        .btn-warning {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
            border: none;
        }

        .word-list {
            display: grid;
            gap: 8px;
        }

        .word-item {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .word-item:hover {
            background: var(--accent-gradient-soft);
            border-color: var(--accent-primary);
            transform: translateX(4px);
        }

        .word-item.active {
            background: var(--accent-gradient-soft);
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .word-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .word-indonesian {
            font-size: 16px;
            font-weight: 600;
            color: var(--accent-primary);
        }

        .word-chinese {
            font-size: 14px;
            color: var(--text-muted);
        }

        .word-index {
            width: 24px;
            height: 24px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent-primary);
        }

        .status-tip {
            margin-top: 12px;
            font-size: 13px;
            color: var(--text-muted);
            min-height: 18px;
        }

        .status-tip.success {
            color: var(--success);
            font-weight: 500;
        }

        .status-tip.error {
            color: var(--danger);
            font-weight: 500;
        }

        .status-tip.warning {
            color: var(--warning);
            font-weight: 500;
        }

        .control-panel {
            background: rgba(15, 23, 42, 0.6);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            margin-top: 12px;
            border: 1px solid var(--border-color);
        }

        .control-panel-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .speed-control label {
            color: var(--text-secondary);
            font-weight: 500;
            white-space: nowrap;
            font-size: 14px;
        }

        .speed-slider {
            flex: 1;
            min-width: 150px;
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            background: rgba(148, 163, 184, 0.2);
            border-radius: 10px;
            outline: none;
        }

        .speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent-gradient);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.4);
        }

        .speed-slider::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.6);
        }

        .speed-value {
            color: var(--accent-primary);
            font-weight: 700;
            font-size: 14px;
            min-width: 50px;
            text-align: center;
        }

        .read-control {
            margin-top: 12px;
        }

        .read-times-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .read-times-group .btn {
            padding: 8px 14px;
            font-size: 13px;
        }

        .admin-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }

        .version-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 15, 26, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 10px 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
            border-top: 1px solid var(--border-color);
            z-index: 999;
        }

        .version-footer span {
            color: var(--accent-primary);
            font-weight: 600;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
        }

        .loading-content {
            text-align: center;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 14px;
        }

        @media (max-width: 640px) {
            body {
                padding: 16px 12px 90px;
            }
            .card {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- 加载遮罩 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">正在加载课程数据...</div>
        </div>
    </div>

    <div class="container">
        <!-- 前台学习区域 -->
        <div id="learningSection">
            <!-- 选择单元 -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <div class="card-title-icon">📚</div>
                        选择单元
                    </div>
                </div>
                <div class="btn-group" id="unitBtns"></div>
            </div>

            <!-- 选择课程 -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <div class="card-title-icon">📖</div>
                        选择课程
                    </div>
                </div>
                <div class="btn-group" id="lessonBtns"></div>
            </div>

            <!-- 学习内容 -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <div class="card-title-icon">✏️</div>
                        学习内容
                    </div>
                </div>
                <div class="word-list" id="contentBox">
                    <p style="color: var(--text-muted); font-size: 14px; padding: 12px;">请先选择单元和课程</p>
                </div>
            </div>

            <!-- 快捷操作 -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <div class="card-title-icon">🎵</div>
                        快捷操作
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" id="readAllBtn">全文朗读</button>
                    <button class="btn btn-warning" id="stopReadBtn">停止朗读</button>
                    <button class="btn" id="clearBtn">清空内容</button>
                </div>
                
                <!-- 语速调节 -->
                <div class="control-panel">
                    <div class="control-panel-title">语速调节</div>
                    <div class="speed-control">
                        <label for="speedSlider">语速：</label>
                        <input type="range" id="speedSlider" class="speed-slider" min="0.15" max="1.5" step="0.05" value="0.75">
                        <span class="speed-value" id="speedValue">0.75x</span>
                    </div>
                </div>

                <!-- 单词朗读控制 -->
                <div class="control-panel read-control">
                    <div class="control-panel-title">选中单词朗读控制</div>
                    <div class="read-times-group">
                        <button class="btn btn-primary read-times-btn" data-times="1">读1次</button>
                        <button class="btn btn-primary read-times-btn" data-times="3">读3次</button>
                        <button class="btn btn-primary read-times-btn" data-times="5">读5次</button>
                        <button class="btn btn-primary read-times-btn" data-times="10">读10次</button>
                        <button class="btn btn-warning read-times-btn" data-times="0">无限循环</button>
                    </div>
                    <p class="status-tip" id="readStatusTip">请点击单词选中，再选择朗读次数</p>
                </div>
                
                <p class="status-tip" id="statusTip"></p>
            </div>
        </div>
    </div>

    <!-- 后台管理开关 -->
    <div class="admin-toggle">
        <button class="btn btn-primary" id="adminToggleBtn">后台管理</button>
    </div>

    <!-- 版本号底部显示 -->
    <div class="version-footer">
        印尼语学习系统 | 版本 <span id="footerVersion">V3.0.0</span> | 静态数据模式
    </div>

    <!-- 后台管理弹窗 -->
    <div class="modal" id="adminModal" style="display: none;">
        <div class="modal-box" style="max-width: 600px;">
            <h3>后台管理</h3>
            <p style="margin-bottom: 16px; color: var(--text-secondary); font-size: 14px;">
                <strong>当前模式：</strong>静态文件托管<br>
                <strong>数据来源：</strong><code style="background: rgba(99,102,241,0.1); padding: 2px 6px; border-radius: 4px;">indonesian_learning_data.json</code><br><br>
                <strong>更新课程方法：</strong><br>
                1. 修改仓库里的 <code style="background: rgba(99,102,241,0.1); padding: 2px 6px; border-radius: 4px;">indonesian_learning_data.json</code><br>
                2. 提交并推送到仓库<br>
                3. 用户刷新网页自动加载新课程
            </p>
            <div class="btn-group" style="justify-content: flex-end;">
                <button class="btn btn-primary" id="closeAdminModal">关闭</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 全局配置 ====================
        let VERSION = "3.0.0";
        const ADMIN_PASSWORD = "admin123";
        const DEFAULT_SPEECH_RATE = 0.75;
        const DATA_FILE_URL = "./indonesian_learning_data.json"; // 静态数据文件路径

        // ==================== 全局状态 ====================
        let learningData = {};
        let currentUnit = null;
        let currentLesson = null;
        let currentSelectedWord = null;
        let currentSelectedWordIndex = null;
        let isAdminOpen = false;
        let speechRate = DEFAULT_SPEECH_RATE;
        let isLoopReading = false;
        let currentReadTimes = 0;
        let currentReadMaxTimes = 0;
        let isReading = false;

        // ==================== 从静态文件加载数据（核心修改） ====================
        async function loadDataFromFile() {
            try {
                console.log("正在从静态文件加载课程数据...");
                const response = await fetch(DATA_FILE_URL);
                if (!response.ok) {
                    throw new Error("无法加载数据文件，HTTP状态: " + response.status);
                }
                learningData = await response.json();
                console.log("✅ 课程数据加载成功", learningData);
                
                // 初始化UI
                document.getElementById('loadingOverlay').style.display = 'none';
                renderUnitButtons();
                document.getElementById('statusTip').textContent = "课程数据加载成功！请选择单元开始学习";
                document.getElementById('statusTip').className = "status-tip success";
            } catch (error) {
                console.error("❌ 数据加载失败", error);
                document.getElementById('loadingOverlay').querySelector('.loading-text').textContent = 
                    "数据加载失败，请确保 indonesian_learning_data.json 文件在仓库根目录";
                document.getElementById('statusTip').textContent = "数据加载失败，请检查数据文件";
                document.getElementById('statusTip').className = "status-tip error";
            }
        }

        // ==================== UI渲染函数 ====================
        function renderUnitButtons() {
            const unitBtns = document.getElementById('unitBtns');
            unitBtns.innerHTML = '';
            const unitIds = Object.keys(learningData).sort((a,b) => Number(a) - Number(b));

            unitIds.forEach(unitId => {
                const unitData = learningData[unitId];
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.dataset.unit = unitId;
                btn.innerText = unitData.name;
                
                btn.onclick = () => {
                    document.querySelectorAll('#unitBtns .btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentUnit = parseInt(unitId);
                    renderLessonButtons();
                    stopAllRead();
                };
                unitBtns.appendChild(btn);
            });
        }

        function renderLessonButtons() {
            const lessonBtns = document.getElementById('lessonBtns');
            lessonBtns.innerHTML = '';
            if (!currentUnit || !learningData[currentUnit]) return;

            const lessonIds = Object.keys(learningData[currentUnit].lessons).sort((a,b) => Number(a) - Number(b));
            lessonIds.forEach(lessonId => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.dataset.lesson = lessonId;
                btn.innerText = '课程 ' + lessonId;
                
                btn.onclick = () => {
                    document.querySelectorAll('#lessonBtns .btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentLesson = parseInt(lessonId);
                    updateContent();
                    stopAllRead();
                };
                lessonBtns.appendChild(btn);
            });
        }

        function updateContent() {
            const contentBox = document.getElementById('contentBox');
            const statusTip = document.getElementById('statusTip');
            
            if (!currentUnit || !currentLesson) {
                contentBox.innerHTML = '<p style="color: var(--text-muted); font-size: 14px; padding: 12px;">请先选择单元和课程</p>';
                return;
            }

            const data = learningData[currentUnit]?.lessons?.[currentLesson];
            if (!data) {
                contentBox.innerHTML = '<p style="color: var(--text-muted); font-size: 14px; padding: 12px;">暂无内容</p>';
                return;
            }

            let html = '';
            data.forEach((item, index) => {
                html += `
                    <div class="word-item" data-index="${index}" data-text="${item.id}">
                        <div class="word-content">
                            <div class="word-index">${index + 1}</div>
                            <div>
                                <div class="word-indonesian">${item.id}</div>
                                <div class="word-chinese">${item.cn}</div>
                            </div>
                        </div>
                    </div>
                `;
            });

            contentBox.innerHTML = html;
            bindWordClickEvent();
            statusTip.textContent = "内容已加载，点击单词可选中朗读";
            statusTip.className = "status-tip success";
        }

        function bindWordClickEvent() {
            document.querySelectorAll('.word-item').forEach(item => {
                item.onclick = () => {
                    const index = parseInt(item.dataset.index);
                    const text = item.dataset.text;
                    
                    document.querySelectorAll('.word-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    currentSelectedWord = text;
                    currentSelectedWordIndex = index;
                    
                    document.getElementById('readStatusTip').textContent = "已选中：" + currentSelectedWord;
                    document.getElementById('readStatusTip').className = "status-tip success";
                    
                    if (isReading || isLoopReading) {
                        stopAllRead();
                        if (currentReadMaxTimes === 0) {
                            readWord(currentSelectedWord, 0, true);
                        } else {
                            readWord(currentSelectedWord, currentReadMaxTimes, false);
                        }
                    }
                };
            });
        }

        // ==================== 朗读控制 ====================
        function stopAllRead() {
            window.speechSynthesis.cancel();
            isLoopReading = false;
            isReading = false;
            currentReadTimes = 0;
            document.getElementById('readStatusTip').textContent = currentSelectedWord ? "已选中：" + currentSelectedWord : "请点击单词选中，再选择朗读次数";
            document.getElementById('readStatusTip').className = "status-tip warning";
        }

        function readWord(text, times, isLoop = false) {
            stopAllRead();
            if (!text) {
                document.getElementById('readStatusTip').textContent = "请先选中要朗读的单词";
                document.getElementById('readStatusTip').className = "status-tip error";
                return;
            }

            currentReadMaxTimes = times;
            currentReadTimes = 0;
            isReading = true;
            
            document.getElementById('readStatusTip').textContent = `正在朗读：${text}，${isLoop ? '无限循环中' : `共${times}次`}`;
            document.getElementById('readStatusTip').className = "status-tip success";

            function speakOnce() {
                if (!isReading && !isLoopReading) return;
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = "id-ID";
                utterance.rate = speechRate;
                utterance.pitch = 1;
                utterance.volume = 1;

                utterance.onend = () => {
                    currentReadTimes++;
                    if (isLoop) {
                        isLoopReading = true;
                        window.speechSynthesis.speak(utterance);
                    } else if (currentReadTimes < times) {
                        window.speechSynthesis.speak(utterance);
                    } else {
                        isReading = false;
                        document.getElementById('readStatusTip').textContent = `朗读完成：${text}，共${times}次`;
                        document.getElementById('readStatusTip').className = "status-tip success";
                    }
                };

                utterance.onerror = (e) => {
                    console.error("朗读报错", e);
                    isReading = false;
                    isLoopReading = false;
                    document.getElementById('readStatusTip').textContent = "朗读失败，请重试";
                    document.getElementById('readStatusTip').className = "status-tip error";
                };

                window.speechSynthesis.speak(utterance);
            }

            if (isLoop) {
                isLoopReading = true;
                speakOnce();
            } else {
                speakOnce();
            }
        }

        function readAllContent() {
            stopAllRead();
            if (!currentUnit || !currentLesson) {
                document.getElementById('statusTip').textContent = "请先选择单元和课程";
                document.getElementById('statusTip').className = "status-tip error";
                return;
            }

            const data = learningData[currentUnit]?.lessons?.[currentLesson];
            if (!data || data.length === 0) {
                document.getElementById('statusTip').textContent = "暂无内容可朗读";
                document.getElementById('statusTip').className = "status-tip error";
                return;
            }

            const textToRead = data.map(item => item.id).join(". ");
            document.getElementById('statusTip').textContent = "正在播放全文发音...";
            document.getElementById('statusTip').className = "status-tip";

            const utterance = new SpeechSynthesisUtterance(textToRead);
            utterance.lang = "id-ID";
            utterance.rate = speechRate;

            utterance.onend = () => {
                document.getElementById('statusTip').textContent = "全文播放完成";
                document.getElementById('statusTip').className = "status-tip success";
            };
            utterance.onerror = (e) => {
                console.error("播放报错", e);
                document.getElementById('statusTip').textContent = "播放失败，请刷新重试";
                document.getElementById('statusTip').className = "status-tip error";
            };

            window.speechSynthesis.speak(utterance);
        }

        function initSpeedControl() {
            const speedSlider = document.getElementById('speedSlider');
            const speedValue = document.getElementById('speedValue');
            speedSlider.value = speechRate;
            speedValue.textContent = speechRate.toFixed(2) + 'x';

            speedSlider.oninput = (e) => {
                speechRate = parseFloat(e.target.value);
                speedValue.textContent = speechRate.toFixed(2) + 'x';
            };
        }

        // ==================== 事件绑定 ====================
        function setupAllEvents() {
            document.getElementById('readAllBtn').onclick = readAllContent;
            document.getElementById('stopReadBtn').onclick = stopAllRead;
            document.getElementById('clearBtn').onclick = () => {
                stopAllRead();
                document.getElementById('contentBox').innerHTML = '<p style="color: var(--text-muted); font-size: 14px; padding: 12px;">请先选择单元和课程</p>';
                document.getElementById('statusTip').textContent = "";
                document.querySelectorAll('#unitBtns .btn, #lessonBtns .btn').forEach(b => b.classList.remove('active'));
                currentUnit = null;
                currentLesson = null;
                currentSelectedWord = null;
                currentSelectedWordIndex = null;
            };

            document.querySelectorAll('.read-times-btn').forEach(btn => {
                btn.onclick = () => {
                    const times = parseInt(btn.dataset.times);
                    if (times === 0) {
                        readWord(currentSelectedWord, 0, true);
                    } else {
                        readWord(currentSelectedWord, times, false);
                    }
                };
            });

            // 后台管理（简化版，只显示说明）
            document.getElementById('adminToggleBtn').onclick = () => {
                const password = prompt("请输入后台管理密码：");
                if (password === ADMIN_PASSWORD) {
                    document.getElementById('adminModal').style.display = 'flex';
                } else if (password !== null) {
                    alert("密码错误！");
                }
            };

            document.getElementById('closeAdminModal').onclick = () => {
                document.getElementById('adminModal').style.display = 'none';
            };

            console.log("✅ 所有事件绑定完成");
        }

        // ==================== 页面初始化 ====================
        window.onload = function() {
            console.log("印尼语学习系统 版本" + VERSION + " - 静态数据模式");
            document.getElementById('footerVersion').textContent = 'V' + VERSION;
            
            initSpeedControl();
            setupAllEvents();
            loadDataFromFile(); // 从静态文件加载数据
        };
    </script>
</body>
</html>
