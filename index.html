<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印尼语学习系统 | TMI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #f1f5f9;
            border-left: 4px solid #3b82f6;
            padding-left: 12px;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 8px;
            align-items: center;
        }

        .btn {
            background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
            color: #cbd5e1;
            border: 1px solid rgba(148, 163, 184, 0.3);
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: linear-gradient(135deg, #475569 0%, #334155 100%);
            border-color: #3b82f6;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn.active {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border-color: #3b82f6;
        }

        .btn-action {
            background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%);
            color: white;
            border: none;
        }

        .btn-action:hover {
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            border: none;
        }

        .btn-danger:hover {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
            border: none;
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
        }

        .content-box {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 12px;
            padding: 20px;
            margin-top: 12px;
            line-height: 2;
        }

        .content-item {
            font-size: 17px;
            margin-bottom: 8px;
        }

        .indonesian {
            color: #38bdf8;
            font-weight: 600;
        }

        .chinese {
            color: #94a3b8;
        }

        .status-tip {
            margin-top: 16px;
            font-size: 14px;
            color: #a0aec0;
            min-height: 20px;
        }

        .status-tip.success {
            color: #22c55e;
        }

        .status-tip.error {
            color: #ef4444;
        }

        .admin-section {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 2px solid rgba(148, 163, 184, 0.2);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 15px;
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }

        .data-table th,
        .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        }

        .data-table th {
            background: rgba(15, 23, 42, 0.8);
            color: #38bdf8;
            font-weight: 600;
        }

        .data-table tr:hover {
            background: rgba(30, 41, 59, 0.5);
        }

        .admin-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }

        .hidden-file-input {
            display: none;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            padding-bottom: 12px;
        }

        .tab {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .tab:hover {
            color: #e2e8f0;
            background: rgba(30, 41, 59, 0.5);
        }

        .tab.active {
            color: #38bdf8;
            background: rgba(59, 130, 246, 0.1);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 10px;
            margin-top: 12px;
        }

        .speed-control label {
            color: #cbd5e1;
            font-weight: 500;
            white-space: nowrap;
        }

        .speed-slider {
            flex: 1;
            -webkit-appearance: none;
            height: 6px;
            background: rgba(148, 163, 184, 0.3);
            border-radius: 3px;
            outline: none;
        }

        .speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #38bdf8;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .speed-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        .speed-value {
            color: #38bdf8;
            font-weight: 600;
            font-size: 16px;
            min-width: 50px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 前台学习区域 -->
        <div id="learningSection">
            <!-- 选择单元 -->
            <div class="card">
                <h2>选择单元</h2>
                <div class="btn-group" id="unitBtns"></div>
            </div>

            <!-- 选择课程 -->
            <div class="card">
                <h2>选择课程</h2>
                <div class="btn-group" id="lessonBtns"></div>
            </div>

            <!-- 学习内容 -->
            <div class="card">
                <h2>学习内容</h2>
                <div class="content-box" id="contentBox">
                    <p style="color: #64748b;">请先选择单元和课程</p>
                </div>
            </div>

            <!-- 快捷操作 -->
            <div class="card">
                <h2>快捷操作</h2>
                <div class="btn-group">
                    <button class="btn btn-action" id="showBtn">显示内容</button>
                    <button class="btn btn-action" id="readBtn">朗读发音</button>
                    <button class="btn btn-action" id="clearBtn">清空内容</button>
                </div>
                
                <!-- 语速调节 -->
                <div class="speed-control">
                    <label for="speedSlider">语速调节：</label>
                    <input type="range" id="speedSlider" class="speed-slider" min="0.5" max="2" step="0.1" value="0.75">
                    <span class="speed-value" id="speedValue">0.75x</span>
                </div>
                
                <p class="status-tip" id="statusTip"></p>
            </div>
        </div>

        <!-- 后台管理区域 -->
        <div id="adminSection" class="admin-section">
            <div class="card">
                <h2>后台管理系统</h2>
                
                <!-- 标签页 -->
                <div class="tabs">
                    <button class="tab active" data-tab="units">单元管理</button>
                    <button class="tab" data-tab="lessons">课程管理</button>
                    <button class="tab" data-tab="import-export">导入/导出</button>
                </div>

                <!-- 单元管理 -->
                <div id="unitsTab" class="tab-content active">
                    <div class="form-group">
                        <label>单元名称</label>
                        <input type="text" id="unitName" placeholder="例如：单元 1 - 基础问候">
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-success" id="addUnitBtn">添加单元</button>
                        <button class="btn btn-danger" id="deleteUnitBtn">删除选中单元</button>
                    </div>
                    <table class="data-table" id="unitsTable">
                        <thead>
                            <tr>
                                <th>选择</th>
                                <th>单元ID</th>
                                <th>单元名称</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>

                <!-- 课程管理 -->
                <div id="lessonsTab" class="tab-content">
                    <div class="form-group">
                        <label>选择单元</label>
                        <select id="lessonUnitSelect"></select>
                    </div>
                    <div class="form-group">
                        <label>课程ID</label>
                        <input type="number" id="lessonId" placeholder="例如：1">
                    </div>
                    <div class="form-group">
                        <label>课程内容 (JSON格式)</label>
                        <textarea id="lessonContent" placeholder='[{"id": "Selamat pagi", "cn": "早上好"}, {"id": "Terima kasih", "cn": "谢谢"}]'></textarea>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-success" id="addLessonBtn">添加/更新课程</button>
                        <button class="btn btn-danger" id="deleteLessonBtn">删除课程</button>
                    </div>
                    <table class="data-table" id="lessonsTable">
                        <thead>
                            <tr>
                                <th>课程ID</th>
                                <th>内容预览</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>

                <!-- 导入/导出 -->
                <div id="importExportTab" class="tab-content">
                    <!-- 修复：文件输入框放在这里，确保DOM存在 -->
                    <input type="file" id="importFile" class="hidden-file-input" accept=".json">
                    
                    <div class="form-group">
                        <label>导入课程数据 (JSON文件)</label>
                        <button class="btn btn-action" id="importBtn">选择文件并导入</button>
                        <p class="status-tip" id="importStatusTip"></p>
                    </div>
                    <div class="form-group">
                        <label>导出当前课程数据</label>
                        <button class="btn btn-success" id="exportBtn">导出为 JSON</button>
                    </div>
                    <div class="form-group">
                        <label>重置为默认数据</label>
                        <button class="btn btn-danger" id="resetBtn">重置数据</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 后台管理开关 -->
    <div class="admin-toggle">
        <button class="btn btn-action" id="adminToggleBtn">后台管理</button>
    </div>

    <script>
        // ==================== 配置 ====================
        const ADMIN_PASSWORD = "admin123";
        const DEFAULT_SPEECH_RATE = 0.75;

        // ==================== 默认学习数据 ====================
        const defaultData = {
            1: {
                name: "单元 1 - 基础问候",
                lessons: {
                    1: [
                        { id: "Selamat pagi", cn: "早上好" },
                        { id: "Selamat siang", cn: "下午好" },
                        { id: "Selamat malam", cn: "晚上好" },
                        { id: "Terima kasih", cn: "谢谢" },
                        { id: "Maaf", cn: "对不起" },
                        { id: "Selamat tinggal", cn: "再见" },
                        { id: "Berapa harganya?", cn: "多少钱？" }
                    ]
                }
            }
        };

        // ==================== 全局状态 ====================
        let learningData = {};
        let currentUnit = null;
        let currentLesson = null;
        let currentTextToRead = "";
        let isAdminOpen = false;
        let speechRate = DEFAULT_SPEECH_RATE;

        // ==================== 页面加载完成后执行所有逻辑 ====================
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化所有功能
            init();
            // 绑定所有事件
            setupAllEventListeners();
        });

        // ==================== 初始化 ====================
        function init() {
            loadData();
            renderUnitButtons();
            setupSpeedControl();
        }

        // ==================== 语速控制 ====================
        function setupSpeedControl() {
            const speedSlider = document.getElementById('speedSlider');
            const speedValue = document.getElementById('speedValue');
            
            speedSlider.value = speechRate;
            speedValue.textContent = speechRate + 'x';

            speedSlider.addEventListener('input', (e) => {
                speechRate = parseFloat(e.target.value);
                speedValue.textContent = speechRate.toFixed(2) + 'x';
            });
        }

        // ==================== 数据管理 ====================
        function loadData() {
            const savedData = localStorage.getItem('indonesianLearningData');
            learningData = savedData ? JSON.parse(savedData) : JSON.parse(JSON.stringify(defaultData));
        }

        function saveData() {
            localStorage.setItem('indonesianLearningData', JSON.stringify(learningData));
            renderUnitButtons();
            renderAdminUnitsTable();
            renderAdminLessonsTable();
            updateLessonUnitSelect();
        }

        // ==================== 前台学习功能 ====================
        function renderUnitButtons() {
            const unitBtns = document.getElementById('unitBtns');
            unitBtns.innerHTML = '';
            
            Object.keys(learningData).sort((a, b) => a - b).forEach(unitId => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.dataset.unit = unitId;
                btn.textContent = learningData[unitId].name;
                
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#unitBtns .btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentUnit = parseInt(unitId);
                    renderLessonButtons();
                    updateContent();
                });
                
                unitBtns.appendChild(btn);
            });
        }

        function renderLessonButtons() {
            const lessonBtns = document.getElementById('lessonBtns');
            lessonBtns.innerHTML = '';
            
            if (!currentUnit || !learningData[currentUnit]) return;

            Object.keys(learningData[currentUnit].lessons).sort((a, b) => a - b).forEach(lessonId => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.dataset.lesson = lessonId;
                btn.textContent = `课程 ${lessonId}`;
                
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#lessonBtns .btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentLesson = parseInt(lessonId);
                    updateContent();
                });
                
                lessonBtns.appendChild(btn);
            });
        }

        function updateContent() {
            const contentBox = document.getElementById('contentBox');
            const statusTip = document.getElementById('statusTip');
            
            if (!currentUnit || !currentLesson) {
                contentBox.innerHTML = '<p style="color: #64748b;">请先选择单元和课程</p>';
                currentTextToRead = "";
                return;
            }

            const data = learningData[currentUnit]?.lessons?.[currentLesson];
            if (!data) {
                contentBox.innerHTML = '<p style="color: #64748b;">暂无内容</p>';
                currentTextToRead = "";
                return;
            }

            let html = `<p style="color: #38bdf8; font-weight: 600; margin-bottom: 12px;">📘 ${learningData[currentUnit].name} - 课程 ${currentLesson}</p>`;
            let textToRead = "";
            
            data.forEach(item => {
                html += `<div class="content-item">
                    <span class="indonesian">${item.id}</span>
                    <span class="chinese"> → ${item.cn}</span>
                </div>`;
                textToRead += item.id + ". ";
            });

            contentBox.innerHTML = html;
            currentTextToRead = textToRead.trim();
            setStatus("内容已加载", "success");
        }

        function setStatus(text, type) {
            const statusTip = document.getElementById('statusTip');
            statusTip.textContent = text;
            statusTip.className = "status-tip";
            if (type) statusTip.classList.add(type);
        }

        // ==================== 所有事件绑定 ====================
        function setupAllEventListeners() {
            // 前台按钮事件
            document.getElementById('showBtn').addEventListener('click', updateContent);
            
            document.getElementById('readBtn').addEventListener('click', () => {
                if (!currentTextToRead) {
                    setStatus("请先选择单元和课程", "error");
                    return;
                }

                window.speechSynthesis.cancel();
                setStatus("正在播放发音...", "");

                const utterance = new SpeechSynthesisUtterance(currentTextToRead);
                utterance.lang = "id-ID";
                utterance.rate = speechRate;
                utterance.pitch = 1;
                utterance.volume = 1;

                utterance.onend = () => setStatus("播放完成", "success");
                utterance.onerror = () => setStatus("播放失败，请刷新重试", "error");

                window.speechSynthesis.speak(utterance);
            });

            document.getElementById('clearBtn').addEventListener('click', () => {
                window.speechSynthesis.cancel();
                document.getElementById('contentBox').innerHTML = '<p style="color: #64748b;">请先选择单元和课程</p>';
                currentTextToRead = "";
                setStatus("", "");
                document.querySelectorAll('#unitBtns .btn, #lessonBtns .btn').forEach(b => b.classList.remove('active'));
                currentUnit = null;
                currentLesson = null;
            });

            // 后台开关事件
            document.getElementById('adminToggleBtn').addEventListener('click', () => {
                if (!isAdminOpen) {
                    const password = prompt("请输入后台管理密码：");
                    if (password === ADMIN_PASSWORD) {
                        isAdminOpen = true;
                        document.getElementById('adminSection').style.display = 'block';
                        document.getElementById('adminToggleBtn').textContent = "关闭后台";
                        renderAdminUnitsTable();
                        renderAdminLessonsTable();
                        updateLessonUnitSelect();
                    } else if (password !== null) {
                        alert("密码错误！");
                    }
                } else {
                    isAdminOpen = false;
                    document.getElementById('adminSection').style.display = 'none';
                    document.getElementById('adminToggleBtn').textContent = "后台管理";
                }
            });

            // 标签页切换
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(`${tab.dataset.tab}Tab`).classList.add('active');
                });
            });

            // 单元管理事件
            document.getElementById('addUnitBtn').addEventListener('click', () => {
                const name = document.getElementById('unitName').value.trim();
                if (!name) return alert('请输入单元名称');
                
                const newId = Math.max(0, ...Object.keys(learningData).map(Number)) + 1;
                learningData[newId] = { name, lessons: {} };
                saveData();
                document.getElementById('unitName').value = '';
            });

            document.getElementById('deleteUnitBtn').addEventListener('click', () => {
                const selected = document.querySelector('#unitsTable input[type="checkbox"]:checked');
                if (!selected) return alert('请选择要删除的单元');
                if (!confirm('确定要删除这个单元吗？')) return;
                
                delete learningData[selected.value];
                saveData();
            });

            // 课程管理事件
            document.getElementById('lessonUnitSelect').addEventListener('change', renderAdminLessonsTable);

            document.getElementById('addLessonBtn').addEventListener('click', () => {
                const unitId = document.getElementById('lessonUnitSelect').value;
                const lessonId = document.getElementById('lessonId').value;
                const contentStr = document.getElementById('lessonContent').value.trim();
                
                if (!unitId || !lessonId || !contentStr) return alert('请填写完整信息');
                
                try {
                    const content = JSON.parse(contentStr);
                    if (!learningData[unitId].lessons) learningData[unitId].lessons = {};
                    learningData[unitId].lessons[lessonId] = content;
                    saveData();
                    document.getElementById('lessonId').value = '';
                    document.getElementById('lessonContent').value = '';
                } catch (e) {
                    alert('JSON格式错误，请检查');
                }
            });

            document.getElementById('deleteLessonBtn').addEventListener('click', () => {
                const unitId = document.getElementById('lessonUnitSelect').value;
                const lessonId = document.getElementById('lessonId').value;
                if (!unitId || !lessonId) return alert('请选择要删除的课程');
                if (!confirm('确定要删除这个课程吗？')) return;
                
                delete learningData[unitId].lessons[lessonId];
                saveData();
            });

            // ==================== 修复后的导入导出事件 ====================
            const importFile = document.getElementById('importFile');
            const importBtn = document.getElementById('importBtn');
            const importStatusTip = document.getElementById('importStatusTip');

            // 导入按钮点击事件（Safari兼容：同步触发文件选择）
            importBtn.addEventListener('click', () => {
                importFile.click();
            });

            // 文件选择后自动导入
            importFile.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                importStatusTip.textContent = "正在读取文件...";
                importStatusTip.className = "status-tip";

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const newData = JSON.parse(event.target.result);
                        learningData = newData;
                        saveData();
                        importStatusTip.textContent = "✅ 导入成功！页面已刷新数据";
                        importStatusTip.className = "status-tip success";
                        // 清空文件输入，允许重复导入同一个文件
                        importFile.value = '';
                    } catch (err) {
                        console.error("导入错误:", err);
                        importStatusTip.textContent = "❌ 导入失败：JSON格式错误，请检查文件";
                        importStatusTip.className = "status-tip error";
                        importFile.value = '';
                    }
                };

                reader.onerror = () => {
                    importStatusTip.textContent = "❌ 文件读取失败，请重试";
                    importStatusTip.className = "status-tip error";
                    importFile.value = '';
                };

                reader.readAsText(file);
            });

            // 导出按钮事件
            document.getElementById('exportBtn').addEventListener('click', () => {
                const dataStr = JSON.stringify(learningData, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'indonesian_learning_data.json';
                a.click();
                URL.revokeObjectURL(url);
            });

            // 重置按钮事件
            document.getElementById('resetBtn').addEventListener('click', () => {
                if (!confirm('确定要重置为默认数据吗？这将删除所有自定义内容！')) return;
                learningData = JSON.parse(JSON.stringify(defaultData));
                saveData();
                alert('数据已重置');
            });
        }

        // ==================== 后台管理渲染函数 ====================
        function renderAdminUnitsTable() {
            const tbody = document.querySelector('#unitsTable tbody');
            tbody.innerHTML = '';
            Object.keys(learningData).sort((a, b) => a - b).forEach(unitId => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><input type="checkbox" value="${unitId}"></td>
                    <td>${unitId}</td>
                    <td>${learningData[unitId].name}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateLessonUnitSelect() {
            const select = document.getElementById('lessonUnitSelect');
            select.innerHTML = '';
            Object.keys(learningData).sort((a, b) => a - b).forEach(unitId => {
                const option = document.createElement('option');
                option.value = unitId;
                option.textContent = learningData[unitId].name;
                select.appendChild(option);
            });
        }

        function renderAdminLessonsTable() {
            const unitId = document.getElementById('lessonUnitSelect')?.value;
            const tbody = document.querySelector('#lessonsTable tbody');
            if (!unitId || !learningData[unitId]) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#64748b;">请先选择单元</td></tr>';
                return;
            }

            tbody.innerHTML = '';
            const lessons = learningData[unitId].lessons || {};
            Object.keys(lessons).sort((a, b) => a - b).forEach(lessonId => {
                const tr = document.createElement('tr');
                const preview = lessons[lessonId].slice(0, 2).map(i => `${i.id} → ${i.cn}`).join('; ');
                tr.innerHTML = `
                    <td>${lessonId}</td>
                    <td>${preview}${lessons[lessonId].length > 2 ? '...' : ''}</td>
                    <td>
                        <button class="btn btn-action" style="padding:6px 12px;font-size:13px;" onclick="editLesson('${unitId}', '${lessonId}')">编辑</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 编辑课程函数（全局可访问）
        window.editLesson = function(unitId, lessonId) {
            document.getElementById('lessonUnitSelect').value = unitId;
            document.getElementById('lessonId').value = lessonId;
            document.getElementById('lessonContent').value = JSON.stringify(learningData[unitId].lessons[lessonId], null, 2);
        };
    </script>
</body>
</html>
