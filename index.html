<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印尼语学习小助手</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #030712;
            --glass: rgba(17, 24, 39, 0.85);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --text-main: #f9fafb;
            --text-muted: #94a3b8;
            --sidebar-w: 300px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%), 
                              radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            font-family: 'Segoe UI', 'SF Pro Display', 'PingFang SC', system-ui, sans-serif;
            height: 100vh; display: flex; overflow: hidden;
        }

        /* 侧边栏 */
        .sidebar {
            width: var(--sidebar-w); height: 100%; background: var(--glass); backdrop-filter: blur(25px);
            border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; z-index: 1000;
        }
        .sidebar.collapsed { width: 0; transform: translateX(calc(var(--sidebar-w) * -1)); }
        .sidebar-inner { width: var(--sidebar-w); height: 100%; overflow-y: auto; padding: 25px 15px; transition: opacity 0.3s; }
        .sidebar.collapsed .sidebar-inner { opacity: 0; pointer-events: none; }
        .toggle-sidebar {
            position: absolute; right: -35px; top: 30px; width: 35px; height: 45px;
            background: var(--accent); border: none; color: white; cursor: pointer;
            border-radius: 0 8px 8px 0; display: flex; align-items: center; justify-content: center;
        }

        /* 主界面卡片 */
        .main-container { flex: 1; display: flex; flex-direction: column; padding: 30px; position: relative; overflow: hidden; }
        .study-card {
            background: rgba(30, 41, 59, 0.4); border-radius: 50px; border: 1px solid rgba(255,255,255,0.1);
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; padding: 40px; box-shadow: 0 40px 80px rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            transition: transform 0.3s, opacity 0.3s;
        }
        .card-anim { transform: scale(0.97); opacity: 0.5; }

        .top-meta { position: absolute; top: 40px; left: 50px; right: 50px; display: flex; justify-content: space-between; align-items: center; }
        .word-badge { background: var(--accent); color: white; padding: 5px 18px; border-radius: 12px; font-weight: bold; font-family: 'JetBrains Mono', Arial; }
        .star-btn { font-size: 2.2rem; cursor: pointer; color: rgba(255,255,255,0.1); transition: 0.3s; }
        .star-btn.active { color: #fbbf24; }

        .indo-box { font-size: 5rem; font-weight: 900; margin-bottom: 10px; text-align: center; }
        .zh-box { font-size: 2.2rem; color: var(--text-muted); font-weight: 300; }

        /* 功能控制区 - 视觉美化 */
        .control-panel {
            width: 100%; max-width: 850px; margin: 30px auto 0; background: var(--glass);
            padding: 25px 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; gap: 20px;
        }
        .ctrl-row { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .ctrl-label { font-size: 1rem; color: var(--text-muted); font-weight: 600; min-width: 100px; }
        .ctrl-widget { flex: 1; display: flex; align-items: center; justify-content: flex-end; gap: 20px; }
        
        /* 数值字体优化：等宽、清晰、拒绝宋体 */
        .ctrl-value { 
            min-width: 65px; text-align: right; 
            font-family: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace; 
            color: var(--accent); font-weight: bold; font-size: 1.1rem; 
        }

        .switch { position: relative; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #334155; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(24px); }

        /* 版权区 */
        .copyright { font-size: 0.85rem; text-align: center; color: #4b5563; margin-top: 30px; letter-spacing: 0.5px; }
        .clickable { color: var(--accent); cursor: pointer; font-weight: 600; transition: 0.2s; }
        .clickable:hover { color: #818cf8; text-decoration: underline; }

        /* 弹窗通用样式 */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .modal-content { background: #1e293b; padding: 30px; border-radius: 24px; text-align: center; border: 1px solid rgba(255,255,255,0.1); max-width: 90%; }
        .hotcode-area { width: 500px; max-width: 90vw; }
        .hotcode-area textarea { width: 100%; height: 250px; background: #0f172a; color: #10b981; padding: 15px; border-radius: 12px; font-family: monospace; border: 1px solid #334155; margin-top: 15px; outline: none; }

        .nav-row { display: flex; gap: 40px; margin-top: 50px; }
        .circle-btn { width: 75px; height: 75px; border-radius: 50%; border: none; background: rgba(255,255,255,0.05); color: white; font-size: 1.8rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .circle-btn:hover { background: var(--accent); transform: translateY(-3px); }
        .play-btn { width: 95px; height: 95px; background: var(--accent); }
        .playing { background: #ef4444 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 100% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <button class="toggle-sidebar" onclick="document.getElementById('sidebar').classList.toggle('collapsed')">
            <i class="fas fa-chevron-left"></i>
        </button>
        <div class="sidebar-inner" id="menu-box"></div>
    </aside>

    <main class="main-container">
        <header><h1 style="text-align: center; font-weight: 900; letter-spacing: -1px;">INDONESIAN ASSISTANT</h1></header>

        <section class="study-card" id="main-card">
            <div class="top-meta">
                <div class="word-badge" id="word-idx">01</div>
                <div class="star-btn" id="fav-trigger" onclick="handleFav()"><i class="fas fa-star"></i></div>
            </div>
            <div class="indo-box" id="disp-indo">Loading</div>
            <div class="zh-box" id="disp-zh">请稍等</div>
            <div class="nav-row">
                <button class="circle-btn" onclick="navWord(-1)"><i class="fas fa-chevron-left"></i></button>
                <button id="main-play" class="circle-btn play-btn" onclick="toggleSpeech()"><i class="fas fa-play" id="play-ico"></i></button>
                <button class="circle-btn" onclick="navWord(1)"><i class="fas fa-chevron-right"></i></button>
            </div>
        </section>

        <footer class="control-panel">
            <div class="ctrl-row">
                <span class="ctrl-label">语音语速</span>
                <div class="ctrl-widget">
                    <input type="range" class="ctrl-slider" id="inp-rate" min="0.1" max="1.5" step="0.1" value="0.8" oninput="updateSetting('rate', this.value)">
                    <span class="ctrl-value"><span id="val-rate">0.8</span>X</span>
                </div>
            </div>
            <div class="ctrl-row">
                <span class="ctrl-label">循环播放</span>
                <div class="ctrl-widget">
                    <input type="range" class="ctrl-slider" id="inp-loop" min="1" max="10" step="1" value="1" oninput="updateSetting('loop', this.value)">
                    <span class="ctrl-value"><span id="val-loop">1</span>次</span>
                </div>
            </div>
            <div class="ctrl-row">
                <span class="ctrl-label">隐藏答案</span>
                <div class="ctrl-widget">
                    <label class="switch">
                        <input type="checkbox" id="hide-toggle" onchange="renderCurrent()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </footer>

        <div class="copyright">
            仅供学习・禁止商用 © 2026｜如有疑问可联系：FMI <span class="clickable" onclick="showQR()">王鹤</span> 
            Ver <span class="clickable" onclick="goAdmin()">1.0</span>
        </div>
    </main>

    <div id="qr-modal" class="modal-overlay" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <img src="Wang_he.jpg" style="width:260px; height:260px; border-radius:15px; display:block;">
            <p style="color:white; margin-top:15px; font-weight:bold;">微信扫码联系 王鹤</p>
        </div>
    </div>

    <div id="admin-modal" class="modal-overlay">
        <div class="modal-content hotcode-area">
            <h3 style="color:white">Hot-Code 注入后台</h3>
            <textarea id="hotcode-input" placeholder="请在此粘贴更新的代码..."></textarea>
            <div style="margin-top:15px; display:flex; gap:10px; justify-content:flex-end;">
                <button onclick="document.getElementById('admin-modal').style.display='none'" style="background:#475569; color:white; border:none; padding:8px 20px; border-radius:8px; cursor:pointer;">取消</button>
                <button onclick="applyHotCode()" style="background:var(--accent); color:white; border:none; padding:8px 20px; border-radius:8px; cursor:pointer;">即时更新</button>
            </div>
        </div>
    </div>

    <script>
        let db = {};
        let favs = JSON.parse(localStorage.getItem('fmi_v1_favs') || '[]');
        let curCat = "1", curIdx = 0, isLive = false;

        async function init() {
            try {
                const r = await fetch('./indonesian_learning_data.json?t=' + Date.now());
                db = await r.json();
                buildMenu();
                showWord("1", 0);
            } catch(e) { console.error("Data error"); }
        }

        function buildMenu() {
            const box = document.getElementById('menu-box');
            let favHtml = `<div style="margin-bottom:15px; background:rgba(251,191,36,0.05); padding:10px; border-radius:12px;">
                <div style="color:#fbbf24; font-weight:bold; cursor:pointer;" onclick="this.nextElementSibling.classList.toggle('active')">
                    ⭐ 我的收藏 (${favs.length})
                </div>
                <div class="sub-menu" id="fav-list">
                    ${favs.map((w, i) => `<div style="display:flex; justify-content:space-between; padding:8px; font-size:13px; color:#94a3b8; cursor:pointer;" onclick="showFav(${i})">
                        <span>${i+1}. ${w.indonesian}</span>
                        <i class="fas fa-trash" style="color:#ef4444" onclick="delFav(event, ${i})"></i>
                    </div>`).join('')}
                    ${favs.length > 0 ? `<button onclick="clearAllFav(event)" style="width:100%; margin-top:8px; background:none; border:1px solid #ef4444; color:#ef4444; padding:3px; border-radius:5px; font-size:10px;">清空收藏</button>` : ''}
                </div>
            </div>`;
            
            let dbHtml = "";
            for(let id in db) {
                const words = db[id].lessons["1"].words;
                dbHtml += `<div style="margin-bottom:10px;">
                    <div style="font-weight:bold; cursor:pointer; padding:5px;" onclick="this.nextElementSibling.classList.toggle('active')">${db[id].name}</div>
                    <div class="sub-menu ${id==curCat?'active':''}">
                        ${words.map((w,i)=>`<div style="padding:6px 10px; font-size:13px; color:#94a3b8; cursor:pointer;" onclick="showWord('${id}',${i})">${i+1}. ${w.indonesian}</div>`).join('')}
                    </div>
                </div>`;
            }
            box.innerHTML = favHtml + dbHtml;
        }

        function renderCurrent() {
            const card = document.getElementById('main-card');
            card.classList.add('card-anim');
            setTimeout(() => {
                const list = curCat === 'fav' ? favs : db[curCat]?.lessons["1"]?.words;
                if(!list || list.length === 0) return;
                const word = list[curIdx];
                
                // 修复隐藏答案逻辑
                const isHidden = document.getElementById('hide-toggle').checked;
                document.getElementById('disp-indo').innerText = word.indonesian;
                document.getElementById('disp-zh').innerText = isHidden ? '••••••' : word.chinese;
                
                document.getElementById('word-idx').innerText = (curIdx + 1).toString().padStart(2, '0');
                const isF = favs.some(f => f.indonesian === word.indonesian);
                document.getElementById('fav-trigger').className = 'star-btn' + (isF ? ' active' : '');
                card.classList.remove('card-anim');
            }, 150);
        }

        function handleFav() {
            const list = curCat === 'fav' ? favs : db[curCat].lessons["1"].words;
            const word = list[curIdx];
            const i = favs.findIndex(f => f.indonesian === word.indonesian);
            if(i > -1) favs.splice(i, 1); else favs.push(word);
            localStorage.setItem('fmi_v1_favs', JSON.stringify(favs));
            buildMenu(); renderCurrent();
        }

        function delFav(e, i) { e.stopPropagation(); favs.splice(i, 1); localStorage.setItem('fmi_v1_favs', JSON.stringify(favs)); buildMenu(); renderCurrent(); }
        function clearAllFav(e) { e.stopPropagation(); if(confirm("清空？")) { favs=[]; localStorage.setItem('fmi_v1_favs', '[]'); buildMenu(); renderCurrent(); }}
        
        function showWord(cat, idx) { stopVoice(); curCat = cat; curIdx = idx; renderCurrent(); buildMenu(); }
        function showFav(idx) { stopVoice(); curCat = 'fav'; curIdx = idx; renderCurrent(); }
        function navWord(dir) { stopVoice(); const list = curCat === 'fav' ? favs : db[curCat].lessons["1"].words; curIdx = (curIdx + dir + list.length) % list.length; renderCurrent(); }

        function toggleSpeech() { isLive ? stopVoice() : startVoice(); }
        function startVoice() {
            const list = curCat === 'fav' ? favs : db[curCat].lessons["1"].words;
            const word = list[curIdx];
            const rate = parseFloat(document.getElementById('inp-rate').value);
            const loops = parseInt(document.getElementById('inp-loop').value);
            isLive = true;
            document.getElementById('play-ico').className = 'fas fa-stop';
            document.getElementById('main-play').classList.add('playing');
            let c = 0;
            const run = () => {
                if(!isLive || c >= loops) { stopVoice(); return; }
                const u = new SpeechSynthesisUtterance(word.indonesian);
                u.lang = 'id-ID'; u.rate = rate;
                u.onend = () => { c++; if(isLive) setTimeout(run, 400); };
                window.speechSynthesis.speak(u);
            };
            run();
        }
        function stopVoice() { isLive = false; window.speechSynthesis.cancel(); document.getElementById('play-ico').className = 'fas fa-play'; document.getElementById('main-play').classList.remove('playing'); }
        function updateSetting(t, v) { document.getElementById('val-'+t).innerText = v; }
        
        function showQR() { document.getElementById('qr-modal').style.display = 'flex'; }
        function goAdmin() { if(prompt("Pass:")==="admin123") document.getElementById('admin-modal').style.display='flex'; }
        function applyHotCode() {
            const code = document.getElementById('hotcode-input').value;
            if(code) { document.open(); document.write(code); document.close(); }
        }

        init();
    </script>
</body>
</html>
