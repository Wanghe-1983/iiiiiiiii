<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印尼语智能学习系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0f1a;
            --bg-card: rgba(15, 23, 42, 0.9);
            --accent: #6366f1;
            --text-main: #f8fafc;
        }
        body {
            background: var(--bg-primary);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        .container { width: 100%; max-width: 900px; display: grid; grid-template-columns: 250px 1fr; gap: 20px; }
        
        /* 目录样式 */
        .sidebar { background: var(--bg-card); border-radius: 16px; padding: 15px; height: 85vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); }
        .sidebar h3 { font-size: 1rem; margin-bottom: 10px; color: var(--accent); }
        .menu-item { padding: 8px 12px; font-size: 0.9rem; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .menu-item:hover { background: rgba(99, 102, 241, 0.2); }
        .menu-item.active { background: var(--accent); border-radius: 6px; }

        /* 主卡片样式 */
        .main-panel { display: flex; flex-direction: column; gap: 20px; }
        .card { 
            background: var(--bg-card); border-radius: 24px; padding: 40px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
        }
        .word-display { font-size: 3rem; font-weight: bold; margin-bottom: 10px; color: #fff; }
        .zh-display { font-size: 1.5rem; color: #94a3b8; margin-bottom: 30px; }

        /* 控制区样式 */
        .controls { background: var(--bg-card); border-radius: 16px; padding: 20px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: center; }
        .control-group { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
        select, input[type="range"] { padding: 5px; border-radius: 4px; background: #1e293b; color: white; border: 1px solid #475569; }
        
        .btn { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; background: var(--accent); color: white; font-weight: bold; }
        .btn-play { background: #10b981; }
        .btn-stop { background: #ef4444; }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            .sidebar { height: 200px; }
        }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 20px;">印尼语智能词库</h2>

    <div class="container">
        <div class="sidebar" id="sidebar">
            <h3>课程目录</h3>
            <div id="menu-list">正在加载目录...</div>
        </div>

        <div class="main-panel">
            <div class="card">
                <div id="unit-tag" style="color:var(--accent); margin-bottom:10px;">选择一个单词开始</div>
                <div class="word-display" id="indo-text">Selamat</div>
                <div class="zh-display" id="zh-text">点击播放开始学习</div>
                
                <div style="display: flex; gap:10px; justify-content: center;">
                    <button class="btn" onclick="prevWord()">上一个</button>
                    <button class="btn btn-play" onclick="startAudio()">播放语音</button>
                    <button class="btn btn-stop" onclick="stopAudio()">停止</button>
                    <button class="btn" onclick="nextWord()">下一个</button>
                </div>
            </div>

            <div class="controls">
                <div class="control-group">
                    <label>语速:</label>
                    <input type="range" id="speed" min="0.1" max="2" step="0.1" value="1" oninput="updateSpeedDisplay(this.value)">
                    <span id="speed-val">1.0x</span>
                </div>
                <div class="control-group">
                    <label>重复次数:</label>
                    <select id="repeat-times">
                        <option value="1">1 次</option>
                        <option value="3">3 次</option>
                        <option value="5">5 次</option>
                        <option value="9999">无限播放</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script>
        let learningData = null;
        let currentList = []; // 当前选中的单词列表
        let currentIndex = 0;
        let audioLoop = null; // 控制循环播放的变量
        let isSpeaking = false;

        // 加载数据
        async function loadData() {
            try {
                const res = await fetch('./indonesian_learning_data.json?v=' + Date.now());
                learningData = await res.json();
                renderMenu();
                // 默认加载第一课
                loadCategory('1');
            } catch (e) {
                alert("加载失败，请确保json文件存在且格式正确");
            }
        }

        // 渲染目录
        function renderMenu() {
            const list = document.getElementById('menu-list');
            list.innerHTML = "";
            for (let id in learningData) {
                let div = document.createElement('div');
                div.className = "menu-item";
                div.innerText = learningData[id].name;
                div.onclick = () => loadCategory(id);
                list.appendChild(div);
            }
        }

        // 切换目录分类
        function loadCategory(id) {
            currentList = learningData[id].lessons["1"].words;
            currentIndex = 0;
            document.getElementById('unit-tag').innerText = learningData[id].name;
            stopAudio(); // 切换时停止播放
            updateUI();
        }

        function updateUI() {
            const word = currentList[currentIndex];
            document.getElementById('indo-text').innerText = word.indonesian;
            document.getElementById('zh-text').innerText = word.chinese;
        }

        // 语音功能
        function startAudio() {
            stopAudio(); // 先清空之前的播放
            const text = currentList[currentIndex].indonesian;
            const repeat = parseInt(document.getElementById('repeat-times').value);
            const speed = parseFloat(document.getElementById('speed').value);
            
            let count = 0;
            isSpeaking = true;

            function playOnce() {
                if (!isSpeaking || count >= repeat) {
                    isSpeaking = false;
                    return;
                }

                const msg = new SpeechSynthesisUtterance();
                msg.text = text;
                msg.lang = 'id-ID'; // 设置为印尼语
                msg.rate = speed;   // 设置语速 (最低0.1)
                
                msg.onend = () => {
                    count++;
                    if (isSpeaking) setTimeout(playOnce, 500); // 间隔0.5秒重复
                };

                window.speechSynthesis.speak(msg);
            }

            playOnce();
        }

        function stopAudio() {
            isSpeaking = false;
            window.speechSynthesis.cancel();
        }

        // 切换逻辑
        function nextWord() {
            stopAudio(); // 切换播放停止
            currentIndex = (currentIndex + 1) % currentList.length;
            updateUI();
        }

        function prevWord() {
            stopAudio(); // 切换播放停止
            currentIndex = (currentIndex - 1 + currentList.length) % currentList.length;
            updateUI();
        }

        function updateSpeedDisplay(v) {
            document.getElementById('speed-val').innerText = v + "x";
        }

        window.onload = loadData;
    </script>
</body>
</html>
