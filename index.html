<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印尼语智能词库 Pro</title>
    <style>
        :root {
            --bg: #0a0f1a;
            --card: rgba(30, 41, 59, 0.7);
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.1), transparent);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; justify-content: center; height: 100vh; overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
            padding: 20px;
            height: 100%;
        }

        /* 左侧目录样式 */
        .sidebar {
            background: var(--card);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .sidebar-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 10px; }

        .category-group { margin-bottom: 10px; }
        .category-title {
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            display: flex; justify-content: space-between;
        }
        .sub-menu { padding-left: 10px; margin-top: 5px; display: none; }
        .sub-menu.active { display: block; }
        .menu-item {
            padding: 8px 15px;
            font-size: 0.85rem;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: 0.2s;
        }
        .menu-item:hover { background: rgba(99, 102, 241, 0.1); color: var(--text-main); }
        .menu-item.active { background: var(--accent); color: white; }

        /* 主界面样式 */
        .main-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 60px 40px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            flex: 1;
            display: flex; flex-direction: column; justify-content: center;
        }
        .word-index { color: var(--accent); font-weight: bold; font-size: 1.2rem; margin-bottom: 10px; }
        .word-display { font-size: 4rem; font-weight: 800; margin-bottom: 20px; letter-spacing: -1px; }
        .zh-display { font-size: 1.8rem; color: var(--text-muted); margin-bottom: 40px; }

        /* 播放按钮特殊设计 */
        .play-btn-container { margin: 20px 0; }
        .action-btn {
            width: 80px; height: 80px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            background: var(--accent);
            color: white;
            font-size: 1.5rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }
        .action-btn.playing {
            background: #ef4444;
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.6);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        /* 控制面板 */
        .controls-bar {
            background: var(--card);
            padding: 20px 30px;
            border-radius: 20px;
            display: flex; justify-content: space-around; align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .control-item { display: flex; flex-direction: column; gap: 8px; }
        .control-item label { font-size: 0.8rem; color: var(--text-muted); }
        
        select, input[type="range"] {
            background: #1e293b; color: white; border: 1px solid #475569;
            padding: 8px; border-radius: 8px;
        }

        .nav-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 12px 25px; border-radius: 12px;
            cursor: pointer; transition: 0.2s;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.1); }

        @media (max-width: 900px) {
            .app-container { grid-template-columns: 1fr; }
            .sidebar { height: 250px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>📚 目录</h2>
            </div>
            <div class="sidebar-content" id="sidebar-menu">
                </div>
        </div>

        <div class="main-panel">
            <div class="card">
                <div class="word-index" id="word-index"># 01</div>
                <div class="word-display" id="indo-text">Loading...</div>
                <div class="zh-display" id="zh-text">正在加载数据</div>
                
                <div class="play-btn-container">
                    <button id="master-play-btn" class="action-btn" onclick="handlePlayToggle()">▶</button>
                </div>

                <div style="display: flex; gap:15px; justify-content: center;">
                    <button class="nav-btn" onclick="prevWord()">上一个</button>
                    <button class="nav-btn" onclick="nextWord()">下一个</button>
                </div>
            </div>

            <div class="controls-bar">
                <div class="control-item">
                    <label>播放语速 (0.1 - 2.0)</label>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <input type="range" id="speech-rate" min="0.1" max="2" step="0.1" value="1" oninput="document.getElementById('rate-val').innerText = this.value + 'x'">
                        <span id="rate-val" style="width:30px">1.0x</span>
                    </div>
                </div>
                <div class="control-item">
                    <label>循环次数</label>
                    <select id="repeat-count">
                        <option value="1">播放 1 次</option>
                        <option value="3">播放 3 次</option>
                        <option value="5">播放 5 次</option>
                        <option value="999">无限播放</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script>
        let learningData = null;
        let currentCategory = "1";
        let currentIndex = 0;
        let isSpeaking = false;
        let loopCount = 0;

        // 初始化加载
        async function init() {
            try {
                const res = await fetch('./indonesian_learning_data.json?v=' + Date.now());
                learningData = await res.json();
                renderMenu();
                loadCategory("1", 0);
            } catch (e) {
                document.getElementById('indo-text').innerText = "加载失败";
                document.getElementById('zh-text').innerText = "请检查JSON文件是否存在";
            }
        }

        // 生成二级目录
        function renderMenu() {
            const menuContainer = document.getElementById('sidebar-menu');
            menuContainer.innerHTML = '';

            for (let catId in learningData) {
                const group = document.createElement('div');
                group.className = 'category-group';
                
                const title = document.createElement('div');
                title.className = 'category-title';
                title.innerHTML = `<span>${learningData[catId].name}</span> <span>▾</span>`;
                title.onclick = () => {
                    const sub = group.querySelector('.sub-menu');
                    sub.classList.toggle('active');
                };

                const subMenu = document.createElement('div');
                subMenu.className = 'sub-menu' + (catId === currentCategory ? ' active' : '');
                
                // 二级：展示具体的单词/短句列表
                const words = learningData[catId].lessons["1"].words;
                words.forEach((item, index) => {
                    const menuItem = document.createElement('div');
                    menuItem.className = `menu-item ${catId === currentCategory && index === currentIndex ? 'active' : ''}`;
                    menuItem.id = `menu-${catId}-${index}`;
                    menuItem.innerText = `${index + 1}. ${item.indonesian}`;
                    menuItem.onclick = (e) => {
                        e.stopPropagation();
                        loadCategory(catId, index);
                    };
                    subMenu.appendChild(menuItem);
                });

                group.appendChild(title);
                group.appendChild(subMenu);
                menuContainer.appendChild(group);
            }
        }

        // 加载选中内容
        function loadCategory(catId, index) {
            stopAudio();
            currentCategory = catId;
            currentIndex = index;
            
            // 更新菜单高亮
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            const activeMenu = document.getElementById(`menu-${catId}-${index}`);
            if(activeMenu) activeMenu.classList.add('active');

            updateUI();
        }

        function updateUI() {
            const item = learningData[currentCategory].lessons["1"].words[currentIndex];
            document.getElementById('word-index').innerText = `# ${String(currentIndex + 1).padStart(2, '0')}`;
            document.getElementById('indo-text').innerText = item.indonesian;
            document.getElementById('zh-text').innerText = item.chinese;
        }

        // 播放逻辑集成
        function handlePlayToggle() {
            if (isSpeaking) {
                stopAudio();
            } else {
                startAudio();
            }
        }

        function startAudio() {
            const btn = document.getElementById('master-play-btn');
            const item = learningData[currentCategory].lessons["1"].words[currentIndex];
            const rate = parseFloat(document.getElementById('speech-rate').value);
            const totalTarget = parseInt(document.getElementById('repeat-count').value);
            
            isSpeaking = true;
            loopCount = 0;
            btn.innerText = "◼";
            btn.classList.add('playing');

            function speak() {
                if (!isSpeaking || loopCount >= totalTarget) {
                    stopAudio();
                    return;
                }

                const utterance = new SpeechSynthesisUtterance(item.indonesian);
                utterance.lang = 'id-ID';
                utterance.rate = rate;
                
                utterance.onend = () => {
                    loopCount++;
                    if (isSpeaking) setTimeout(speak, 600);
                };

                utterance.onerror = () => stopAudio();
                
                window.speechSynthesis.speak(utterance);
            }

            speak();
        }

        function stopAudio() {
            isSpeaking = false;
            window.speechSynthesis.cancel();
            const btn = document.getElementById('master-play-btn');
            btn.innerText = "▶";
            btn.classList.remove('playing');
        }

        function nextWord() {
            const words = learningData[currentCategory].lessons["1"].words;
            loadCategory(currentCategory, (currentIndex + 1) % words.length);
        }

        function prevWord() {
            const words = learningData[currentCategory].lessons["1"].words;
            loadCategory(currentCategory, (currentIndex - 1 + words.length) % words.length);
        }

        // 初始化启动
        init();
    </script>
</body>
</html>
