<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>印尼语智能学习系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-deep: #0a0e17;
            --sidebar-bg: rgba(15, 23, 42, 0.8);
            --panel-bg: rgba(30, 41, 59, 0.6);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', 'HarmonyOS Sans', sans-serif;
            height: 100vh; display: flex; overflow: hidden;
        }

        /* --- 动态背景层 --- */
        .bg-glow {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(16, 185, 129, 0.05) 0%, transparent 40%);
        }

        /* --- 登录界面 (保持之前的逻辑) --- */
        #login-screen { position: fixed; inset: 0; background: var(--bg-deep); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-card { background: #1e293b; padding: 50px 40px; border-radius: 30px; width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .login-input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; background: #f1f5f9; border: none; font-size: 16px; outline: none; }
        .login-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--accent); color: white; font-weight: 600; cursor: pointer; }

        /* --- 侧边栏：多功能化 --- */
        .sidebar { 
            width: 320px; height: 100%; background: var(--sidebar-bg); backdrop-filter: blur(20px); 
            border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar.collapsed { margin-left: -320px; }
        
        /* 统计卡片 */
        .stats-box { padding: 30px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .stats-card { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-item { text-align: left; }
        .stat-val { display: block; font-size: 20px; font-weight: 800; color: var(--accent); }
        .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; }

        /* --- 主学习区 --- */
        .app-main { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        /* 顶部导航 */
        .top-header { padding: 25px 40px; display: flex; justify-content: space-between; align-items: center; }
        .logo-area { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .logo-area h1 { font-size: 24px; font-weight: 800; letter-spacing: -1px; }

        /* 核心内容区：更丰富的布局 */
        .content-body { flex: 1; padding: 0 40px 20px; display: grid; grid-template-columns: 1fr 300px; gap: 30px; }

        /* 学习主舞台 */
        .study-stage { 
            background: var(--panel-bg); border-radius: 40px; border: 1px solid rgba(255,255,255,0.08);
            display: flex; flex-direction: column; position: relative; overflow: hidden;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5);
        }

        /* 左右导航箭头 - 更大气、半透明 */
        .nav-zone { position: absolute; top: 0; bottom: 0; width: 100px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: rgba(255,255,255,0.05); transition: 0.3s; z-index: 5; }
        .nav-zone:hover { color: var(--accent); background: linear-gradient(to right, rgba(99,102,241,0.05), transparent); }
        .nav-right:hover { background: linear-gradient(to left, rgba(99,102,241,0.05), transparent); }
        .nav-zone i { font-size: 40px; }

        .word-display { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; }
        .main-word { font-size: 96px; font-weight: 900; line-height: 1; margin-bottom: 20px; text-align: center; }
        .main-trans { font-size: 32px; color: var(--text-dim); font-weight: 400; }

        /* 控制按钮 */
        .play-btn { 
            width: 100px; height: 100px; border-radius: 50%; border: none; background: var(--accent); 
            color: white; font-size: 36px; cursor: pointer; transition: 0.4s;
            box-shadow: 0 20px 40px var(--accent-glow); margin-bottom: 60px;
        }
        .play-btn:hover { transform: scale(1.1); box-shadow: 0 25px 50px var(--accent); }

        /* 右侧快捷工具栏 */
        .tool-panel { display: flex; flex-direction: column; gap: 20px; }
        .tool-card { background: var(--panel-bg); border-radius: 24px; padding: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .tool-title { font-size: 14px; font-weight: 700; color: var(--text-dim); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }

        /* 进度条美化 */
        .control-strip { padding: 20px 40px; background: var(--sidebar-bg); border-radius: 30px; margin: 0 40px 20px; display: flex; align-items: center; gap: 30px; }
        .slider-item { flex: 1; display: flex; align-items: center; gap: 15px; font-size: 13px; color: var(--text-dim); }
        input[type=range] { flex: 1; accent-color: var(--accent); height: 5px; cursor: pointer; }

        /* 底部信息 */
        .footer { padding: 10px 40px 25px; text-align: center; font-size: 12px; color: #475569; }
        .secret-key { cursor: pointer; }

        @media (max-width: 1200px) { .tool-panel { display: none; } .content-body { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div id="login-screen" style="display:none">
        <div class="login-card">
            <h2 style="font-size:32px; margin-bottom:10px;">智能学习助手</h2>
            <p style="color:var(--text-dim); margin-bottom:30px;">请输入凭证以开始学习之旅</p>
            <input type="text" id="login-id" class="login-input" placeholder="请输入工号">
            <input type="password" id="login-pw" class="login-input" placeholder="请输入密码">
            <button class="login-btn" onclick="handleLogin()">开始学习</button>
            <p id="login-tips" style="color:#f87171; margin-top:15px; font-size:14px; display:none;"></p>
        </div>
    </div>

    <aside class="sidebar" id="sidebar">
        <div class="stats-box">
            <div class="stats-card">
                <div class="stat-item"><span class="stat-val" id="total-learned">0</span><span class="stat-label">已学单词</span></div>
                <div class="stat-item"><span class="stat-val" id="total-fav">0</span><span class="stat-label">我的收藏</span></div>
            </div>
        </div>
        <div id="menu-box" style="flex:1; overflow-y:auto; padding: 15px 0;"></div>
        <div style="padding: 20px; border-top: 1px solid rgba(255,255,255,0.05);">
            <button onclick="logout()" style="width:100%; padding:12px; background:rgba(248,113,113,0.1); color:#f87171; border:none; border-radius:10px; cursor:pointer; font-weight:600;">安全退出</button>
        </div>
    </aside>

    <main class="app-main">
        <header class="top-header">
            <div class="logo-area" onclick="document.getElementById('sidebar').classList.toggle('collapsed')">
                <i class="fas fa-bars-staggered" style="font-size:20px; color:var(--accent);"></i>
                <h1>印尼语学习</h1>
            </div>
            <div style="display:flex; align-items:center; gap:20px;">
                <div style="font-size:14px; color:var(--text-dim);" id="user-display">Hi, 学习者</div>
                <div style="width:40px; height:40px; background:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold;">A</div>
            </div>
        </header>

        <div class="content-body">
            <div class="study-stage">
                <div style="position:absolute; top:40px; left:45px; font-size:20px; font-weight:900; color:var(--accent);" id="word-idx">01</div>
                <i class="fas fa-heart" id="fav-star" style="position:absolute; top:40px; right:45px; font-size:28px; cursor:pointer; color:#334155;" onclick="toggleFav()"></i>
                
                <div class="nav-zone nav-left" style="left:0;" onclick="navWord(-1)"><i class="fas fa-chevron-left"></i></div>
                <div class="nav-zone nav-right" style="right:0;" onclick="navWord(1)"><i class="fas fa-chevron-right"></i></div>

                <div class="word-display">
                    <div class="main-word" id="disp-indo">TERIMA KASIH</div>
                    <div class="main-trans" id="disp-zh">谢谢</div>
                </div>

                <div style="display:flex; justify-content:center;">
                    <button class="play-btn" onclick="toggleSpeech()"><i class="fas fa-play" id="play-ico" style="margin-left:8px;"></i></button>
                </div>
            </div>

            <div class="tool-panel">
                <div class="tool-card">
                    <div class="tool-title"><i class="fas fa-lightbulb"></i>今日小贴士</div>
                    <p style="font-size:13px; color:var(--text-dim); line-height:1.6;">印尼语中的 R 音通常是颤音，多练习大舌音可以发得更地道。</p>
                </div>
                <div class="tool-card" style="flex:1">
                    <div class="tool-title"><i class="fas fa-history"></i>最近学习记录</div>
                    <div id="recent-list" style="font-size:13px; color:var(--text-dim); display:flex; flex-direction:column; gap:12px;">
                        </div>
                </div>
            </div>
        </div>

        <div class="control-strip">
            <div class="slider-item">
                <i class="fas fa-tachometer-alt"></i>
                <input type="range" id="inp-rate" min="0.5" max="1.5" step="0.1" value="0.8">
                <span style="width:30px;"><span id="val-rate">0.8</span>x</span>
            </div>
            <div class="slider-item">
                <i class="fas fa-redo"></i>
                <input type="range" id="inp-loop" min="1" max="10" step="1" value="1">
                <span style="width:30px;"><span id="val-loop">1</span>次</span>
            </div>
            <div style="padding-left:20px; border-left:1px solid rgba(255,255,255,0.1);">
                <label style="font-size:13px; color:var(--text-dim); cursor:pointer;">
                    <input type="checkbox" id="hide-toggle" onchange="renderCurrent()"> 隐藏中文答案
                </label>
            </div>
        </div>

        <footer class="footer">
            FMI 智慧教育系统 ｜ <span class="secret-key" onclick="enterAdmin()">©</span> 2026 ｜ 作者：<span style="color:var(--accent); cursor:pointer;" onclick="showQR()">王鹤</span>
        </footer>
    </main>

    <div id="qr-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; justify-content:center; align-items:center;" onclick="this.style.display='none'"><img src="Wang_he.jpg" style="width:300px; border-radius:20px;"></div>

    <script>
        let db = {}, favs = JSON.parse(localStorage.getItem('fmi_favs') || '[]');
        let recent = JSON.parse(localStorage.getItem('fmi_recent') || '[]');
        let curCat = "1", curIdx = 0, isLive = false;
        let menuState = { fav: true };

        // 管理入口
        function enterAdmin() {
            const pw = prompt("请输入超级管理密码：");
            if (pw === "admin123") location.href = 'admin.html';
        }

        async function handleLogin() {
            const id = document.getElementById('login-id').value.trim();
            const pw = document.getElementById('login-pw').value;
            try {
                const r = await fetch('./whitelist.json?t=' + Date.now());
                const list = await r.json();
                const user = list.find(u => u.id === id && u.psha === pw);
                if (user && user.status === 'active') {
                    localStorage.setItem('fmi_session', JSON.stringify(user));
                    location.reload();
                } else {
                    document.getElementById('login-tips').innerText = "凭证错误";
                    document.getElementById('login-tips').style.display = 'block';
                }
            } catch(e) { alert("网络异常"); }
        }

        async function initApp() {
            const session = JSON.parse(localStorage.getItem('fmi_session'));
            if (!session) { document.getElementById('login-screen').style.display='flex'; return; }
            document.getElementById('login-screen').style.display='none';
            document.getElementById('user-display').innerText = "Hi, " + session.name;
            try {
                const r = await fetch('./indonesian_learning_data.json');
                db = await r.json();
                buildMenu(); renderCurrent(); updateStats();
            } catch(e) { console.error("Data error"); }
        }

        function buildMenu() {
            const box = document.getElementById('menu-box');
            let html = `<div style="padding:0 25px; margin-bottom:10px; font-size:12px; color:#475569; letter-spacing:1px;">CURRICULUM</div>`;
            for(let id in db) {
                html += `
                <div style="padding:15px 25px; margin:5px 15px; background:rgba(255,255,255,0.03); border-radius:15px; cursor:pointer; display:flex; justify-content:space-between; align-items:center;" onclick="switchCat('${id}',0)">
                    <span style="font-size:14px; font-weight:600;">${db[id].name}</span>
                    <i class="fas fa-chevron-right" style="font-size:12px; opacity:0.3;"></i>
                </div>`;
            }
            box.innerHTML = html;
        }

        function renderCurrent() {
            const list = curCat === 'fav' ? favs : db[curCat]?.lessons["1"]?.words;
            if(!list || list.length === 0) return;
            const word = list[curIdx];
            document.getElementById('disp-indo').innerText = word.indonesian;
            document.getElementById('disp-zh').innerText = document.getElementById('hide-toggle').checked ? '••••' : word.chinese;
            document.getElementById('word-idx').innerText = (curIdx + 1).toString().padStart(2, '0');
            document.getElementById('fav-star').style.color = favs.some(f=>f.indonesian===word.indonesian) ? '#fbbf24' : '#334155';
            
            // 更新最近学习记录
            if(!recent.some(r => r.indonesian === word.indonesian)){
                recent.unshift(word);
                if(recent.length > 5) recent.pop();
                localStorage.setItem('fmi_recent', JSON.stringify(recent));
                updateRecentUI();
            }
        }

        function updateRecentUI() {
            const box = document.getElementById('recent-list');
            box.innerHTML = recent.map(r => `<div><div style="color:white; font-weight:600;">${r.indonesian}</div><div style="font-size:11px; opacity:0.5;">${r.chinese}</div></div>`).join('');
        }

        function updateStats() {
            document.getElementById('total-fav').innerText = favs.length;
            document.getElementById('total-learned').innerText = recent.length + "+";
        }

        function toggleSpeech() {
            if(isLive) { stopVoice(); return; }
            const list = curCat==='fav'?favs:db[curCat].lessons["1"].words;
            const word = list[curIdx];
            const rate = parseFloat(document.getElementById('inp-rate').value);
            const loops = parseInt(document.getElementById('inp-loop').value);
            isLive = true; document.getElementById('play-ico').className='fas fa-stop'; document.getElementById('play-ico').style.marginLeft = "0";
            let count = 0;
            const speak = () => {
                if(!isLive || count >= loops) { stopVoice(); return; }
                const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(word.indonesian)}&tl=id&client=tw-ob&ttsspeed=${rate < 0.5 ? 0.2 : 1}`;
                const audio = new Audio(url);
                audio.onended = () => { count++; if(isLive) setTimeout(speak, 500); };
                audio.play().catch(() => {
                    const u = new SpeechSynthesisUtterance(word.indonesian);
                    u.lang='id-ID'; u.rate=rate; u.onend=()=>{ count++; speak(); };
                    window.speechSynthesis.speak(u);
                });
            };
            speak();
        }

        function stopVoice() { isLive=false; window.speechSynthesis.cancel(); document.getElementById('play-ico').className='fas fa-play'; document.getElementById('play-ico').style.marginLeft = "8px"; }
        function navWord(dir) { stopVoice(); const list=curCat==='fav'?favs:db[curCat].lessons["1"].words; if(!list||list.length===0) return; curIdx=(curIdx+dir+list.length)%list.length; renderCurrent(); }
        function switchCat(cat, idx) { curCat=cat; curIdx=idx; renderCurrent(); }
        function toggleFav() {
            const list = curCat==='fav'?favs:db[curCat].lessons["1"].words;
            const word = list[curIdx];
            const fIdx = favs.findIndex(f=>f.indonesian===word.indonesian);
            fIdx > -1 ? favs.splice(fIdx, 1) : favs.push({...word});
            localStorage.setItem('fmi_favs', JSON.stringify(favs));
            renderCurrent(); updateStats();
        }
        function logout() { localStorage.removeItem('fmi_session'); location.reload(); }
        function showQR() { document.getElementById('qr-modal').style.display='flex'; }
        
        document.getElementById('inp-rate').oninput = function() { document.getElementById('val-rate').innerText = this.value; }
        document.getElementById('inp-loop').oninput = function() { document.getElementById('val-loop').innerText = this.value; }
        
        initApp();
        updateRecentUI();
    </script>
</body>
</html>
