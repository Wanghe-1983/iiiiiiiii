<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印尼语学习系统 | TMI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        :root {
            --primary: #3b82f6;
            --cyan: #38bdf8;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --text: #f1f5f9;
            --text2: #cbd5e1;
            --radius: 16px;
        }
        body {
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(148,163,184,0.2);
        }
        .card h2 {
            margin-bottom: 16px;
            border-left: 4px solid var(--primary);
            padding-left: 12px;
        }
        .btn {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            margin-right: 8px;
            margin-bottom: 8px;
            background: #334155;
            color: white;
        }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }
        .btn-action { background: var(--cyan); }
        .btn-group { margin-bottom: 16px; }
        .content-box {
            background: rgba(15,23,42,0.6);
            padding: 20px;
            border-radius: 12px;
            margin-top: 10px;
        }
        .indonesian { color: var(--cyan); font-weight: bold; }
        .chinese { color: #94a3b8; margin-left: 8px; }
        .admin-section { display: none; margin-top: 40px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            background: #1e293b;
            color: white;
            border: 1px solid #475569;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }
        .data-table th, .data-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { padding: 10px 16px; background: #1e293b; border: none; color: white; border-radius: 8px; cursor: pointer; }
        .tab.active { background: var(--primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
        }
        .speed-slider { flex: 1; }
        .admin-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
        }
        .version-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15,23,42,0.9);
            padding: 8px;
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>选择单元</h2>
        <div class="btn-group" id="unitBtns"></div>
    </div>
    <div class="card">
        <h2>选择课程</h2>
        <div class="btn-group" id="lessonBtns"></div>
    </div>
    <div class="card">
        <h2>学习内容</h2>
        <div class="content-box" id="contentBox">请先选择单元和课程</div>
    </div>
    <div class="card">
        <h2>快捷操作</h2>
        <button class="btn btn-action" id="showBtn">显示内容</button>
        <button class="btn btn-action" id="readBtn">朗读发音</button>
        <button class="btn btn-action" id="clearBtn">清空内容</button>
        <div class="speed-control">
            <label>语速：</label>
            <input type="range" min="0.5" max="2" step="0.1" value="0.9" class="speed-slider" id="speedSlider">
            <span id="speedValue">0.9x</span>
        </div>
    </div>

    <div class="admin-section" id="adminSection">
        <div class="card">
            <h2>后台管理 | 版本 <span id="adminVersion">1.4.0</span></h2>
            <div class="form-group">
                <label>版本号</label>
                <input type="text" id="versionInput" value="1.4.0">
                <button class="btn btn-success" id="saveVersionBtn">保存版本</button>
            </div>
            <div class="tabs">
                <button class="tab active" data-target="unitsTab">单元管理</button>
                <button class="tab" data-target="lessonsTab">课程管理</button>
                <button class="tab" data-target="importTab">导入导出</button>
            </div>

            <div class="tab-content active" id="unitsTab">
                <div class="form-group">
                    <label>单元名称</label>
                    <input type="text" id="unitName">
                </div>
                <button class="btn btn-success" id="addUnitBtn">添加单元</button>
                <button class="btn btn-danger" id="deleteUnitBtn">删除单元</button>
                <table class="data-table" id="unitsTable">
                    <thead><tr><th>选择</th><th>ID</th><th>名称</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="tab-content" id="lessonsTab">
                <div class="form-group">
                    <label>选择单元</label>
                    <select id="lessonUnitSelect"></select>
                </div>
                <div class="form-group">
                    <label>课程ID</label>
                    <input type="number" id="lessonId">
                </div>
                <div class="form-group">
                    <label>课程内容（JSON）</label>
                    <textarea id="lessonContent" rows="6"></textarea>
                </div>
                <button class="btn btn-success" id="addLessonBtn">保存课程</button>
                <button class="btn btn-danger" id="deleteLessonBtn">删除课程</button>
                <button class="btn btn-danger" id="clearAllLessonsBtn">一键清空本单元所有课程</button>
                <table class="data-table" id="lessonsTable">
                    <thead><tr><th>课程ID</th><th>预览</th><th>操作</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="tab-content" id="importTab">
                <div class="form-group">
                    <label>导入JSON</label>
                    <input type="file" id="importFile" accept=".json">
                    <button class="btn btn-action" id="importBtn">确认导入</button>
                </div>
                <button class="btn btn-success" id="exportBtn">导出数据</button>
                <button class="btn btn-danger" id="resetBtn">重置全部数据</button>
            </div>
        </div>
    </div>
</div>

<div class="admin-toggle">
    <button class="btn btn-action" id="adminToggle">后台管理</button>
</div>
<div class="version-footer">印尼语学习系统 | 版本 <span id="footerVersion">V1.4.0</span></div>

<script>
let VERSION = "1.4.0";
const ADMIN_PASSWORD = "admin123";

const defaultData = {
    "1": {
        name: "单元1 - 基础问候",
        lessons: {
            "1": [
                { id: "Selamat pagi", cn: "早上好" },
                { id: "Terima kasih", cn: "谢谢" }
            ]
        }
    }
};

let learningData = JSON.parse(JSON.stringify(defaultData));
let currentUnit = null;
let currentLesson = null;
let speechRate = 0.9;

window.onload = () => {
    loadData();
    initUI();
    bindEvents();
};

function loadData() {
    let d = localStorage.getItem("indonesianLearningData");
    let v = localStorage.getItem("indonesianLearningVersion");
    if (d) learningData = JSON.parse(d);
    if (v) VERSION = v;
    updateVersionUI();
}

function saveData() {
    localStorage.setItem("indonesianLearningData", JSON.stringify(learningData));
    refreshUI();
}

function updateVersionUI() {
    document.getElementById("adminVersion").innerText = VERSION;
    document.getElementById("footerVersion").innerText = "V" + VERSION;
    document.getElementById("versionInput").value = VERSION;
}

function initUI() {
    refreshUI();
    updateVersionUI();
}

function refreshUI() {
    renderUnits();
    renderLessons();
    renderAdminUnits();
    renderAdminLessons();
    renderUnitSelect();
}

function renderUnits() {
    let box = document.getElementById("unitBtns");
    box.innerHTML = "";
    Object.keys(learningData).forEach(id => {
        let btn = document.createElement("button");
        btn.className = "btn";
        btn.innerText = learningData[id].name;
        btn.onclick = () => {
            currentUnit = id;
            renderLessons();
        };
        box.appendChild(btn);
    });
}

function renderLessons() {
    let box = document.getElementById("lessonBtns");
    box.innerHTML = "";
    if (!currentUnit || !learningData[currentUnit]?.lessons) return;
    Object.keys(learningData[currentUnit].lessons).forEach(lid => {
        let btn = document.createElement("button");
        btn.className = "btn";
        btn.innerText = "课程 " + lid;
        btn.onclick = () => {
            currentLesson = lid;
            showContent();
        };
        box.appendChild(btn);
    });
}

function showContent() {
    let c = document.getElementById("contentBox");
    if (!currentUnit || !currentLesson) { c.innerHTML = "请选择单元和课程"; return; }
    let list = learningData[currentUnit].lessons[currentLesson] || [];
    let html = "";
    list.forEach(i => {
        html += `<div><span class='indonesian'>${i.id}</span> <span class='chinese'>${i.cn}</span></div>`;
    });
    c.innerHTML = html;
}

function bindEvents() {
    document.getElementById("showBtn").onclick = showContent;
    document.getElementById("clearBtn").onclick = () => {
        document.getElementById("contentBox").innerText = "已清空";
        currentUnit = currentLesson = null;
    };

    document.getElementById("speedSlider").oninput = e => {
        speechRate = e.target.value;
        document.getElementById("speedValue").innerText = speechRate + "x";
    };

    document.getElementById("readBtn").onclick = () => {
        if (!currentUnit || !currentLesson) return;
        let txt = learningData[currentUnit].lessons[currentLesson].map(i=>i.id).join(". ");
        let u = new SpeechSynthesisUtterance(txt);
        u.lang = "id-ID";
        u.rate = speechRate;
        speechSynthesis.speak(u);
    };

    document.getElementById("adminToggle").onclick = () => {
        let p = prompt("输入后台密码：");
        if (p === ADMIN_PASSWORD) {
            document.getElementById("adminSection").style.display = "block";
        }
    };

    document.querySelectorAll(".tab").forEach(t => {
        t.onclick = () => {
            document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
            document.querySelectorAll(".tab-content").forEach(x => x.classList.remove("active"));
            t.classList.add("active");
            document.getElementById(t.dataset.target).classList.add("active");
        };
    });

    document.getElementById("addUnitBtn").onclick = () => {
        let name = document.getElementById("unitName").value;
        if (!name) return;
        let id = Object.keys(learningData).length + 1;
        learningData[id] = { name, lessons: {} };
        saveData();
    };

    document.getElementById("addLessonBtn").onclick = () => {
        let u = document.getElementById("lessonUnitSelect").value;
        let lid = document.getElementById("lessonId").value;
        let c = document.getElementById("lessonContent").value;
        if (!u || !lid || !c) return;
        try {
            let data = JSON.parse(c);
            if (!learningData[u].lessons) learningData[u].lessons = {};
            learningData[u].lessons[lid] = data;
            saveData();
        } catch(e) { alert("JSON格式错误"); }
    };

    document.getElementById("clearAllLessonsBtn").onclick = () => {
        let u = document.getElementById("lessonUnitSelect").value;
        if (!u) return;
        if (!confirm("确定清空此单元所有课程？")) return;
        learningData[u].lessons = {};
        saveData();
    };

    document.getElementById("importBtn").onclick = () => {
        let f = document.getElementById("importFile").files[0];
        if (!f) return;
        let r = new FileReader();
        r.onload = e => {
            try {
                learningData = JSON.parse(e.target.result);
                saveData();
                alert("导入成功！");
            } catch(e) { alert("导入失败"); }
        };
        r.readAsText(f);
    };

    document.getElementById("exportBtn").onclick = () => {
        let blob = new Blob([JSON.stringify(learningData)], {type:"application/json"});
        let url = URL.createObjectURL(blob);
        let a = document.createElement("a");
        a.href = url;
        a.download = "learning_data_v"+VERSION+".json";
        a.click();
    };

    document.getElementById("resetBtn").onclick = () => {
        if (!confirm("确定重置所有数据？")) return;
        learningData = JSON.parse(JSON.stringify(defaultData));
        saveData();
    };

    document.getElementById("saveVersionBtn").onclick = () => {
        VERSION = document.getElementById("versionInput").value;
        localStorage.setItem("indonesianLearningVersion", VERSION);
        updateVersionUI();
    };
}

function renderAdminUnits() {
    let t = document.getElementById("unitsTable").querySelector("tbody");
    t.innerHTML = "";
    Object.keys(learningData).forEach(id => {
        let tr = document.createElement("tr");
        tr.innerHTML = `<td><input type='checkbox' value='${id}'></td><td>${id}</td><td>${learningData[id].name}</td>`;
        t.appendChild(tr);
    });
}

function renderUnitSelect() {
    let s = document.getElementById("lessonUnitSelect");
    s.innerHTML = "";
    Object.keys(learningData).forEach(id => {
        let o = document.createElement("option");
        o.value = id;
        o.innerText = learningData[id].name;
        s.appendChild(o);
    });
}

function renderAdminLessons() {
    let u = document.getElementById("lessonUnitSelect").value;
    let t = document.getElementById("lessonsTable").querySelector("tbody");
    t.innerHTML = "";
    if (!u || !learningData[u]?.lessons) return;
    Object.keys(learningData[u].lessons).forEach(lid => {
        let tr = document.createElement("tr");
        tr.innerHTML = `<td>${lid}</td><td>${learningData[u].lessons[lid].length}条</td><td></td>`;
        t.appendChild(tr);
    });
}
</script>
</body>
</html>
