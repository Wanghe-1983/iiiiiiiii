<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FMI印尼语学习小助手</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #050a14;
            --glass: rgba(15, 23, 42, 0.8);
            --accent: #6366f1;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --sidebar-w: 320px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.1), transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.1), transparent 40%);
            color: var(--text-main);
            font-family: 'PingFang SC', system-ui, sans-serif;
            height: 100vh; display: flex; overflow: hidden;
        }

        /* 侧边栏与折叠控制 */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--glass);
            border-right: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            display: flex; flex-direction: column;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; z-index: 100;
        }
        .sidebar.collapsed { margin-left: calc(var(--sidebar-w) * -1); }
        
        .sidebar-header { padding: 30px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 15px; }

        /* 折叠切换按钮 */
        .toggle-sidebar {
            position: absolute; right: -40px; top: 20px;
            width: 40px; height: 40px; background: var(--accent);
            border-radius: 0 10px 10px 0; border: none; color: white;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 4px 0 10px rgba(0,0,0,0.3);
        }

        /* 目录样式 */
        .cat-title {
            padding: 15px; background: rgba(255,255,255,0.03); border-radius: 12px;
            cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; margin-bottom: 8px;
        }
        .sub-menu { display: none; padding-left: 10px; margin-bottom: 15px; border-left: 2px solid var(--accent); }
        .sub-menu.active { display: block; }
        .menu-item {
            padding: 10px 15px; font-size: 0.9rem; color: var(--text-muted);
            cursor: pointer; border-radius: 8px; transition: 0.2s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .menu-item:hover { background: rgba(99, 102, 241, 0.1); color: white; }
        .menu-item.active { background: var(--accent); color: white; }

        /* 主面板 */
        .main-container {
            flex: 1; display: flex; flex-direction: column; padding: 30px;
            transition: all 0.4s;
        }
        .header-title { font-size: 2.5rem; font-weight: 800; text-align: center; margin-bottom: 30px; letter-spacing: 2px; }

        .study-card {
            background: rgba(30, 41, 59, 0.5); border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            flex: 1; display: flex; flex-direction: column; justify-content: center;
            align-items: center; position: relative; padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .favorite-btn {
            position: absolute; top: 40px; right: 40px; font-size: 1.8rem;
            cursor: pointer; color: var(--text-muted); transition: 0.3s;
        }
        .favorite-btn.active { color: #fbbf24; transform: scale(1.2); }

        .word-num { font-size: 1.5rem; color: var(--accent); font-weight: bold; margin-bottom: 10px; }
        .indo-text { font-size: 4.5rem; font-weight: 900; margin-bottom: 20px; text-align: center; }
        .zh-text { font-size: 2.2rem; color: var(--text-muted); margin-bottom: 50px; }

        /* 底部控制区 */
        .controls-wrapper {
            width: 100%; max-width: 800px; margin-top: 30px;
            background: var(--glass); border-radius: 30px; padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; gap: 20px;
        }

        .nav-row { display: flex; align-items: center; justify-content: center; gap: 40px; }
        .icon-btn {
            width: 70px; height: 70px; border-radius: 20px; border: none;
            background: rgba(255,255,255,0.05); color: white; font-size: 1.5rem;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center;
        }
        .icon-btn:hover { background: var(--accent); transform: translateY(-5px); }
        
        .play-main { width: 90px; height: 90px; border-radius: 50%; font-size: 2rem; background: var(--accent); box-shadow: 0 10px 20px var(--accent); }
        .play-main.playing { background: #ef4444; animation: pulse 2s infinite; }

        .params-row { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .param-group { display: flex; flex-direction: column; gap: 12px; }
        .param-group label { font-size: 1.1rem; font-weight: 600; color: var(--text-main); }
        
        input[type="range"] { accent-color: var(--accent); height: 8px; border-radius: 4px; cursor: pointer; }

        /* 隐藏后台 */
        .admin-trigger { position: fixed; bottom: 10px; right: 10px; opacity: 0.2; font-size: 0.6rem; cursor: pointer; }
        #admin-panel {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: none; flex-direction: column; padding: 40px;
        }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 100% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } }

        /* 收藏本特殊样式 */
        .fav-header { color: #fbbf24 !important; border-bottom: 1px solid #fbbf2433; margin-top: 20px; }
        .clear-fav { font-size: 0.7rem; background: #ef4444; padding: 2px 6px; border-radius: 4px; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <button class="toggle-sidebar" onclick="document.getElementById('sidebar').classList.toggle('collapsed')">
            <i class="fas fa-bars"></i>
        </button>
        <div class="sidebar-header">
            <h3>课程目录</h3>
        </div>
        <div class="sidebar-content" id="sidebar-menu">
            </div>
    </div>

    <div class="main-container">
        <h1 class="header-title">FMI印尼语学习小助手</h1>
        
        <div class="study-card">
            <div id="btn-fav" class="favorite-btn" onclick="toggleFavorite()"><i class="fas fa-star"></i></div>
            <div class="word-num" id="display-index">01</div>
            <div class="indo-text" id="display-indo">Loading...</div>
            <div class="zh-text" id="display-zh">正在准备词库</div>
            
            <div class="nav-row">
                <button class="icon-btn" onclick="changeWord(-1)"><i class="fas fa-chevron-left"></i></button>
                <button id="play-btn" class="icon-btn play-main" onclick="handlePlay()"><i class="fas fa-play" id="play-icon"></i></button>
                <button class="icon-btn" onclick="changeWord(1)"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <div class="controls-wrapper">
            <div class="params-row">
                <div class="param-group">
                    <label>语言速度: <span id="v-speed">0.8</span>x</label>
                    <input type="range" id="rate-range" min="0.1" max="1.5" step="0.1" value="0.8" oninput="updateParam('speed', this.value)">
                </div>
                <div class="param-group">
                    <label>重复次数: <span id="v-count">1</span>次</label>
                    <input type="range" id="repeat-range" min="1" max="10" step="1" value="1" oninput="updateParam('count', this.value)">
                </div>
            </div>
        </div>
    </div>

    <div class="admin-trigger" onclick="openAdmin()">Ver 2.5.0</div>
    <div id="admin-panel">
        <textarea id="json-editor" style="flex:1; background:#1e293b; color:#10b981; padding:20px; font-family:monospace;"></textarea>
        <div style="padding-top:20px; display:flex; gap:10px;">
            <button onclick="saveAdmin()" style="padding:10px 20px; background:var(--accent); border:none; color:white;">保存</button>
            <button onclick="closeAdmin()" style="padding:10px 20px; background:#444; border:none; color:white;">关闭</button>
        </div>
    </div>

    <script>
        let db = {};
        let favorites = JSON.parse(localStorage.getItem('fmi_favs') || '[]');
        let currentCat = "1";
        let currentIndex = 0;
        let isSpeaking = false;

        async function init() {
            try {
                const res = await fetch('./indonesian_learning_data.json?v=' + Date.now());
                db = await res.json();
                renderAll();
                loadWord("1", 0);
            } catch (e) {
                console.error("加载失败");
            }
        }

        function renderAll() {
            const menu = document.getElementById('sidebar-menu');
            menu.innerHTML = "";

            // 1. 渲染收藏本
            const favGroup = document.createElement('div');
            favGroup.innerHTML = `
                <div class="cat-title fav-header">
                    <span>⭐ 收藏本 (${favorites.length})</span>
                    <button class="clear-fav" onclick="clearFavs(event)">清空</button>
                </div>
                <div class="sub-menu active" id="fav-list"></div>
            `;
            menu.appendChild(favGroup);
            renderFavList();

            // 2. 渲染普通课程
            for (let id in db) {
                const group = document.createElement('div');
                const words = db[id].lessons["1"].words;
                group.innerHTML = `
                    <div class="cat-title" onclick="this.nextElementSibling.classList.toggle('active')">
                        <span>${db[id].name}</span>
                        <span>▾</span>
                    </div>
                    <div class="sub-menu ${id == currentCat ? 'active' : ''}">
                        ${words.map((w, i) => `
                            <div class="menu-item ${id==currentCat && i==currentIndex ? 'active' : ''}" onclick="loadWord('${id}', ${i})">
                                <span>${i+1}. ${w.indonesian}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
                menu.appendChild(group);
            }
        }

        function renderFavList() {
            const container = document.getElementById('fav-list');
            container.innerHTML = favorites.map((w, i) => `
                <div class="menu-item" onclick="loadFavWord(${i})">
                    <span>${i+1}. ${w.indonesian}</span>
                    <i class="fas fa-times" onclick="removeFav(event, ${i})" style="font-size:0.7rem; opacity:0.5"></i>
                </div>
            `).join('');
        }

        function loadWord(cat, idx) {
            stopSpeech();
            currentCat = cat;
            currentIndex = idx;
            const word = db[cat].lessons["1"].words[idx];
            updateMainDisplay(word);
            renderAll();
        }

        function loadFavWord(idx) {
            stopSpeech();
            const word = favorites[idx];
            updateMainDisplay(word);
            // 这里我们给一个特殊的 cat ID 标识是收藏
            currentCat = "fav";
            currentIndex = idx;
            renderAll();
        }

        function updateMainDisplay(word) {
            document.getElementById('display-indo').innerText = word.indonesian;
            document.getElementById('display-zh').innerText = word.chinese;
            document.getElementById('display-index').innerText = (currentIndex + 1).toString().padStart(2, '0');
            
            // 更新星号状态
            const isFav = favorites.some(f => f.indonesian === word.indonesian);
            document.getElementById('btn-fav').className = 'favorite-btn' + (isFav ? ' active' : '');
        }

        function toggleFavorite() {
            let word;
            if(currentCat === 'fav') {
                word = favorites[currentIndex];
            } else {
                word = db[currentCat].lessons["1"].words[currentIndex];
            }

            const idx = favorites.findIndex(f => f.indonesian === word.indonesian);
            if(idx > -1) {
                favorites.splice(idx, 1);
            } else {
                favorites.push(word);
            }
            localStorage.setItem('fmi_favs', JSON.stringify(favorites));
            renderAll();
            updateMainDisplay(word);
        }

        function removeFav(e, idx) {
            e.stopPropagation();
            favorites.splice(idx, 1);
            localStorage.setItem('fmi_favs', JSON.stringify(favorites));
            renderAll();
            if(currentCat === 'fav') loadWord("1", 0);
        }

        function clearFavs(e) {
            e.stopPropagation();
            if(confirm("确定清空收藏本吗？")) {
                favorites = [];
                localStorage.removeItem('fmi_favs');
                renderAll();
            }
        }

        // 语音控制
        function handlePlay() {
            isSpeaking ? stopSpeech() : startSpeech();
        }

        function startSpeech() {
            const word = (currentCat === 'fav') ? favorites[currentIndex] : db[currentCat].lessons["1"].words[currentIndex];
            const rate = parseFloat(document.getElementById('rate-range').value);
            const count = parseInt(document.getElementById('repeat-range').value);
            
            isSpeaking = true;
            document.getElementById('play-icon').className = 'fas fa-stop';
            document.getElementById('play-btn').classList.add('playing');

            let run = 0;
            const speak = () => {
                if(!isSpeaking || run >= count) { stopSpeech(); return; }
                const msg = new SpeechSynthesisUtterance(word.indonesian);
                msg.lang = 'id-ID';
                msg.rate = rate;
                msg.onend = () => { run++; if(isSpeaking) setTimeout(speak, 500); };
                window.speechSynthesis.speak(msg);
            }
            speak();
        }

        function stopSpeech() {
            isSpeaking = false;
            window.speechSynthesis.cancel();
            document.getElementById('play-icon').className = 'fas fa-play';
            document.getElementById('play-btn').classList.remove('playing');
        }

        function changeWord(dir) {
            if(currentCat === 'fav') {
                let ni = (currentIndex + dir + favorites.length) % favorites.length;
                loadFavWord(ni);
            } else {
                const list = db[currentCat].lessons["1"].words;
                let ni = (currentIndex + dir + list.length) % list.length;
                loadWord(currentCat, ni);
            }
        }

        function updateParam(type, val) {
            document.getElementById(`v-${type}`).innerText = val;
            if(isSpeaking) { stopSpeech(); startSpeech(); }
        }

        // 后台
        function openAdmin() {
            if(prompt("PASS") === "admin123") {
                document.getElementById('admin-panel').style.display='flex';
                document.getElementById('json-editor').value = JSON.stringify(db, null, 2);
            }
        }
        function closeAdmin() { document.getElementById('admin-panel').style.display='none'; }
        function saveAdmin() {
            try { db = JSON.parse(document.getElementById('json-editor').value); renderAll(); closeAdmin(); alert("OK"); }
            catch(e) { alert("JSON ERROR"); }
        }

        init();
    </script>
</body>
</html>
