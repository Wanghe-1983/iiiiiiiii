<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印尼语学习小助手</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #030712;
            --glass: rgba(17, 24, 39, 0.75);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --sidebar-w: 300px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            height: 100vh; display: flex; overflow: hidden;
        }

        /* 侧边栏层级感 */
        .sidebar {
            width: var(--sidebar-w); background: var(--glass); backdrop-filter: blur(25px);
            border-right: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; z-index: 100;
        }
        .sidebar.collapsed { transform: translateX(calc(var(--sidebar-w) * -1)); width: 0; }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 25px 15px; }
        
        .toggle-sidebar {
            position: absolute; right: -40px; top: 30px; width: 40px; height: 50px;
            background: var(--accent); border: none; color: white; cursor: pointer;
            border-radius: 0 15px 15px 0; display: flex; align-items: center; justify-content: center;
            box-shadow: 5px 0 15px var(--accent-glow);
        }

        /* 目录美化 */
        .cat-item { margin-bottom: 15px; border-radius: 12px; overflow: hidden; background: rgba(255,255,255,0.03); }
        .cat-head { padding: 14px; cursor: pointer; font-weight: 600; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .cat-head:hover { background: rgba(255,255,255,0.06); }
        
        .sub-menu { display: none; padding: 5px 10px 10px 10px; }
        .sub-menu.active { display: block; animation: slideIn 0.3s ease-out; }
        
        .menu-link { 
            padding: 10px 12px; font-size: 0.85rem; color: var(--text-muted); cursor: pointer; 
            border-radius: 8px; margin: 4px 0; display: flex; justify-content: space-between; align-items: center;
            transition: all 0.2s;
        }
        .menu-link:hover { background: rgba(255,255,255,0.05); color: white; transform: translateX(5px); }
        .menu-link.active { background: var(--accent); color: white; box-shadow: 0 4px 12px var(--accent-glow); }

        /* 清空按钮放在列表底部 */
        .clear-box { padding: 10px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 10px; text-align: center; }
        .btn-clear-all { 
            background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 6px 20px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; transition: 0.3s;
        }
        .btn-clear-all:hover { background: #ef4444; color: white; }

        /* 主学习卡片动画 */
        .main-container { flex: 1; display: flex; flex-direction: column; padding: 30px; position: relative; }
        .study-card {
            background: rgba(30, 41, 59, 0.4); border-radius: 50px; border: 1px solid rgba(255,255,255,0.08);
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; padding: 40px; backdrop-filter: blur(10px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        
        /* 切换单词时的动画类 */
        .fade-card { animation: cardSwap 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes cardSwap {
            0% { opacity: 0; transform: scale(0.95) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .word-badge { background: var(--accent); color: white; padding: 5px 15px; border-radius: 10px; font-weight: 800; font-style: italic; box-shadow: 0 0 20px var(--accent-glow); }
        .star-btn { font-size: 2rem; cursor: pointer; color: rgba(255,255,255,0.2); transition: 0.3s; }
        .star-btn.active { color: #fbbf24; text-shadow: 0 0 15px rgba(251, 191, 36, 0.5); }

        .indo-box { font-size: 4.8rem; font-weight: 900; margin: 20px 0; text-align: center; letter-spacing: -1px; }
        .zh-box { font-size: 2.2rem; color: var(--text-muted); font-weight: 300; }

        .circle-btn {
            width: 75px; height: 75px; border-radius: 50%; border: none; background: rgba(255,255,255,0.05);
            color: white; font-size: 1.6rem; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center;
        }
        .circle-btn:hover { background: var(--accent); transform: scale(1.1) translateY(-5px); box-shadow: 0 10px 20px var(--accent-glow); }
        .circle-btn:active { transform: scale(0.9); }
        .play-btn { width: 95px; height: 95px; background: var(--accent); font-size: 2.2rem; }

        /* 控制面板右对齐优化 */
        .control-panel {
            width: 100%; max-width: 900px; margin: 30px auto 0; background: var(--glass);
            padding: 25px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.08);
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px;
        }
        .ctrl-item { display: flex; flex-direction: column; gap: 10px; }
        .flex-between { flex-direction: row !important; justify-content: space-between !important; align-items: center; }

        .switch { position: relative; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #334155; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(24px); }

        .copyright { font-size: 0.8rem; text-align: center; color: #4b5563; margin-top: 25px; letter-spacing: 0.5px; }
        .italic-text { font-style: italic; font-family: 'Arial', sans-serif; }
        .clickable-name { color: var(--accent); text-decoration: underline; cursor: pointer; font-weight: bold; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7); } 100% { box-shadow: 0 0 0 20px rgba(99, 102, 241, 0); } }
        .playing { animation: pulse 1.5s infinite !important; background: #ef4444 !important; }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <button class="toggle-sidebar" onclick="document.getElementById('sidebar').classList.toggle('collapsed')">
            <i class="fas fa-chevron-left"></i>
        </button>
        <div class="sidebar-content" id="menu-box"></div>
    </aside>

    <main class="main-container">
        <header style="margin-bottom: 30px; text-align: center;">
            <h1 style="font-size: 2.8rem; font-weight: 900; background: linear-gradient(to bottom, #fff, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">印尼语学习小助手</h1>
        </header>

        <section class="study-card" id="main-card">
            <div class="top-meta">
                <div class="word-badge" id="word-idx">01</div>
                <div class="star-btn" id="fav-trigger" onclick="handleFav()"><i class="fas fa-star"></i></div>
            </div>
            <div class="indo-box" id="disp-indo">正在加载</div>
            <div class="zh-box" id="disp-zh">请稍后...</div>
            <div class="nav-row" style="display: flex; align-items: center; gap: 40px; margin-top: 50px;">
                <button class="circle-btn" onclick="navWord(-1)"><i class="fas fa-chevron-left"></i></button>
                <button id="main-play" class="circle-btn play-btn" onclick="toggleSpeech()"><i class="fas fa-play" id="play-ico" style="margin-left: 5px;"></i></button>
                <button class="circle-btn" onclick="navWord(1)"><i class="fas fa-chevron-right"></i></button>
            </div>
        </section>

        <footer class="control-panel">
            <div class="ctrl-item">
                <label style="font-size: 0.9rem; color: var(--text-muted);">语音语速 <span class="italic-text" id="val-rate" style="color: var(--accent);">0.8</span>x</label>
                <input type="range" id="inp-rate" min="0.1" max="1.5" step="0.1" value="0.8" oninput="updateSetting('rate', this.value)">
            </div>
            <div class="ctrl-item">
                <label style="font-size: 0.9rem; color: var(--text-muted);">循环播放 <span class="italic-text" id="val-loop" style="color: var(--accent);">1</span>次</label>
                <input type="range" id="inp-loop" min="1" max="10" step="1" value="1" oninput="updateSetting('loop', this.value)">
            </div>
            <div class="ctrl-item flex-between">
                <span style="font-size: 0.9rem; font-weight: 600; color: var(--text-muted);">隐藏答案</span>
                <label class="switch">
                    <input type="checkbox" id="hide-toggle" onchange="renderCurrent()">
                    <span class="slider"></span>
                </label>
            </div>
        </footer>

        <div class="copyright">
            仅供学习，禁止商用。 如有问题请 <span class="italic-text">FMI</span> <span class="clickable-name" onclick="showQR()">王鹤</span> 联系 
            当前版本：<span class="version-tag" onclick="goAdmin()"><span class="italic-text">V1.00</span></span>
        </div>
    </main>

    <div id="qr-modal" class="qr-modal" onclick="this.style.display='none'">
        <div class="qr-content" onclick="event.stopPropagation()">
            <div class="close-qr" onclick="document.getElementById('qr-modal').style.display='none'">&times;</div>
            <img src="Wang_he.jpg" alt="王鹤" style="width: 280px; height: 280px; border-radius: 15px;">
            <p style="margin-top: 15px; color: #1e293b; font-weight: bold;">微信扫码联系 王鹤</p>
        </div>
    </div>

    <script>
        let db = {};
        let favs = JSON.parse(localStorage.getItem('fmi_v1_favs') || '[]');
        let curCat = "1", curIdx = 0, isLive = false;

        async function init() {
            try {
                const r = await fetch('./indonesian_learning_data.json?t=' + Date.now());
                db = await r.json();
                buildMenu();
                showWord("1", 0);
            } catch(e) { console.error("Data error"); }
        }

        function buildMenu() {
            const box = document.getElementById('menu-box');
            let favHtml = `
                <div class="cat-item">
                    <div class="cat-head" style="color:#fbbf24" onclick="this.nextElementSibling.classList.toggle('active')">
                        <span>⭐ 我的收藏 (${favs.length})</span><i class="fas fa-chevron-down" style="font-size:0.7rem"></i>
                    </div>
                    <div class="sub-menu" id="fav-sub">
                        ${favs.map((w, i) => `
                            <div class="menu-link" onclick="showFav(${i})">
                                <span>${i+1}. ${w.indonesian}</span>
                                <i class="fas fa-times-circle" onclick="delFav(event, ${i})" style="color:#ef4444; opacity:0.6"></i>
                            </div>
                        `).join('')}
                        ${favs.length > 0 ? `
                            <div class="clear-box">
                                <button class="btn-clear-all" onclick="clearFavs(event)">一键清空收藏</button>
                            </div>
                        ` : '<div style="text-align:center; padding:10px; font-size:0.8rem; color:#4b5563;">暂无收藏</div>'}
                    </div>
                </div>`;
            
            let catsHtml = "";
            for(let id in db) {
                const words = db[id].lessons["1"].words;
                catsHtml += `
                    <div class="cat-item">
                        <div class="cat-head" onclick="this.nextElementSibling.classList.toggle('active')">
                            <span>${db[id].name}</span><i class="fas fa-chevron-down" style="font-size:0.7rem"></i>
                        </div>
                        <div class="sub-menu ${id==curCat?'active':''}">
                            ${words.map((w,i)=>`<div class="menu-link ${id==curCat && i==curIdx?'active':''}" onclick="showWord('${id}',${i})">${i+1}. ${w.indonesian}</div>`).join('')}
                        </div>
                    </div>`;
            }
            box.innerHTML = favHtml + catsHtml;
        }

        function clearFavs(e) {
            e.stopPropagation();
            if(confirm("确定要清空所有收藏吗？")) {
                favs = [];
                localStorage.setItem('fmi_v1_favs', '[]');
                buildMenu();
                renderCurrent(); // 联动更新主界面五角星
            }
        }

        function renderCurrent() {
            const card = document.getElementById('main-card');
            card.classList.remove('fade-card');
            void card.offsetWidth; 
            card.classList.add('fade-card');

            const list = curCat === 'fav' ? favs : db[curCat]?.lessons["1"]?.words;
            if(!list || !list[curIdx]) {
                if(curCat === 'fav' && favs.length === 0) { showWord("1",0); return; }
                return;
            }
            const word = list[curIdx];
            const hide = document.getElementById('hide-toggle').checked;
            
            document.getElementById('disp-indo').innerText = word.indonesian;
            document.getElementById('disp-zh').innerText = hide ? '••••••' : word.chinese;
            document.getElementById('word-idx').innerText = (curIdx + 1).toString().padStart(2, '0');
            
            // 核心联动：检查当前显示的单词是否还在收藏夹中
            const isF = favs.some(f => f.indonesian === word.indonesian);
            document.getElementById('fav-trigger').className = 'star-btn' + (isF?' active':'');
        }

        function handleFav() {
            const list = curCat === 'fav' ? favs : db[curCat].lessons["1"].words;
            const word = list[curIdx];
            const i = favs.findIndex(f => f.indonesian === word.indonesian);
            if(i > -1) favs.splice(i, 1); else favs.push(word);
            localStorage.setItem('fmi_v1_favs', JSON.stringify(favs));
            buildMenu(); 
            renderCurrent();
        }

        function delFav(e, i) { 
            e.stopPropagation(); 
            favs.splice(i, 1); 
            localStorage.setItem('fmi_v1_favs', JSON.stringify(favs)); 
            buildMenu(); 
            renderCurrent(); // 确保五角星状态联动
        }

        function showWord(cat, idx) { stopVoice(); curCat = cat; curIdx = idx; renderCurrent(); buildMenu(); }
        function showFav(idx) { stopVoice(); curCat = 'fav'; curIdx = idx; renderCurrent(); }
        
        function navWord(dir) {
            const list = curCat === 'fav' ? favs : db[curCat].lessons["1"].words;
            if(list.length === 0) return;
            curIdx = (curIdx + dir + list.length) % list.length;
            renderCurrent();
            buildMenu();
        }

        function toggleSpeech() { isLive ? stopVoice() : startVoice(); }
        function startVoice() {
            const list = curCat === 'fav' ? favs : db[curCat].lessons["1"].words;
            const word = list[curIdx];
            const rate = parseFloat(document.getElementById('inp-rate').value);
            const loops = parseInt(document.getElementById('inp-loop').value);
            isLive = true;
            document.getElementById('play-ico').className = 'fas fa-stop';
            document.getElementById('main-play').classList.add('playing');
            let c = 0;
            const run = () => {
                if(!isLive || c >= loops) { stopVoice(); return; }
                const u = new SpeechSynthesisUtterance(word.indonesian);
                u.lang = 'id-ID'; u.rate = rate;
                u.onend = () => { c++; if(isLive) setTimeout(run, 500); };
                window.speechSynthesis.speak(u);
            };
            run();
        }
        function stopVoice() { isLive = false; window.speechSynthesis.cancel(); document.getElementById('play-ico').className = 'fas fa-play'; document.getElementById('main-play').classList.remove('playing'); }

        function updateSetting(t, v) { document.getElementById('val-'+t).innerText = v; }
        function showQR() { document.getElementById('qr-modal').style.display = 'flex'; }
        function goAdmin() { if(prompt("管理密码：") === "admin123") alert("进入管理模式"); }

        init();
    </script>
</body>
</html>
