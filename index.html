<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印尼语学习系统 | TMI</title>
    <style>
        /* 保持你原有的所有 CSS 变量和样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0f1a;
            --bg-secondary: #0f172a;
            --bg-card: rgba(15, 23, 42, 0.8);
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
        }
        body {
            background-color: var(--bg-primary);
            background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.15), transparent),
                              radial-gradient(circle at bottom left, rgba(139, 92, 246, 0.15), transparent);
            color: var(--text-primary);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        .container { width: 100%; max-width: 800px; z-index: 1; }
        .card { 
            background: var(--bg-card); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; padding: 30px; margin-bottom: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }
        .word-display { font-size: 3.5rem; font-weight: 800; text-align: center; margin: 20px 0; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .chinese-display { font-size: 1.5rem; text-align: center; color: var(--text-secondary); margin-bottom: 30px; }
        .btn-group { display: flex; gap: 15px; justify-content: center; }
        .btn { padding: 12px 24px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; transition: all 0.3s; background: var(--accent-gradient); color: white; }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        #error-msg { color: #ff4d4d; text-align: center; padding: 10px; display: none; background: rgba(255,0,0,0.1); border-radius: 8px; margin-bottom: 10px; }
        /* 其他 UI 样式建议保留你原文件的... */
    </style>
</head>
<body>
    <div class="container">
        <header style="text-align: center; margin-bottom: 40px;">
            <h1 style="font-size: 2.5rem; letter-spacing: -1px;">印尼语学习系统</h1>
        </header>

        <div id="error-msg"></div>

        <div class="card">
            <div id="main-content">
                <div id="word-box">
                    <div class="word-display" id="indo-text">加载中...</div>
                    <div class="chinese-display" id="zh-text">正在初始化数据，请稍候</div>
                </div>
                <div class="btn-group">
                    <button class="btn" onclick="prevWord()">上一个</button>
                    <button class="btn" onclick="nextWord()">下一个</button>
                    <button class="btn" style="background: rgba(255,255,255,0.1)" onclick="toggleChinese()">显示/隐藏中文</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DATA_FILE_URL = "./indonesian_learning_data.json";
        let learningData = null;
        let currentUnit = "1";
        let currentLesson = "1";
        let currentIndex = 0;
        let showZh = true;

        // 核心修复：增加缓存清理和详细错误捕获
        async function loadDataFromFile() {
            const errorDiv = document.getElementById('error-msg');
            try {
                // 添加版本号解决部署后的缓存问题
                const response = await fetch(`${DATA_FILE_URL}?v=${new Date().getTime()}`);
                
                if (!response.ok) {
                    throw new Error(`无法找到数据文件 (HTTP ${response.status})`);
                }

                const data = await response.json();
                
                // 验证数据格式
                if (!data || Object.keys(data).length === 0) {
                    throw new Error("数据文件格式不正确或内容为空");
                }

                learningData = data;
                console.log("数据加载成功:", learningData);
                updateUI();
            } catch (error) {
                console.error("加载失败:", error);
                errorDiv.style.display = "block";
                errorDiv.innerText = "错误: " + error.message + "。请确保 json 文件与 html 在同一目录。";
                document.getElementById('indo-text').innerText = "加载失败";
                document.getElementById('zh-text').innerText = "请检查控制台或网络连接";
            }
        }

        function updateUI() {
            try {
                const unit = learningData[currentUnit];
                const words = unit.lessons[currentLesson].words;
                const currentWord = words[currentIndex];

                document.getElementById('indo-text').innerText = currentWord.indonesian;
                document.getElementById('zh-text').innerText = showZh ? currentWord.chinese : "***";
                document.getElementById('zh-text').style.opacity = showZh ? "1" : "0.3";
            } catch (e) {
                console.error("渲染失败:", e);
            }
        }

        function nextWord() {
            const words = learningData[currentUnit].lessons[currentLesson].words;
            currentIndex = (currentIndex + 1) % words.length;
            updateUI();
        }

        function prevWord() {
            const words = learningData[currentUnit].lessons[currentLesson].words;
            currentIndex = (currentIndex - 1 + words.length) % words.length;
            updateUI();
        }

        function toggleChinese() {
            showZh = !showZh;
            updateUI();
        }

        // 页面启动
        document.addEventListener('DOMContentLoaded', loadDataFromFile);
    </script>
</body>
</html>
