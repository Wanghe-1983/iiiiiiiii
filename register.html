<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 印尼语学习助手</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="config.js"></script>
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-language" style="font-size:2.5rem;color:var(--accent);"></i>
                <h2 style="margin-top:15px;color:var(--text-main);">注册账号</h2>
                <p style="color:var(--text-muted);font-size:0.9rem;margin-top:5px;">创建你的学习账号</p>
            </div>
            <div class="online-info" id="onlineInfo"></div>
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> 用户名</label>
                    <input type="text" id="regUsername" placeholder="2-20位字母或数字" required minlength="2" maxlength="20" autocomplete="username">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-id-badge"></i> 昵称</label>
                    <input type="text" id="regName" placeholder="你的显示名称（选填）" maxlength="20">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> 密码</label>
                    <input type="password" id="regPassword" placeholder="至少4位" required minlength="4" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> 确认密码</label>
                    <input type="password" id="regPassword2" placeholder="再次输入密码" required minlength="4" autocomplete="new-password">
                </div>
                <button type="submit" class="login-btn" id="regBtn">
                    <i class="fas fa-user-plus"></i> 注册
                </button>
                <div style="text-align:center;margin-top:20px;">
                    <span style="color:var(--text-muted);">已有账号？</span>
                    <a href="login.html" style="color:var(--accent);text-decoration:none;font-weight:600;">去登录</a>
                </div>
            </form>
            <div id="regMsg" style="text-align:center;margin-top:15px;font-size:0.9rem;display:none;"></div>
        </div>
    </div>

    <script>
    async function handleRegister(e) {
        e.preventDefault();
        const username = document.getElementById('regUsername').value.trim();
        const name = document.getElementById('regName').value.trim() || username;
        const password = document.getElementById('regPassword').value;
        const password2 = document.getElementById('regPassword2').value;
        const msgEl = document.getElementById('regMsg');
        const btn = document.getElementById('regBtn');

        if (password !== password2) {
            showMsg('两次密码输入不一致', 'error');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 注册中...';

        try {
            const data = await API.register(username, password, name);
            if (data.error) {
                showMsg(data.error, 'error');
            } else if (data.success) {
                showMsg('注册成功！即将跳转登录...', 'success');
                setTimeout(() => { window.location.href = 'login.html'; }, 1500);
            }
        } catch (err) {
            showMsg('网络错误，请稍后重试', 'error');
        }

        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-plus"></i> 注册';
    }

    function showMsg(text, type) {
        const el = document.getElementById('regMsg');
        el.style.display = 'block';
        el.style.color = type === 'error' ? '#ff6b6b' : '#51cf66';
        el.textContent = text;
    }

    // 显示在线人数
    async function loadOnlineInfo() {
        try {
            const info = await API.getSystemInfo();
            if (!info.error) {
                const el = document.getElementById('onlineInfo');
                if (info.showOnlineLogin) {
                    el.innerHTML = '<i class="fas fa-users"></i> 当前在线 ' + info.onlineCount + ' 人 | 已注册 ' + info.registeredCount + ' 人';
                    el.style.display = 'block';
                }
            }
        } catch(e) {}
    }
    loadOnlineInfo();
    </script>
</body>
</html>
